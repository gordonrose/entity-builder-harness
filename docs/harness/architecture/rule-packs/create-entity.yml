      - "What TypeScript enforces"
      - "What TypeScript cannot enforce alone"
      - "Worked User example"
      - "1. Entity definition"
      - "3. Generated validation schema"
      - "4. API input/output contract"
      - "5. Persistence model"
      - "6. Frontend form config"
      - "7. Frontend table config"
      - "8. Generated tests"
      - "The key design lesson"
