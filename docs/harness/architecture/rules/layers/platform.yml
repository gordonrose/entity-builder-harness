success_criteria:
  - "The file exists at docs/harness/architecture/rules/layers/platform.yml."
  - "It defines platform/ as the runtime composition layer for startup, server, app mounting, route/job registries, security hooks, observability, health, config, workers, resource lifecycle, shutdown, and contract testing."
  - "It maps platform test types to runtime critical paths, validation, edge cases, security, failure modes, compatibility, and observability/health categories."
  - "It keeps product workflows, business permission meaning, app services, app repositories, product health decisions, business quotas, and domain-specific jobs inside apps or business packages."
  - "It limits app imports to approved platform composition roots and app mount modules."
  - "It keeps infrastructure provisioning outside platform/."
  - "It references dependency-direction for cross-layer import rules."
  - "It includes manually verified source_refs back to the platform layer guide."
