id: layer.platform
title: platform layer rules
version: 1
status: active

description: >
  Rules governing platform/ as Kanbien's runtime composition layer: process
  startup, app mounting, route and job registries, request handling, security
  hooks, observability, health, config, workers, resource lifecycle, and
  platform/app contract tests.

applies_to:
  paths:
    - "platform/**"

related_rulesets:
  - docs/harness/architecture/rules/concerns/ci-quality.yml
  - docs/harness/architecture/rules/concerns/dependency-direction.yml

runtime_modules:
  - id: contracts
    purpose: "Stable public TypeScript contract between business apps and the platform."
    public_to_apps: true
  - id: config
    purpose: "Typed global and namespaced app configuration loading and validation."
    public_to_apps: partly
  - id: runtime
    purpose: "Request context, resource lifecycle, error helpers, flags, and lifecycle primitives."
    public_to_apps: through_contracts
  - id: server
    purpose: "HTTP API process startup, app mounting, route adaptation, middleware, and versioning."
    public_to_apps: false
  - id: security
    purpose: "Authentication hooks, coarse route authorization, CORS, and rate limiting."
    public_to_apps: through_policies
  - id: observability
    purpose: "Structured logging, request logging, metrics, and tracing hooks."
    public_to_apps: through_context
  - id: health
    purpose: "Liveness, readiness, health aggregation, and exposed health routes."
    public_to_apps: through_registry
  - id: workers
    purpose: "Background job runtime, queue mechanics, scheduling, retries, and worker shutdown."
    public_to_apps: through_registry
  - id: testing
    purpose: "Fakes and helpers for platform/app contract tests."
    public_to_apps: test_only

test_taxonomy:
  - type: unit
    role: secondary
    minimum_evidence:
      - "Exercise deterministic runtime helpers with rejected routes, duplicate registrations, invalid config, denied auth/permission inputs, reserved paths, and safe error output."
    must_not:
      - "Do not count app integration tests as proof of platform-owned helper validation, policy normalization, or defensive defaults."
    categories:
      - id: critical_path
        should_prove:
          - "Runtime helper logic, registry validation helpers, error mapping, config parsing, and policy normalization behave deterministically."
      - id: validation
        should_prove:
          - "Invalid routes, jobs, health registrations, config values, auth metadata, and duplicate names are rejected before serving traffic."
      - id: edge_cases
        should_prove:
          - "Reserved paths, duplicate registrations, optional app hooks, empty registries, cancellation signals, and shutdown ordering are handled."
      - id: security_permissions
        should_prove:
          - "Auth parsing, coarse permission decisions, CORS/rate-limit policy helpers, and safe error output preserve defensive defaults."
  - type: integration
    role: primary
    minimum_evidence:
      - "Mount representative apps and jobs through platform runtime seams, including malformed requests, invalid app identity, unknown permissions, auth failures, tenant propagation, dependency failures, retries, health, logging, and shutdown."
    must_not:
      - "Do not accept happy-path mounted-app tests that skip policy enforcement, malformed config, tenant context, resource cleanup, retry/dead-letter, or safe observability output."
    categories:
      - id: critical_path
        should_prove:
          - "App mounting, route adaptation, middleware ordering, request context creation, job execution, health aggregation, and resource lifecycle work together."
      - id: use_case_scenarios
        should_prove:
          - "Representative mounted apps, jobs, health checks, config schemas, and lifecycle hooks exercise the runtime model."
      - id: validation
        should_prove:
          - "Bad app identity, duplicate routes, unknown permissions, invalid job payloads, invalid config, and malformed requests fail early."
      - id: security_permissions
        should_prove:
          - "Authentication failures, permission failures, tenant context propagation, rate limits, CORS, and reserved platform paths are enforced."
      - id: failure_modes
        should_prove:
          - "App handler errors, dependency failures, job retry/dead-letter behavior, resource cleanup failures, and graceful shutdown paths behave predictably."
      - id: observability_health
        should_prove:
          - "Request IDs, logs, metrics, traces, health output, readiness, liveness, and safe error mapping are emitted consistently."
  - type: contract
    role: primary
    minimum_evidence:
      - "Assert platform public contracts, registries, testing helpers, auth metadata, retry states, health states, and shutdown states remain compatible with app consumers."
    must_not:
      - "Do not use smoke startup or app-owned tests as substitutes for platform mount, registry, policy metadata, lifecycle, or failure-state contracts."
    categories:
      - id: compatibility_contracts
        should_prove:
          - "Public platform contracts, app mount contracts, route/job/health registries, and platform testing helpers remain compatible with apps."
      - id: security_permissions
        should_prove:
          - "Permission declarations, auth requirements, and policy metadata remain compatible with platform enforcement."
      - id: failure_modes
        should_prove:
          - "Contract-level error, lifecycle, retry, health, and shutdown states are explicit for app consumers."
  - type: smoke
    role: conditional
    minimum_evidence:
      - "Start the target server or worker, mount apps, expose health, emit safe status/log output, and shut down cleanly in the target-like environment."
    must_not:
      - "Do not treat startup success as proof of route adaptation, middleware ordering, authz, tenant propagation, retry policy, config validation, or contract compatibility."
    categories:
      - id: critical_path
        should_prove:
          - "Platform server or worker entrypoints can start, mount apps, expose health, and shut down in the target environment."
      - id: observability_health
        should_prove:
          - "Liveness, readiness, logs, and safe runtime status are available after startup."

rules:
  - id: platform.runtime-composition-only
    title: Platform owns runtime composition
    severity: error
    summary: >
      platform/ is the runtime host for business apps. It answers how Kanbien
      starts, accepts traffic, authenticates, routes work, runs jobs, observes
      itself, exposes health, and shuts down safely.
    must:
      - "Use platform/** for process startup, HTTP server creation, route registration, middleware ordering, auth integration, request context creation, error mapping, logging, health checks, config loading, feature flag access, job execution, runtime resources, and graceful shutdown."
      - "Keep platform behavior boring, deterministic, and enterprise-ready before adding broader abstractions."
      - "Keep platform changes tied to runtime model changes rather than ordinary product feature changes."
    must_not:
      - "Do not put CRM, billing, onboarding, invoice, lead, account, subscription, campaign, customer lifecycle, or other product-specific logic in platform/**."
      - "Do not use platform as a dumping ground for shared code."
      - "Do not build plugin marketplaces, custom dependency injection frameworks, multi-transport RPC frameworks, custom workflow engines, service mesh abstractions, generic repository frameworks, or multi-database abstractions before real need exists."
    agent_guidance: >
      If code answers a product question, move it to the owning app or business
      package. If code answers a runtime question, platform may be the owner.

  - id: platform.contracts-are-the-app-boundary
    title: Apps integrate through platform contracts
    severity: error
    summary: >
      Apps should contribute routes, permissions, jobs, health checks, optional
      config schemas, and lifecycle hooks through a stable mount contract. They
      should not control platform internals directly.
    must:
      - "Expose stable app-facing contracts from platform/contracts/** or another explicitly approved public contract entry point."
      - "Let apps mount through app.mount.ts files that register routes, permissions, jobs, health checks, optional config schemas, and optional lifecycle hooks."
      - "Give apps registries and mount dependencies, not raw HTTP server instances."
      - "Validate app identity, route namespacing, duplicate routes, duplicate permissions, duplicate jobs, duplicate health checks, and unknown permission references before serving traffic."
    must_not:
      - "Do not pass Fastify, Express, Hono, or another raw server object into business apps as their integration surface."
      - "Do not let apps install global middleware, start servers, configure CORS, parse JWTs, or install process signal handlers."
      - "Do not let apps mount at root or steal reserved platform paths such as health, metrics, or admin paths unless explicitly allowed."
    agent_guidance: >
      Preserve the contract boundary. Apps register intent; platform translates
      it into concrete server, worker, health, and operational behavior.

  - id: platform.composition-root-is-the-only-app-importer
    title: Only composition roots import app mounts
    severity: error
    summary: >
      platform may import business apps only at approved composition roots that
      mount app public integration modules. Other platform modules should not
      know app internals exist.
    must:
      - "Keep app imports limited to approved composition root files such as platform/server/mount.ts and platform/workers/mount.ts."
      - "Import only app public mount modules from composition roots."
      - "Let platform/server/** and platform/workers/** share the same app registry contract while using separate executable entrypoints."
    must_not:
      - "Do not import app services, repositories, controllers, route handlers, job handlers, health implementations, migrations, domain models, or business rules from platform internals."
      - "Do not make ordinary platform modules depend on CRM, billing, admin, onboarding, or other business app names."
    allowed_exceptions:
      - from: "platform/server/mount.ts"
        to: "apps/**/app.mount.ts"
      - from: "platform/workers/mount.ts"
        to: "apps/**/app.mount.ts"
    agent_guidance: >
      If platform needs an app service directly, the app boundary is leaking.
      Move the call behind app.mount.ts registration or back into the app.

  - id: platform.server-and-middleware-are-centralized
    title: Server startup and middleware are centralized
    severity: error
    summary: >
      Platform owns startup order, HTTP server creation, route adaptation,
      middleware order, API versioning, CORS, rate limiting, authentication,
      request context, authorization, validation, error mapping, response
      logging, and shutdown.
    must:
      - "Start API processes through platform/server/main.ts or another approved platform server entrypoint."
      - "Use a deterministic startup sequence: load config, create logger, create resources, mount apps, validate registries, create server, install middleware, register health routes, register app routes, start listening, and install shutdown handlers."
      - "Register routes declaratively with method, path, API version, auth requirement, permissions, rate-limit policy, schemas where applicable, and handler."
      - "Apply API versioning and app base paths in platform rather than requiring each app to expose fully qualified external paths."
      - "Own global middleware order for request IDs, correlation IDs, request logging, CORS, security headers, parsing, rate limiting, auth, context, authorization, validation, handlers, error mapping, and response logging."
    must_not:
      - "Do not let business apps call server.listen, app.listen, process.on('SIGTERM'), server.use, fastify.addHook, or equivalent runtime-control APIs."
      - "Do not let apps decide global CORS policy, platform rate-limit enforcement, API versioning strategy, or shared error response shape."
      - "Do not confuse API version with app package version."
    agent_guidance: >
      Apps should declare route policies. Platform should enforce and adapt
      those declarations consistently.

  - id: platform.runtime-context-is-shared-facts-not-business-services
    title: Runtime context carries shared facts
    severity: error
    summary: >
      Request and job contexts should provide common runtime facts and helpers:
      identifiers, tenant, principal, logger, flags, config, resources, clock,
      and abort signal where relevant.
    must:
      - "Create RequestContext and JobContext inside platform runtime/server/worker code."
      - "Include request or job identifiers, correlation identifiers, tenant and principal where available, structured logger, feature flag reader, config reader, clock, resources where appropriate, and cancellation signal where appropriate."
      - "Let apps construct their own business dependencies intentionally inside app code."
    must_not:
      - "Do not turn context into a service locator for CRM services, billing services, every repository, every workflow, or arbitrary app dependencies."
      - "Do not put product-specific meaning in platform context fields."
    agent_guidance: >
      Context should make runtime facts easy to access. It should not hide app
      dependency construction or become a product service container.

  - id: platform.security-and-observability-are-mechanisms
    title: Platform owns security and observability mechanisms
    severity: error
    summary: >
      Platform should centralize authentication, coarse permission enforcement,
      CORS, rate limiting, structured logs, metrics, tracing hooks, health
      aggregation, and standard error responses without taking over business
      meaning.
    must:
      - "Authenticate requests, parse credentials, create principals, enforce route-level permissions, and attach identity to context."
      - "Keep resource-specific business authorization inside the owning app after resource loading."
      - "Own structured log format, request logging, common telemetry hooks, and safe error mapping."
      - "Expose standard health endpoints such as /livez and /readyz, and aggregate app-provided readiness checks."
      - "Ensure health output and logs do not leak secrets."
    must_not:
      - "Do not put CRM-specific permission logic, business quotas, feature-specific analytics, expensive business audits, or domain-specific health decisions in platform."
      - "Do not let apps create their own logging frameworks for normal platform-managed runtime behavior."
      - "Do not use liveness checks to test external dependencies that belong in readiness."
    agent_guidance: >
      Platform provides mechanisms and consistent enforcement. Apps provide
      business meaning, business events, and resource-specific decisions.

  - id: platform.config-resources-workers-and-shutdown-are-owned-by-runtime
    title: Runtime owns config, resources, workers, and shutdown
    severity: error
    summary: >
      Platform owns global config validation, resource lifecycle, worker process
      startup, queue mechanics, retry/dead-letter behavior, scheduled jobs,
      feature flag provider integration, and graceful shutdown.
    must:
      - "Load and validate platform environment config once at startup."
      - "Allow apps to register namespaced app config schemas while keeping app-specific config meaning in the app."
      - "Create, expose, and close runtime resources such as database, cache, queues, and feature flag providers through approved runtime contracts."
      - "Start worker processes through platform/workers/main.ts or another approved worker entrypoint."
      - "Let apps register jobs while platform handles queue connection, payload validation, retry policy, dead-letter handling, logging, metrics, and graceful worker shutdown."
      - "On shutdown, mark readiness false, stop accepting work, drain requests/jobs where possible, run app hooks, close resources, flush telemetry, and exit cleanly."
    must_not:
      - "Do not let apps independently connect global runtime resources, own platform signal handlers, or bypass platform worker mechanics."
      - "Do not build a custom feature flag platform for v1 when a simple provider abstraction is enough."
      - "Do not put infrastructure provisioning code such as Terraform, Pulumi, Kubernetes manifests, cloud resource definitions, networking, or IAM in platform/**."
    agent_guidance: >
      Keep infra creation in infra/. Keep resource lifecycle and runtime use in
      platform/. Keep product behavior in apps.

  - id: platform.testing-proves-the-contract
    title: Platform tests prove app/runtime contracts
    severity: error
    summary: >
      Platform testing should prove that apps can mount, invalid registrations
      fail early, runtime policies are enforced, health is aggregated, workers
      process jobs correctly, and secrets are not exposed.
    must:
      - "Provide platform/testing/** fakes and helpers for app mount contract tests."
      - "Test fake app mounting, invalid app identity, duplicate routes, unknown permissions, duplicate jobs, duplicate health checks, auth failures, permission failures, route response wrapping, error mapping, health aggregation, job retry/dead-letter behavior, config parsing, and graceful shutdown."
      - "Keep reusable platform testing helpers out of production bundles."
    must_not:
      - "Do not rely only on app tests to prove platform registry, route, worker, health, security, and config behavior."
      - "Do not require real external services by default in platform contract tests."
    agent_guidance: >
      A platform boundary that is not tested will become a convention. Use
      fakes and contract tests to keep it executable.

