success_criteria:
  - "The file exists at docs/harness/architecture/rules/layers/design-system.yml."
  - "It defines packages/design-system ownership for tokens, resolvers, primitives, patterns, components, templates, providers, docs, tests, and governance."
  - "It keeps design-system code domain-neutral, accessible, documented, tested, and versioned."
  - "It keeps routed pages, product workflows, data fetching, permissions, analytics, and business logic in applications."
  - "It references dependency-direction for one-way design-system layer dependencies."
  - "It maps design-system test types to token, component, accessibility, interaction, visual-regression, generated-output, compatibility, and edge-case categories."
  - "It includes manually verified source_refs back to the frontend design-system guide."
