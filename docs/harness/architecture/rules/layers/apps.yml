id: layer.apps
title: apps layer rules
version: 3
status: active

description: >
  Rules governing apps/ as Kanbien's mountable app modules and products/ as
  the product composition layer: app entrypoints, app mounting, product app
  lists, product routes, product UI composition, business workflows,
  app-owned migrations, app manifests, product manifests, runtime wiring,
  smoke tests, and deployment-facing metadata.

applies_to:
  paths:
    - "apps/**"
    - "products/**"

related_rulesets:
  - docs/harness/architecture/rules/layers/platform.yml
  - docs/harness/architecture/rules/concerns/ci-quality.yml
  - docs/harness/architecture/rules/concerns/dependency-direction.yml
  - docs/harness/architecture/rules/concerns/generated-code.yml
  - docs/harness/architecture/rules/concerns/persistence-files-storage.yml
  - docs/harness/architecture/rules/concerns/typescript-monorepo-tooling.yml

app_surfaces:
  - id: app_mount
    purpose: "Public app integration module consumed by approved platform composition roots; app internals remain app-owned behind this boundary."
    typical_paths:
      - "apps/*/app.mount.ts"
  - id: app_manifest
    purpose: "Deployment-facing app metadata consumed by infra or generated deployment metadata."
    typical_paths:
      - "apps/*/app.manifest.ts"
  - id: migrations
    purpose: "Ordered migration stream owned by the application."
    typical_paths:
      - "apps/*/migrations/**"
  - id: product_composition
    purpose: "Product app composition, routes, pages, features, workers, workflow wiring, and app-specific dependencies."
    typical_paths:
      - "products/*/product.manifest.ts"
      - "apps/*/src/**"
      - "apps/*/features/**"

test_taxonomy:
  - type: unit
    role: primary
    minimum_evidence:
      - "Exercise both accepted and rejected app-owned decisions, including permission helpers, malformed inputs, empty state, tenant variants, and app-owned fallback behavior."
    must_not:
      - "Do not count route smoke tests or package-only tests as proof of app-owned wiring, validation, permissions, or failure behavior."
    categories:
      - id: critical_path
        should_prove:
          - "App-specific dependency composition, workflow helpers, and route policy helpers make the intended product decisions."
      - id: validation
        should_prove:
          - "App-owned config, route policy inputs, command inputs, and small request-shaping helpers accept and reject the right values."
      - id: edge_cases
        should_prove:
          - "Optional dependencies, empty app state, feature flags, tenant context variants, and ordering-sensitive helpers behave intentionally."
      - id: security_permissions
        should_prove:
          - "App-level permission helpers and resource authorization decisions allow and deny the correct cases."
      - id: failure_modes
        should_prove:
          - "App-owned error mapping and fallback helpers produce expected failures before broader runtime wiring is involved."
  - type: integration
    role: primary
    minimum_evidence:
      - "Exercise mounted routes or workers with realistic app dependencies plus rejected payloads, auth failures, permission failures, tenant isolation, dependency failures, and safe health/log output."
    must_not:
      - "Do not accept happy-path route tests that skip malformed requests, invalid permissions, tenant isolation, repository failures, or worker retry/dead-letter behavior."
    categories:
      - id: critical_path
        should_prove:
          - "Primary routes, workers, app mounts, health checks, repositories, and platform mount behavior work together."
      - id: use_case_scenarios
        should_prove:
          - "Representative product workflows exercise realistic request data, persistence behavior, jobs, and app service wiring."
      - id: validation
        should_prove:
          - "Invalid request payloads, params, app config, and job payloads are rejected at the app boundary."
      - id: security_permissions
        should_prove:
          - "Authentication requirements, app permissions, tenant isolation, and resource authorization hold through mounted routes or workers."
      - id: failure_modes
        should_prove:
          - "Repository, platform dependency, worker, and app service failures map to the expected response, retry, or dead-letter behavior."
      - id: observability_health
        should_prove:
          - "App health, readiness contributions, audit events, and safe logging work through the runtime integration point."
  - type: contract
    role: primary
    minimum_evidence:
      - "Compare public API schemas, app manifests, mount contracts, migration metadata, and permission declarations against the platform or generated contracts that consume them."
    must_not:
      - "Do not let generated snapshots stand in for schema compatibility, permission metadata, migration-contract, or platform-mount assertions."
    categories:
      - id: compatibility_contracts
        should_prove:
          - "Generated API schemas, published clients, platform mount contracts, app manifests, and app-owned migration contracts remain compatible."
      - id: security_permissions
        should_prove:
          - "Permission names, route auth declarations, and policy metadata stay compatible with platform enforcement."
      - id: generated_output
        should_prove:
          - "Generated app schemas, clients, migration metadata, or deployment metadata match the source contracts."
  - type: e2e
    role: conditional
    minimum_evidence:
      - "Cover highest-risk app-owned journeys with realistic users, denied users, tenant-isolated data, visible error/recovery states, and product-critical flows."
    must_not:
      - "Do not use E2E coverage to replace closer app integration, contract, validation, or permission tests for the same behavior."
    categories:
      - id: critical_path
        should_prove:
          - "Browser-critical or API-critical user paths work through the deployed or realistic runtime stack."
      - id: use_case_scenarios
        should_prove:
          - "Realistic user journeys cover the app's highest-risk product workflows."
      - id: security_permissions
        should_prove:
          - "Login, permission-denied, tenant-isolated, and privileged-user flows behave correctly where the app owns the user experience."
      - id: failure_modes
        should_prove:
          - "User-visible errors, retries, empty states, and recovery paths are acceptable for critical journeys."
  - type: smoke
    role: primary
    minimum_evidence:
      - "Start the app or worker, load manifests, mount key entrypoints, and verify safe readiness/liveness output for the deployment-facing surface."
    must_not:
      - "Do not treat startup success as proof of route correctness, authorization, tenant isolation, app contracts, migrations, or failure handling."
    categories:
      - id: critical_path
        should_prove:
          - "The app can start, mount, expose key routes or workers, and load app manifests without obvious runtime failure."
      - id: observability_health
        should_prove:
          - "Deployment health, readiness, liveness, and app-provided health checks are visible and safe."

rules:
  - id: apps.are-composition-roots
    title: Apps are mountable app modules
    severity: error
    summary: >
      Apps own app-specific behavior, public mount surfaces, routes, jobs,
      permissions, UI, workers, and app manifests. Products compose apps into
      deployable products.
    must:
      - "Use apps/** for mountable app modules such as web, api, worker, admin, public-site, or domain-specific app units."
      - "Let apps own app-specific routes, jobs, UI composition, permissions, app config meaning, app manifests, workers, and app-local dependencies."
      - "Keep apps independently testable and mountable through approved platform contracts."
    must_not:
      - "Do not use apps/** as a shared foundation imported by packages, platform internals, script capabilities, or infra."
      - "Do not hide reusable domain logic, shared API contracts, shared UI components, or cross-app utilities in an app because it was the first consumer."
      - "Do not make normal product features require platform changes unless the platform contract itself must change."
    agent_guidance: >
      If code starts as app wiring but another app needs it, move the reusable
      behavior to an owning package and keep only the composition in the app.

  - id: apps.products-compose-apps
    title: Products compose apps
    severity: error
    summary: >
      Products bundle app modules into named product surfaces. Environments
      such as staging or production are deployment targets for a product, not
      products themselves.
    must:
      - "Use products/** for product composition manifests that name which apps are included in a product."
      - "Use products/kanbien-platform/** as the first Kanbien Platform product composition target for dev and integration proof."
      - "Let product manifests reference app public manifests, app public mount modules, or generated app metadata instead of app internals."
      - "Keep environment-specific provider, account, region, DNS, CORS, auth provider, image digest, secret, and readiness values in deployment target profiles."
      - "Allow product-level role groupings only when they reference permissions declared by apps included in the product target."
    must_not:
      - "Do not treat kanbien/staging or another environment target as the product."
      - "Do not put AWS account, region, DNS, auth provider secrets, image digest, or deployment readiness blockers in product manifests."
      - "Do not let product manifests invent app permission vocabulary."
      - "Do not import app services, repositories, route handlers, job handlers, or feature internals from product manifests."
    agent_guidance: >
      Products answer which apps form a product. Target profiles answer where
      and how that product runs.

  - id: apps.own-product-behavior
    title: Apps own product behavior
    severity: error
    summary: >
      Applications own business behavior, product-specific route composition,
      workflow decisions, app pages, app-level permissions, and feature wiring.
      Shared mechanisms belong in packages, platform, design-system, or infra.
    must:
      - "Keep product-specific routes, pages, feature orchestration, workflow decisions, resource-specific authorization, product health decisions, app config meaning, and tenant/admin behavior in the owning app or product package."
      - "Use packages for reusable domain or product logic once it is shared across app boundaries."
      - "Use design-system components and patterns for reusable product-neutral UI instead of copying visual primitives into apps."
    must_not:
      - "Do not put global platform mechanisms such as server startup, global middleware, CORS, API versioning, shared error mapping, shared auth parsing, process signal handling, or queue mechanics in apps."
      - "Do not put Terraform, cloud resource definitions, IAM, networking, secrets provisioning, or deployment infrastructure in apps."
      - "Do not put design-system primitives, reusable tokens, reusable patterns, or product-neutral shared UI components in apps."
    agent_guidance: >
      Apps answer product questions. Platform answers runtime questions.
      Infrastructure answers deployment-resource questions.

  - id: apps.publish-explicit-mounts-and-manifests
    title: App mounts and manifests are explicit
    severity: error
    summary: >
      Apps should expose narrow, documented integration surfaces for platform
      mounting and deployment metadata. Other layers should not inspect app
      internals to discover runtime or deployment behavior.
    must:
      - "Expose app mounting through app.mount.ts or another approved public mount module."
      - "Register routes, permissions, jobs, health checks, optional app config schemas, and optional lifecycle hooks through platform mount contracts."
      - "Let the public mount module aggregate app-owned internal structures such as service, feature, capability, domain, use-case, route, job, health, config, or workflow modules."
      - "Expose deployment-facing metadata through app.manifest.ts or generated deployment metadata when infra needs app deployment behavior."
      - "Keep app manifests declarative and free of product implementation imports."
    must_not:
      - "Do not let platform internals import app services, repositories, route handlers, job handlers, domain models, or business rules directly."
      - "Do not let infra import app implementation internals to discover images, routes, config, secrets, or deployment settings."
      - "Do not pass raw server instances to apps as their integration surface."
      - "Do not require platform changes merely because an app reorganizes its internal service, feature, capability, domain, use-case, route, job, health, config, or workflow structure."
    agent_guidance: >
      When another layer needs app information, expose a public mount,
      manifest, contract, or generated metadata artifact instead of importing
      app internals.

  - id: apps.own-ordered-migrations
    title: Apps own ordered migrations
    severity: error
    summary: >
      Persistence intent may come from entities or product packages, but
      deployable schema migration history should land in the owning
      application's ordered migration stream.
    must:
      - "Store application migrations under an app-owned ordered migration path such as apps/*/migrations/**."
      - "Generate migrations into the owning app's migration stream when entity-builder or persistence tooling emits schema changes."
      - "Review generated migrations as deployment-affecting artifacts before promotion."
      - "Keep app schemas and product-specific repository decisions owned by apps or product packages."
    must_not:
      - "Do not scatter migrations across individual entity folders when the app requires one ordered migration stream."
      - "Do not put app migration history in packages/core, platform, script command surfaces, or infra."
      - "Do not treat generated migrations as trusted until CI and human review prove the output."
    agent_guidance: >
      The entity can describe intended persistence shape. The app owns the
      ordered migration history that will actually be deployed.

  - id: apps.dependencies-flow-downward
    title: Apps consume lower layers
    severity: error
    summary: >
      Apps may depend on packages, platform contracts, generated artifacts,
      design-system UI, and app-local code. Production apps must not depend on
      scripts or harness runtime code.
    must:
      - "Import reusable business/domain behavior through package public entry points."
      - "Import platform capabilities through app-facing platform contracts, profiles, or adapters."
      - "Import generated artifacts only from approved generated output paths."
      - "Use harness code only from tests or development support paths."
    must_not:
      - "Do not import generator runtime code from scripts/** into production app code."
      - "Do not import harness/** from production app code."
      - "Do not deep-import package internals instead of package public APIs."
      - "Do not let other apps import app internals except through published API clients, contracts, or explicitly approved integration modules."
    agent_guidance: >
      Before changing an app import, identify whether the imported file is a
      public package/platform/generated contract or an internal implementation.

  - id: apps.tests-prove-wiring-and-contracts
    title: App tests prove wiring and contracts
    severity: error
    summary: >
      App tests should prove application wiring, route behavior, contracts,
      deployment health, and end-to-end flows. Reusable business logic should
      usually be tested in the package that owns it.
    must:
      - "Use unit tests for app-specific wiring and dependency composition."
      - "Use integration tests for routes, workers, app health checks, and platform mount behavior."
      - "Use contract tests against generated API schemas and platform mount contracts."
      - "Use E2E tests and deployment smoke tests where the app boundary requires them."
      - "Keep most reusable business logic tests close to the package that owns the logic."
    must_not:
      - "Do not rely only on package tests to prove that app runtime wiring works."
      - "Do not duplicate full reusable-domain test suites inside apps after the logic moves to packages."
      - "Do not skip contract or smoke coverage for deployment-facing app mounts and manifests."
    agent_guidance: >
      App tests should catch bad assembly. Package tests should catch reusable
      behavior bugs.

