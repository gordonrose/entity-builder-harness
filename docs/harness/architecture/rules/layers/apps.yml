success_criteria:
  - "The file exists at docs/harness/architecture/rules/layers/apps.yml."
  - "It defines apps/ as Kanbien's mountable app module layer and products/ as the product composition layer."
  - "It records products/kanbien-platform as the first Kanbien Platform product composition target."
  - "It keeps product behavior, route/page composition, app-level permissions, app config meaning, and workflow decisions in apps or product packages."
  - "It requires explicit app.mount.ts and app.manifest.ts style surfaces for platform and infra consumption."
  - "It requires app-owned ordered migration streams."
  - "It keeps platform runtime mechanisms, infra provisioning, design-system primitives, harness code, and script command-surface runtime code out of production apps."
  - "It defines app testing expectations for wiring, integration, contracts, E2E, and deployment smoke checks."
  - "It maps app test types to critical path, validation, edge case, security, failure-mode, compatibility, generated-output, and health categories."
  - "It includes manually verified source_refs back to the full discussion, modular monorepo, TypeScript, and platform layer guides."
