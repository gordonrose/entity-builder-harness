success_criteria:
  - "The file exists at docs/harness/architecture/rules/layers/infra.yml."
  - "It defines infra/ as Kanbien's infrastructure-as-code and deployment definition layer."
  - "It keeps cloud resources, networking, IAM, secrets, databases, queues, storage, DNS, deployment topology, and CI/CD infrastructure in infra."
  - "It requires infra to consume app manifests, config packages, platform config validation packages, or generated deployment metadata instead of app internals."
  - "It separates infra provisioning from platform runtime lifecycle and app product behavior."
  - "It defines validation expectations for IaC static checks, policy checks, synthesized-output checks, environment config validation, and deployment smoke tests."
  - "It includes manually verified source_refs back to the full discussion, modular monorepo, TypeScript, and platform layer guides."
