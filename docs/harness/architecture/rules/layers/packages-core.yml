description: >
  Rules governing what may live in packages/core and how agents should treat
  core as a stable shared foundation.

applies_to:
  paths:
    - "packages/core/**"

related_rulesets:
  - docs/harness/architecture/rules/concerns/ci-quality.yml
  - docs/harness/architecture/rules/concerns/dependency-direction.yml

recommended_modules:
  - id: shared
    purpose: "Common primitives such as IDs, results, errors, message descriptors, clocks, context, and lifecycle."
    consumed_by: "apps, platform, tests"
  - id: config
    purpose: "Provider-neutral configuration source, primitive reader, schema, and validation-error contracts."
    consumed_by: "runtime apps and platform services"
  - id: diagnostics
    purpose: "Provider-neutral failure classification, recovery disposition, retryability, user-correctability, and self-healing vocabulary."
    consumed_by: "apps, platform runtime, workers, logging, monitoring, events, queues, and audit"
  - id: logging
    purpose: "Provider-neutral operational log record, logger, default sensitive-field redactor, and redacting-wrapper contracts."
    consumed_by: "apps, workers, platform"
  - id: monitoring
    purpose: "Provider-neutral health check, metrics, signal definition, SLI-intent, and metric-label safety contracts."
    consumed_by: "apps, workers, platform"
  - id: security
    purpose: "Defensive primitives and security contracts."
    consumed_by: "apps and platform security adapters"
  - id: authn
    purpose: "Global principal identity, principal type, authentication result, and authenticator contracts."
    consumed_by: "apps and platform identity integrations"
  - id: authz
    purpose: "Permission, resource, relationship, ABAC attribute, authorization request, and decision contracts."
    consumed_by: "apps and feature packages"
  - id: tenancy
    purpose: "Tenant identifiers, context packets, resolver ports, and isolation primitives."
    consumed_by: "apps, platform, and most runtime modules"
  - id: validation
    purpose: "Standard validation and error models."
    consumed_by: "APIs, apps, and possibly frontend packages"
  - id: persistence
    purpose: "Transaction, pagination, repository, and outbox contracts."
    consumed_by: "apps and platform persistence implementations"
  - id: events
    purpose: "Provider-neutral event envelope, payload, versioning, publisher, bus, and handler contracts."
    consumed_by: "apps, workers, platform messaging"
  - id: queues
    purpose: "Provider-neutral queue message, message-version, send, delivery, handler, retry/dead-letter metadata, queue error, and testing-helper contracts."
    consumed_by: "workers and platform queue adapters"
  - id: async-jobs
    purpose: "Background job contracts and lifecycle."
    consumed_by: "apps and workers"
  - id: notifications
    purpose: "Notification contracts and delivery model."
    consumed_by: "apps, workers, and provider adapters"
  - id: files
    purpose: "File storage and metadata contracts."
    consumed_by: "apps and platform storage adapters"
  - id: audit
    purpose: "Provider-neutral accountability event, event-version, actor, target, outcome, metadata, recorder, and recorder-error contracts."
    consumed_by: "apps and platform audit storage"
  - id: reporting
    purpose: "Report request, generation, and export contracts."
    consumed_by: "apps and workers"
  - id: analytics
    purpose: "Product tracking and identity contracts."
    consumed_by: "apps and analytics adapters"
  - id: i18n
    purpose: "Translation and message catalog contracts."
    consumed_by: "apps, notifications, and design system"
  - id: localization
    purpose: "Date, time, locale, currency, and regional formatting contracts."
    consumed_by: "apps, notifications, and design system"
  - id: testing
    purpose: "In-memory and no-op implementations for local tests and CI."
    consumed_by: "apps, harness, and CI tests"

test_taxonomy:
  - type: unit
    role: primary
    minimum_evidence:
      - "Exercise accepted, rejected, boundary, and failure cases for core primitives, validation contracts, monitoring signals, security/tenancy helpers, and result/error shapes without runtime dependencies."
    must_not:
      - "Do not count downstream app or platform tests as proof of core-owned primitive, validation, security, tenancy, or failure behavior."
    categories:
      - id: critical_path
        should_prove:
          - "Core primitives, result/error helpers, policies, clocks, context helpers, and small pure functions behave as stable foundations."
      - id: validation
        should_prove:
          - "Validation contracts, error models, config contracts, IDs, and defensive primitives accept and reject expected values."
      - id: edge_cases
        should_prove:
          - "Empty values, boundary identifiers, locale/currency/date variants, pagination boundaries, metric label limits, retry limits, and optional metadata behave intentionally."
      - id: security_permissions
        should_prove:
          - "Authn, authz, tenancy, security, redaction, and audit primitives preserve isolation and defensive defaults."
      - id: failure_modes
        should_prove:
          - "Core error/result shapes and no-op or in-memory testing implementations fail predictably without runtime dependencies."
  - type: type_level
    role: primary
    minimum_evidence:
      - "Include compile-pass and compile-fail assertions for public exports, generic constraints, branded identifiers, discriminated unions, and invalid contract shapes where TypeScript can express the rule."
    must_not:
      - "Do not rely only on runtime tests, snapshots, or successful package builds to prove intended type rejection or inference behavior."
    categories:
      - id: compatibility_contracts
        should_prove:
          - "Public core entry points, exported types, generic constraints, and inference behavior remain stable for apps, platform, and tests."
      - id: validation
        should_prove:
          - "Compile-time constraints reject invalid contract shapes where TypeScript can express the rule."
      - id: edge_cases
        should_prove:
          - "Optional fields, branded identifiers, discriminated unions, and extension points preserve intended narrowing and exhaustiveness."
  - type: contract
    role: primary
    minimum_evidence:
      - "Prove ports, policy facts, error states, lifecycle states, and testing implementations remain implementable by platform and consumable by apps without runtime leakage."
    must_not:
      - "Do not accept tests that instantiate concrete platform providers, app workflows, cloud SDKs, or product-specific behavior as core contract proof."
    categories:
      - id: compatibility_contracts
        should_prove:
          - "Ports and contracts remain implementable by platform and consumable by apps without leaking runtime implementations into core."
      - id: security_permissions
        should_prove:
          - "Auth, tenancy, permission, audit, and security contracts preserve the required policy facts across consumers."
      - id: failure_modes
        should_prove:
          - "Contract-defined errors, retries, health statuses, monitoring signals, and lifecycle states are explicit enough for platform implementations and app consumers."
  - type: integration
    role: conditional
    minimum_evidence:
      - "Exercise in-memory or no-op helpers through realistic app/platform test scenarios while preserving the same public contracts concrete implementations must satisfy."
    must_not:
      - "Do not let helper integration tests mask missing unit, type-level, or contract evidence for the core surface itself."
    categories:
      - id: use_case_scenarios
        should_prove:
          - "In-memory or no-op test implementations support realistic app and platform test scenarios without external services."
      - id: compatibility_contracts
        should_prove:
          - "Core testing helpers exercise the same contracts that concrete platform implementations must satisfy."

rules:
  - id: core.stable-cross-cutting-only
    title: Only stable cross-cutting concepts belong in core
    severity: error
    summary: >
      Code belongs in packages/core only when it defines a stable, cross-cutting
      Kanbien concept or contract that multiple parts of the system must use
      consistently.
    must:
      - Define stable contracts, types, interfaces, errors, policies, or small pure helpers.
      - Prefer concepts such as TenantId, Principal, Permission, AuditEvent, EventEnvelope, Locale, and CorrelationId.
      - Start local first, then extract to core only after the abstraction is stable and genuinely reused.
      - Add core concepts only when they reduce inconsistency, operational risk, security risk, or repeated reinvention.
    must_not:
      - Do not add code to core merely because it might be reused.
      - Do not put product-specific workflows in core.
      - Do not put unstable experiments in core.
      - Do not add a core module without a clear owner.
    agent_guidance: >
      When deciding whether to place code in packages/core, ask:
      Is this stable? Is it cross-cutting? Is it product-neutral?
      Does multiple code need the same contract? If not, keep it outside core.

  - id: core.admission-requires-owner-and-current-need
    title: Core admission requires ownership and current need
    severity: error
    summary: >
      A core module is a long-lived shared foundation. It needs a clear owner,
      present consumers, tests, and documentation before it moves into core.
    must:
      - Use the sequence: start local, observe repetition, extract a stable abstraction, document it, test it, then move it to core.
      - Identify the owning team, module owner, or explicit maintenance owner before adding a core surface.
      - Identify current consumers that need the same contract or concept now.
      - Document the contract, allowed dependencies, and intended consumers.
    must_not:
      - Do not add a core module because reuse is only hypothetical.
      - Do not add a core module without an owner.
      - Do not add abstract frameworks before real product needs exist.
      - Do not use core as a convenience utility drawer.
    agent_guidance: >
      If ownership or real reuse is unclear, keep the code local and record the
      admission gap instead of moving it into packages/core.

  - id: core.no-upward-imports
    title: Core must not import apps, platform, or infra
    severity: error
    summary: >
      packages/core must remain independent of applications, runtime implementations,
      and infrastructure.
    must:
      - Keep core dependency-light and framework-independent.
      - Let apps import core.
      - Let platform implement core contracts.
    must_not:
      - Do not import from apps/** inside packages/core.
      - Do not import from platform/** inside packages/core.
      - Do not import from infra/** inside packages/core.
      - Do not import cloud SDKs, ORMs, web servers, or vendor clients into core.
    forbidden_imports:
      - "apps/**"
      - "platform/**"
      - "infra/**"
    agent_guidance: >
      If a proposed core change requires importing an app, platform module,
      cloud SDK, ORM, or infrastructure resource, the plan is wrong. Move the
      implementation to platform or the product-specific behavior to apps.

  - id: core.contracts-not-implementations
    title: Core defines contracts, platform provides implementations
    severity: error
    summary: >
      Core should define the shared contract. Runtime-specific implementations
      belong in platform. Product workflows belong in apps.
    must:
      - Define ports and contracts in core.
      - Put concrete provider integrations in platform.
      - Put product-specific behavior in apps or feature packages.
    must_not:
      - Do not put S3, Kafka, Redis, Fastify, Prisma, or cloud-provider implementation code in core.
      - Do not put CRM, billing, onboarding, or workflow-specific behavior in core.
    examples:
      good:
        - "packages/core/files defines FileStorage."
        - "platform/storage-s3 implements S3FileStorage."
        - "apps/crm decides when to store or retrieve a CRM document."
      bad:
        - "packages/core imports an S3 client."
        - "packages/core imports apps/crm."
        - "packages/core contains CRMUser or BillingPlan."
    agent_guidance: >
      Use core for the shape of the dependency, not the concrete runtime behavior.
      The contract goes in core. The implementation goes in platform. The business
      decision goes in apps.

  - id: core.public-contracts-evolve-compatibly
    title: Public core contracts evolve compatibly
    severity: error
    summary: >
      packages/core exports are shared contracts for apps, platform runtime,
      provider adapters, tests, and future generated code, so they should change
      additively unless a breaking change is explicitly approved and migrated.
    must:
      - Prefer additive changes such as optional fields, new helpers, new stable error codes, new schema versions, or new modules.
      - Treat exported type names, helper names, port interfaces, stable error codes, message keys, metric names, config keys, permission strings, event types, queue message types, and contract meanings as compatibility-sensitive.
      - Keep old public usages compiling through compatibility fixtures unless a breaking change is deliberate and documented.
      - Record breaking changes with affected consumers, migration guidance, compatibility-window or shim decisions, and RAG/source-material updates.
      - Deprecate before removing or renaming public contracts unless there is an explicit emergency or pre-release exception.
      - Add explicit schema/version contracts before durable, replayed, retried, exported, or cross-deployment payloads become runtime obligations.
      - Run core type checks and compatibility fixtures when changing public contracts.
    must_not:
      - Do not silently rename, remove, narrow, or change the meaning of public core exports.
      - Do not update compatibility fixtures merely to make a breaking change pass without migration documentation.
      - Do not rely on TypeScript module tests alone as proof that old app or platform usage remains compatible.
      - Do not treat package-private version 0 status as permission to break shared contracts casually.
      - Do not add durable queue, audit, persistence, event, or export payloads without a schema/version compatibility story.
    agent_guidance: >
      Before changing a core export, ask whether existing app or platform code
      could compile against it today. If yes, choose an additive path first. If
      not possible, update source material, rules, compatibility fixtures, and
      migration notes together so future agents can see the intentional break.

  - id: core.capability-modules-stay-contract-shaped
    title: Core capability modules stay contract-shaped
    severity: error
    summary: >
      Core modules should expose clear capability contracts and small primitives,
      not empty ceremony, product workflow engines, or concrete runtime hosts.
    must:
      - Organize core around capability modules such as authn, authz, tenancy, validation, persistence, files, events, queues, logging, monitoring, diagnostics, audit, config, security, reporting, analytics, i18n, and localization.
      - Prefer module files such as index.ts, types.ts, errors.ts, ports.ts, policy.ts, and testing.ts when those files clarify ownership.
      - Include in-memory or no-op test implementations only when they support tests, local development, harness work, or CI.
      - Keep concepts visible in types, especially tenant, principal, permission, audit event, event envelope, locale, currency, and correlation identifiers.
    must_not:
      - Do not create empty module ceremony when a module does not need every file.
      - Do not put concrete worker processes, provider SDK integrations, product-specific handlers, UI, infrastructure definitions, or deployment resources in core modules.
      - Do not confuse logs, audit, analytics, monitoring, reporting, and observability; keep each concern explicit.
    agent_guidance: >
      When adding a core module, choose the smallest contract-shaped surface
      that names the Kanbien concept clearly and leaves implementation details
      to apps, platform, or infrastructure.

  - id: core.shared-primitives-stay-strict-and-portable
    title: Shared primitives stay strict and portable
    severity: error
    summary: >
      packages/core shared primitives should carry stable provider-neutral
      meaning and reject ambiguous runtime-specific or locale-specific shapes.
    must:
      - Keep shared identifiers, result/error shapes, message descriptors, clocks, and request context values dependency-free and JSON-safe.
      - Treat ISODateTime values as explicit ISO date-time strings with timezone information.
      - Normalize valid ISODateTime input to a stable JSON-safe ISO string.
      - Keep message descriptor params primitive and translation/localization friendly.
      - Use shared JSON-value helpers for cross-boundary facts that must remain plain, serializable, and finite-number safe.
    must_not:
      - Do not accept date-only strings, localized prose dates, or implicit local-time strings as ISODateTime values.
      - Do not pass provider objects, Date instances, money objects, or other rich runtime values as shared message params.
      - Do not let NaN, Infinity, class instances, provider objects, or runtime-only values pass as core JSON-like contract facts.
      - Do not put translation catalogs, locale negotiation, or region-specific formatting inside shared primitives.
    agent_guidance: >
      Shared primitives are the bottom of the contract stack. When a value can
      vary by locale, runtime, provider, or presentation boundary, convert it to
      a stable primitive fact before it enters shared core contracts.

  - id: core.diagnostics-classify-failures-for-recovery
    title: Diagnostics classify failures for safe recovery decisions
    severity: error
    summary: >
      packages/core diagnostics contracts should define provider-neutral failure
      classification, recovery disposition, retryability, user-correctability,
      and self-healing vocabulary while leaving remediation workflows, log
      queries, provider actions, and product policy outside core.
    must:
      - Define provider-neutral failure kinds, failure sources, failure severity, recovery dispositions, recovery actions, retryable indicators, user-correctable indicators, diagnostic descriptors, and primitive diagnostic facts.
      - Support the self-healing loop as vocabulary: detect, classify, correlate, decide, act, verify, and escalate.
      - Let CoreError carry optional diagnostic descriptors when a failure needs structured recovery metadata.
      - Use diagnostic facts to distinguish user/input errors, validation failures, provider/runtime failures, data-integrity problems, and genuine bugs without parsing free-text logs.
      - Keep diagnostic facts primitive, bounded, finite-number safe, and suitable for correlation across logs, monitoring, queues, events, audit, and incident workflows.
      - Test failure classification, recovery defaults, retryability, user-correctability, and fact safety without concrete runtime providers.
    must_not:
      - Do not implement retries, repair workflows, AI debugging, log queries, incident routing, runbook orchestration, worker loops, provider actions, product policy, or infrastructure alarms in packages/core.
      - Do not carry secrets, tokens, raw credentials, raw request bodies, provider objects, class instances, non-finite numbers, or runtime-only values as diagnostic facts.
      - Do not treat diagnostic recovery actions as permission for automation without app/product policy and platform/runtime safeguards.
      - Do not make core diagnostics import logging, monitoring, queues, events, audit, platform adapters, cloud SDKs, worker runtimes, or infra resources.
    agent_guidance: >
      Core diagnostics should answer "what kind of failure is this and what
      class of follow-up is safe to consider?" Apps decide product safety,
      platform runtime performs and verifies remediation workflows, provider
      adapters translate concrete errors, and infra provisions alarms, queues,
      log backends, dead-letter resources, and runbook hooks.

  - id: core.logging-sensitive-fields-owned-by-logging
    title: Common sensitive log fields are maintained in core logging
    severity: error
    summary: >
      Common default sensitive-field names for operational log redaction belong
      in the provider-neutral logging contract so apps and platform adapters
      inherit consistent defensive behavior.
    must:
      - Maintain common provider-neutral sensitive field names in the packages/core logging module.
      - Redact sensitive diagnostic fields before records reach concrete runtime sinks.
      - Provide an extension point for app-specific, platform-specific, or provider-specific sensitive fields.
      - Keep redaction behavior deterministic and testable with unit and type-level evidence.
    must_not:
      - Do not bury common default sensitive-field names only in app or platform adapters.
      - Do not require concrete log sinks, observability providers, cloud SDKs, or runtime hosts to use core redaction contracts.
      - Do not rely only on free-text value scanning as the default redaction policy.
    agent_guidance: >
      When a new category of sensitive operational log field appears, decide
      whether it is common enough for the core logging defaults. If yes, add it
      to the core logging module and tests. If it is product-specific or
      provider-specific, extend the default redactor at the consuming boundary.

  - id: core.monitoring-contracts-name-operational-signals
    title: Monitoring contracts name operational signals, not provider backends
    severity: error
    summary: >
      packages/core monitoring contracts should define provider-neutral health
      checks, metrics, signal definitions, ownership, SLI intent, and
      metric-label safety while leaving runtime health wiring, exporters,
      alerting, dashboards, and infrastructure outside core.
    must:
      - Define monitored component references, health check names, health check types, health statuses, health check results, metric names, metric kinds, metric units, metric points, metrics ports, monitoring signal categories, monitoring signal intents, signal ownership, and small pure helpers.
      - Support liveness, readiness, dependency, and capability probe contracts without choosing an HTTP endpoint, runtime host, or provider backend.
      - Keep health check metadata plain, serializable, and finite-number safe.
      - Use stable metric names, explicit metric kinds, explicit units, finite numeric values, timestamps, and safe labels.
      - Keep metric labels primitive, bounded, and low-cardinality.
      - Treat signal definitions as the place to record why a signal exists, who owns it, which component it describes, and whether it supports health detection, alerting, capacity planning, debugging, service-level-indicator use, or cost control.
      - Include no-op metrics and fixed health-check helpers only when they preserve the same public contracts for tests, local development, harness work, or CI.
      - Test health check, metric, label-safety, signal-definition, and helper behavior without concrete runtime providers.
    must_not:
      - Do not define CloudWatch, Datadog, Prometheus, OpenTelemetry exporters, concrete health endpoints, dashboards, alert thresholds, PagerDuty or incident routes, production SLO targets, runtime wiring, cloud SDK clients, provider adapters, infrastructure alarms, or product-specific uptime commitments in packages/core.
      - Do not use metric labels for secrets, raw credentials, tokens, emails, phone numbers, raw user ids, principal ids, request ids, correlation ids, trace ids, session ids, IP addresses, raw URLs, raw paths, provider objects, class instances, non-finite numeric values, or runtime-only values.
      - Do not use monitoring metrics as audit records, analytics events, product reports, or durable event-bus messages.
      - Do not make core monitoring import platform observability adapters, cloud SDKs, runtime frameworks, or infra resources.
    agent_guidance: >
      Core monitoring is the dictionary for operational signals. Apps decide
      which product paths matter, platform emits and aggregates signals through
      concrete adapters, and infra provisions monitoring backends, alarms,
      dashboards, and notification routes.

  - id: core.security-contracts-name-defensive-policy
    title: Security contracts name defensive policy, not runtime enforcement
    severity: error
    summary: >
      packages/core security contracts should define provider-neutral sensitive
      value, hash, classification, policy violation, policy decision, and
      evaluator shapes while leaving product policy, runtime enforcement,
      provider adapters, and cloud security resources outside core.
    must:
      - Define provider-neutral secret string markers, hash algorithm and hash value shapes, hasher ports, security policy ids, security policy violations, policy decisions, policy evaluators, data sensitivity labels, and sensitive value classifications.
      - Use security policy decisions to represent allowed or denied defensive policy outcomes with stable translation-ready violation reasons.
      - Keep security policy evidence plain, serializable, and finite-number safe.
      - Use sensitive value classification as shared vocabulary for defensive handling across logs, audit, events, exports, provider diagnostics, and runtime adapters.
      - Keep security policy contracts separate from authorization decisions; authz answers permission questions, security answers defensive handling and policy-safety questions.
      - Test secret, hash, classification, policy violation, policy decision, evidence-copying, and evaluator helper behavior without runtime providers.
    must_not:
      - Do not define product password rules, tenant-specific security policies, MFA workflows, JWT/session parsing, API key checking, rate-limit algorithms, secret storage, encryption providers, IAM policies, KMS keys, middleware, or concrete hashing algorithms in packages/core.
      - Do not implement a security policy engine in packages/core.
      - Do not carry secrets, raw credentials, tokens, provider objects, request objects, class instances, non-finite numeric values, or runtime-only values as security policy evidence.
      - Do not treat data classification labels as a complete data-governance engine or compliance workflow.
      - Do not make core security import platform security adapters, cloud SDKs, hashing libraries, web middleware, or infra resources.
    agent_guidance: >
      Core security is the dictionary for sensitive values and defensive policy
      outcomes. Apps decide product security rules, platform enforces runtime
      security behavior, and infra provisions cloud security resources.

  - id: core.tenancy-context-provider-neutral
    title: Tenancy contracts define tenant context, not tenant discovery
    severity: error
    summary: >
      packages/core may define tenant identifiers, tenant context packets,
      resolver ports, and small pure helpers, but runtime tenant discovery
      belongs in apps or platform adapters.
    must:
      - Keep TenantId, TenantContext, TenantResolver, and tenant isolation primitives provider-neutral.
      - Use tenant context as the shared contract for authorization, audit, logging, events, and persistence scopes.
      - Keep tenant lookup inputs translated at the app or platform boundary before they enter core contracts.
      - Test tenant identity, resolver, and isolation helper behavior without runtime providers.
    must_not:
      - Do not make packages/core parse hostnames, JWTs, request headers, database rows, AWS accounts, or deployment manifests to discover tenants.
      - Do not put product-specific tenant lifecycle, billing, onboarding, or workspace behavior in packages/core.
      - Do not accept unbranded strings where a TenantId is required by a core contract.
    agent_guidance: >
      When adding tenant-aware behavior, keep the question split in two:
      core defines the tenant context shape; apps and platform decide how the
      current tenant is discovered and then pass that context into core-facing
      contracts.

  - id: core.authn-principal-is-global-actor
    title: Authentication principal is the global actor, not a tenant profile
    severity: error
    summary: >
      packages/core authn contracts should model the authenticated global
      actor identity and authenticator port without owning provider checks,
      authorization decisions, or tenant-specific profile/account workflows.
    must:
      - Keep PrincipalId, PrincipalType, Principal, AuthenticationResult, and Authenticator provider-neutral.
      - Treat Principal as the global authenticated actor identity.
      - Use current tenant context only for the active request or job when known.
      - Normalize claims into plain serializable provider-neutral values before constructing a Principal.
      - Leave tenant-specific profiles, memberships, roles, preferences, and account lifecycle to app or product modules.
      - Test principal identity, current tenant context, and authenticator helper behavior without runtime providers.
    must_not:
      - Do not make packages/core parse JWTs, verify sessions, check API keys, or call identity provider SDKs.
      - Do not put authorization decisions inside authentication contracts.
      - Do not model the Principal as a tenant-specific user profile or account.
      - Do not treat a current tenant id on a principal as the actor's exhaustive tenant membership list.
      - Do not carry raw provider objects, Date instances, sessions, credentials, access tokens, refresh tokens, or other rich runtime values as principal claims.
    agent_guidance: >
      Keep three ideas separate: authentication identifies the global actor,
      tenancy identifies the current tenant context, and app/product modules
      model tenant-specific accounts or memberships when the product needs them.

  - id: core.authz-asks-permission-questions-without-owning-policy
    title: Authorization contracts ask permission questions without owning product policy
    severity: error
    summary: >
      packages/core authz contracts should support role/permission,
      relationship/resource, and attribute-based authorization questions while
      leaving concrete product policy, relationship inheritance, and policy
      engines outside core.
    must:
      - Model authorization requests with principal, permission, tenant context where relevant, resource references, relationship facts, attributes, and plain facts.
      - Support RBAC-friendly permission strings, ReBAC-friendly resource and relation facts, and ABAC-friendly principal/tenant/resource/environment attributes.
      - Keep permission helper output to non-empty resource:action strings without whitespace or nested colon separators.
      - Return explicit allow or deny decisions; denied decisions must include translation-ready reasons.
      - Keep authorization attributes, facts, and evidence plain and serializable.
      - Keep authorization separate from authentication.
      - Test request, decision, resource, relation, and attribute helper behavior without runtime providers or product policy engines.
    must_not:
      - Do not authenticate credentials inside authz contracts.
      - Do not hardcode product-specific roles, team membership rules, deal access inheritance, or tenant-specific permission meanings in packages/core.
      - Do not implement a full ABAC/ReBAC policy language or provider adapter in packages/core.
      - Do not accept provider-specific objects or rich runtime values as default authorization attributes.
    agent_guidance: >
      Core should make the authorization question precise. Apps and product
      modules answer it with product policy, and platform may delegate the
      Authorizer port to a policy engine when needed.

  - id: core.persistence-contracts-name-storage-boundaries
    title: Persistence contracts name storage boundaries
    severity: error
    summary: >
      packages/core persistence contracts should define provider-neutral
      repository, pagination, error, concurrency, transaction, and after-commit
      shapes while leaving database implementation, topology, and product
      queries outside core.
    must:
      - Define provider-neutral page request, page, repository, save option, unit-of-work, transaction, and after-commit contracts.
      - Keep page total counts optional, but require shared non-negative integer page-total contracts when total records or total matching records are included.
      - Use stable persistence error codes for common storage outcomes such as conflict, duplicate, timeout, unavailable storage, invalid page request, not found, and transaction failure.
      - Support optimistic concurrency through an expected concurrency token when stale writes must be rejected.
      - Keep after-commit hooks for side effects that should only run after successful transaction commit.
      - Normalize transaction failures into stable persistence error vocabulary before app code handles them.
      - Include in-memory helpers only when they preserve the same public contracts for tests, local development, harness work, or CI.
      - Test pagination, conflict, transaction, after-commit, and helper behavior without concrete runtime providers.
    must_not:
      - Do not define SQL, ORM models, database clients, database tables, indexes, shards, backups, object-storage clients, or cloud SDK behavior in packages/core.
      - Do not put product-specific repositories, product query methods, or workflow decisions in packages/core.
      - Do not require total counts for every page response or invent product-specific total-count fields outside the shared page-total contract.
      - Do not expose provider-specific lock, deadlock, network, timeout, or conditional-write error shapes directly to app code.
      - Do not leak raw transaction implementation errors from core helpers or platform adapters when a persistence error meaning exists.
      - Do not publish events or run side effects before a transaction is known to have committed.
    agent_guidance: >
      Core persistence names the contract and stable failure meanings. Platform
      translates real storage behavior into that contract, infra provisions the
      storage topology and resilience resources, and apps decide product-specific
      query and workflow behavior.

  - id: core.events-contracts-name-publishable-facts
    title: Events contracts name publishable facts, not broker infrastructure
    severity: error
    summary: >
      packages/core events contracts should define provider-neutral event
      envelopes, payloads, publish errors, publishers, buses, handlers, and
      testing helpers while leaving event catalogs, brokers, subscribers, and
      runtime delivery outside core.
    must:
      - Define provider-neutral event id, event type, event version, payload, envelope, publisher or bus, handler, and publish error contracts.
      - Keep event payload values plain, serializable, and portable across app, platform, worker, broker, log, outbox, and test boundaries.
      - Reject non-finite numeric values and non-plain runtime objects from event payloads before they cross app/platform boundaries.
      - Treat event type names as domain facts rather than concrete broker topic, queue, stream, or subscription names.
      - Keep publish failures mapped to stable event error codes before app code receives them.
      - Publish events that depend on successful state changes through a post-commit path, such as persistence after-commit hooks or an outbox relay.
      - Make in-memory event helper state names reflect whether events were attempted, accepted, or successfully handled.
      - Include in-memory or no-op event helpers only when they preserve the same public contracts for tests, local development, harness work, or CI.
      - Test event type, version, payload, envelope, publish error, handler, and helper behavior without concrete runtime providers.
    must_not:
      - Do not define product event catalogs, product-specific event meanings, or workflow emission decisions in packages/core.
      - Do not define concrete broker topics, queue names, stream names, subscribers, retry policies, dead-letter queues, ordering guarantees, schema registries, cloud SDK clients, or worker runtimes in packages/core.
      - Do not expose provider-specific broker, queue, stream, outbox, network, timeout, or delivery error shapes directly to app code.
      - Do not report failed in-memory handler delivery as a successfully published event unless the helper explicitly names attempted delivery.
      - Do not publish events that describe committed state before the corresponding transaction is known to have committed.
    agent_guidance: >
      Core events name the portable fact and the contract for publishing it.
      Apps decide which product facts matter and when to emit them, platform
      translates the event bus contract into a runtime delivery mechanism, and
      infra provisions broker resources and delivery topology.

  - id: core.queues-contracts-name-retryable-work
    title: Queue contracts name retryable work, not broker infrastructure
    severity: error
    summary: >
      packages/core queues contracts should define provider-neutral queue
      messages, payloads, send options, delivery metadata, retry/dead-letter
      metadata, queue errors, queue ports, handlers, and testing helpers while
      leaving product handlers, worker runtime, providers, and queue resources
      outside core.
    must:
      - Define provider-neutral queue message id, message type, message version, payload, message envelope, queue send options, delivery metadata, retry/dead-letter metadata, queue error, queue port, handler, and helper contracts.
      - Carry explicit positive integer queue message schema versions on queue messages before platform adapters serialize, retry, replay, or dead-letter them.
      - Keep queue payload values plain, serializable, and portable across app, platform, worker, broker, log, retry, dead-letter, and test boundaries.
      - Reject non-finite numeric values and non-plain runtime objects from queue payloads before they cross app/platform boundaries.
      - Treat message type names as portable work-kind facts rather than concrete broker queue names, SQS queue URLs, Kafka topics, routing keys, or worker deployment names.
      - Keep queue send and handler failures mapped to stable queue error codes before app code receives them.
      - Carry tenant id, correlation id, idempotency key, delay, message group, attempt count, and retry/dead-letter metadata where a product or runtime needs those facts.
      - Include in-memory or no-op queue helpers only when they preserve the same public contracts for tests, local development, harness work, or CI.
      - Test message type, message version, payload, message envelope, send options, delivery metadata, queue errors, handlers, and helper behavior without concrete runtime providers.
    must_not:
      - Do not define product job catalogs, product handler behavior, or workflow enqueue decisions in packages/core.
      - Do not define concrete broker queue resources, queue URLs, receipt handles, visibility timeouts, retry algorithms, worker loops, scheduler loops, dead-letter queue resources, ordering guarantees, cloud SDK clients, or deployment topology in packages/core.
      - Do not expose provider-specific broker, queue, stream, receipt-handle, visibility-timeout, network, timeout, or delivery error shapes directly to app code.
      - Do not treat core in-memory queue helpers as durable queue, retry, worker, or dead-letter implementations.
    agent_guidance: >
      Core queues name the portable work item and queue-facing contract. Apps
      decide which product work to enqueue and handle, platform runs worker and
      adapter mechanics, and infra provisions queue resources, DLQs, alarms,
      permissions, and deployment topology.

  - id: core.audit-contracts-record-accountability
    title: Audit contracts record accountability facts
    severity: error
    summary: >
      packages/core audit contracts should define provider-neutral audit event,
      actor, target, outcome, metadata, recorder, and recorder-error shapes
      while leaving product audit catalogs, durable storage, retention, and
      infrastructure outside core.
    must:
      - Define provider-neutral audit event id, audit event type, audit event version, actor, target, outcome, timestamp, tenant context, correlation id, reason, metadata, recorder, and recorder error contracts.
      - Carry explicit positive integer audit event schema versions before audit events cross storage, export, compliance, retention, or SIEM boundaries.
      - Use audit records for accountability facts: who did what, to which target, in which tenant or context, when, from which correlated request or job, and with which outcome.
      - Require an explicit actor and target on audit events; represent anonymous/system actors and global/system targets deliberately instead of omitting those fields.
      - Distinguish succeeded, denied, and failed outcomes without requiring consumers to parse operational logs.
      - Keep audit metadata plain, serializable, and portable across storage, review, export, compliance, and test boundaries.
      - Reject non-finite numeric values and non-plain runtime objects from audit metadata before it crosses storage, export, or compliance boundaries.
      - Keep audit explanations translation-ready when they may be displayed to people.
      - Include in-memory or no-op audit helpers only when they preserve the same public contracts for tests, local development, harness work, or CI.
      - Test audit type, audit event version, target, actor, outcome, metadata, recorder error, and helper behavior without concrete runtime providers.
    must_not:
      - Do not use audit as a replacement for operational logging, event buses, analytics events, monitoring metrics, or reporting exports.
      - Do not put product-specific audit catalogs, workflow emission decisions, storage tables, object-storage buckets, retention policy, legal hold, redaction jobs, export workflows, SIEM integrations, CloudWatch sinks, cloud SDK clients, or provider adapters in packages/core.
      - Do not carry secrets, tokens, raw credentials, raw request bodies by default, rich provider objects, or runtime-only values as audit metadata.
      - Do not use missing actor or missing target as shorthand for anonymous, system, global, or background work.
      - Do not expose provider-specific storage, network, timeout, retention, or delivery error shapes directly to app code.
    agent_guidance: >
      Core audit names the durable accountability record and recording port.
      Apps decide which product actions require audit records, platform makes
      recording durable, and infra provisions storage, retention, and compliance
      resources.

  - id: core.translation-ready-meaning-not-prose
    title: Core contracts pass meaning, not final localized prose
    severity: error
    summary: >
      Core, platform, and app-facing contracts should pass stable machine meaning
      plus translation/localization hooks instead of final user-facing strings.
    must:
      - Use translation-ready descriptors for user-facing or consumer-facing explanations.
      - Prefer stable codes, optional message keys, fallback/default messages, and primitive interpolation params.
      - Keep validation, errors, policy denials, notifications, reports, and API/display responses compatible with future i18n and localization layers.
      - Treat fallback/default messages as debugging, testing, log, or untranslated-context text, not canonical localized copy.
    must_not:
      - Do not make validation, platform adapters, app services, or core errors own final localized prose.
      - Do not put message catalogs, translator implementations, locale negotiation, or regional formatting behavior into unrelated core modules.
      - Do not pass rich objects, dates, money values, or provider-specific objects as translation params; pass stable primitive facts and let localization format them.
    agent_guidance: >
      When a contract may eventually be displayed to a person, ask:
      What happened? What stable code identifies it? Which translation key can
      render it? Which primitive params does the renderer need? Keep final words
      and regional formatting in i18n/localization or the presentation boundary.

