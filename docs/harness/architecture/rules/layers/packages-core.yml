description: >
  Rules governing what may live in packages/core and how agents should treat
  core as a stable shared foundation.

applies_to:
  paths:
    - "packages/core/**"

related_rulesets:
  - docs/harness/architecture/rules/concerns/ci-quality.yml
  - docs/harness/architecture/rules/concerns/dependency-direction.yml

recommended_modules:
  - id: shared
    purpose: "Common primitives such as IDs, results, errors, message descriptors, clocks, context, and lifecycle."
    consumed_by: "apps, platform, tests"
  - id: config
    purpose: "Provider-neutral configuration source, primitive reader, schema, and validation-error contracts."
    consumed_by: "runtime apps and platform services"
  - id: logging
    purpose: "Provider-neutral operational log record, logger, default sensitive-field redactor, and redacting-wrapper contracts."
    consumed_by: "apps, workers, platform"
  - id: monitoring
    purpose: "Health check and metrics contracts."
    consumed_by: "apps, workers, platform"
  - id: security
    purpose: "Defensive primitives and security contracts."
    consumed_by: "apps and platform security adapters"
  - id: authn
    purpose: "Global principal identity, principal type, authentication result, and authenticator contracts."
    consumed_by: "apps and platform identity integrations"
  - id: authz
    purpose: "Permission, resource, relationship, ABAC attribute, authorization request, and decision contracts."
    consumed_by: "apps and feature packages"
  - id: tenancy
    purpose: "Tenant identifiers, context packets, resolver ports, and isolation primitives."
    consumed_by: "apps, platform, and most runtime modules"
  - id: validation
    purpose: "Standard validation and error models."
    consumed_by: "APIs, apps, and possibly frontend packages"
  - id: persistence
    purpose: "Transaction, pagination, repository, and outbox contracts."
    consumed_by: "apps and platform persistence implementations"
  - id: events
    purpose: "Event envelopes, buses, and versioning contracts."
    consumed_by: "apps, workers, platform messaging"
  - id: queues
    purpose: "Queue messages, consumers, retry, and dead-letter concepts."
    consumed_by: "workers and platform queue adapters"
  - id: async-jobs
    purpose: "Background job contracts and lifecycle."
    consumed_by: "apps and workers"
  - id: notifications
    purpose: "Notification contracts and delivery model."
    consumed_by: "apps, workers, and provider adapters"
  - id: files
    purpose: "File storage and metadata contracts."
    consumed_by: "apps and platform storage adapters"
  - id: audit
    purpose: "Audit event model and recorder interface."
    consumed_by: "apps and platform audit storage"
  - id: reporting
    purpose: "Report request, generation, and export contracts."
    consumed_by: "apps and workers"
  - id: analytics
    purpose: "Product tracking and identity contracts."
    consumed_by: "apps and analytics adapters"
  - id: i18n
    purpose: "Translation and message catalog contracts."
    consumed_by: "apps, notifications, and design system"
  - id: localization
    purpose: "Date, time, locale, currency, and regional formatting contracts."
    consumed_by: "apps, notifications, and design system"
  - id: testing
    purpose: "In-memory and no-op implementations for local tests and CI."
    consumed_by: "apps, harness, and CI tests"

test_taxonomy:
  - type: unit
    role: primary
    minimum_evidence:
      - "Exercise accepted, rejected, boundary, and failure cases for core primitives, validation contracts, security/tenancy helpers, and result/error shapes without runtime dependencies."
    must_not:
      - "Do not count downstream app or platform tests as proof of core-owned primitive, validation, security, tenancy, or failure behavior."
    categories:
      - id: critical_path
        should_prove:
          - "Core primitives, result/error helpers, policies, clocks, context helpers, and small pure functions behave as stable foundations."
      - id: validation
        should_prove:
          - "Validation contracts, error models, config contracts, IDs, and defensive primitives accept and reject expected values."
      - id: edge_cases
        should_prove:
          - "Empty values, boundary identifiers, locale/currency/date variants, pagination boundaries, retry limits, and optional metadata behave intentionally."
      - id: security_permissions
        should_prove:
          - "Authn, authz, tenancy, security, redaction, and audit primitives preserve isolation and defensive defaults."
      - id: failure_modes
        should_prove:
          - "Core error/result shapes and no-op or in-memory testing implementations fail predictably without runtime dependencies."
  - type: type_level
    role: primary
    minimum_evidence:
      - "Include compile-pass and compile-fail assertions for public exports, generic constraints, branded identifiers, discriminated unions, and invalid contract shapes where TypeScript can express the rule."
    must_not:
      - "Do not rely only on runtime tests, snapshots, or successful package builds to prove intended type rejection or inference behavior."
    categories:
      - id: compatibility_contracts
        should_prove:
          - "Public core entry points, exported types, generic constraints, and inference behavior remain stable for apps, platform, and tests."
      - id: validation
        should_prove:
          - "Compile-time constraints reject invalid contract shapes where TypeScript can express the rule."
      - id: edge_cases
        should_prove:
          - "Optional fields, branded identifiers, discriminated unions, and extension points preserve intended narrowing and exhaustiveness."
  - type: contract
    role: primary
    minimum_evidence:
      - "Prove ports, policy facts, error states, lifecycle states, and testing implementations remain implementable by platform and consumable by apps without runtime leakage."
    must_not:
      - "Do not accept tests that instantiate concrete platform providers, app workflows, cloud SDKs, or product-specific behavior as core contract proof."
    categories:
      - id: compatibility_contracts
        should_prove:
          - "Ports and contracts remain implementable by platform and consumable by apps without leaking runtime implementations into core."
      - id: security_permissions
        should_prove:
          - "Auth, tenancy, permission, audit, and security contracts preserve the required policy facts across consumers."
      - id: failure_modes
        should_prove:
          - "Contract-defined errors, retries, and lifecycle states are explicit enough for platform implementations and app consumers."
  - type: integration
    role: conditional
    minimum_evidence:
      - "Exercise in-memory or no-op helpers through realistic app/platform test scenarios while preserving the same public contracts concrete implementations must satisfy."
    must_not:
      - "Do not let helper integration tests mask missing unit, type-level, or contract evidence for the core surface itself."
    categories:
      - id: use_case_scenarios
        should_prove:
          - "In-memory or no-op test implementations support realistic app and platform test scenarios without external services."
      - id: compatibility_contracts
        should_prove:
          - "Core testing helpers exercise the same contracts that concrete platform implementations must satisfy."

rules:
  - id: core.stable-cross-cutting-only
    title: Only stable cross-cutting concepts belong in core
    severity: error
    summary: >
      Code belongs in packages/core only when it defines a stable, cross-cutting
      Kanbien concept or contract that multiple parts of the system must use
      consistently.
    must:
      - Define stable contracts, types, interfaces, errors, policies, or small pure helpers.
      - Prefer concepts such as TenantId, Principal, Permission, AuditEvent, EventEnvelope, Locale, and CorrelationId.
      - Start local first, then extract to core only after the abstraction is stable and genuinely reused.
      - Add core concepts only when they reduce inconsistency, operational risk, security risk, or repeated reinvention.
    must_not:
      - Do not add code to core merely because it might be reused.
      - Do not put product-specific workflows in core.
      - Do not put unstable experiments in core.
      - Do not add a core module without a clear owner.
    agent_guidance: >
      When deciding whether to place code in packages/core, ask:
      Is this stable? Is it cross-cutting? Is it product-neutral?
      Does multiple code need the same contract? If not, keep it outside core.

  - id: core.admission-requires-owner-and-current-need
    title: Core admission requires ownership and current need
    severity: error
    summary: >
      A core module is a long-lived shared foundation. It needs a clear owner,
      present consumers, tests, and documentation before it moves into core.
    must:
      - Use the sequence: start local, observe repetition, extract a stable abstraction, document it, test it, then move it to core.
      - Identify the owning team, module owner, or explicit maintenance owner before adding a core surface.
      - Identify current consumers that need the same contract or concept now.
      - Document the contract, allowed dependencies, and intended consumers.
    must_not:
      - Do not add a core module because reuse is only hypothetical.
      - Do not add a core module without an owner.
      - Do not add abstract frameworks before real product needs exist.
      - Do not use core as a convenience utility drawer.
    agent_guidance: >
      If ownership or real reuse is unclear, keep the code local and record the
      admission gap instead of moving it into packages/core.

  - id: core.no-upward-imports
    title: Core must not import apps, platform, or infra
    severity: error
    summary: >
      packages/core must remain independent of applications, runtime implementations,
      and infrastructure.
    must:
      - Keep core dependency-light and framework-independent.
      - Let apps import core.
      - Let platform implement core contracts.
    must_not:
      - Do not import from apps/** inside packages/core.
      - Do not import from platform/** inside packages/core.
      - Do not import from infra/** inside packages/core.
      - Do not import cloud SDKs, ORMs, web servers, or vendor clients into core.
    forbidden_imports:
      - "apps/**"
      - "platform/**"
      - "infra/**"
    agent_guidance: >
      If a proposed core change requires importing an app, platform module,
      cloud SDK, ORM, or infrastructure resource, the plan is wrong. Move the
      implementation to platform or the product-specific behavior to apps.

  - id: core.contracts-not-implementations
    title: Core defines contracts, platform provides implementations
    severity: error
    summary: >
      Core should define the shared contract. Runtime-specific implementations
      belong in platform. Product workflows belong in apps.
    must:
      - Define ports and contracts in core.
      - Put concrete provider integrations in platform.
      - Put product-specific behavior in apps or feature packages.
    must_not:
      - Do not put S3, Kafka, Redis, Fastify, Prisma, or cloud-provider implementation code in core.
      - Do not put CRM, billing, onboarding, or workflow-specific behavior in core.
    examples:
      good:
        - "packages/core/files defines FileStorage."
        - "platform/storage-s3 implements S3FileStorage."
        - "apps/crm decides when to store or retrieve a CRM document."
      bad:
        - "packages/core imports an S3 client."
        - "packages/core imports apps/crm."
        - "packages/core contains CRMUser or BillingPlan."
    agent_guidance: >
      Use core for the shape of the dependency, not the concrete runtime behavior.
      The contract goes in core. The implementation goes in platform. The business
      decision goes in apps.

  - id: core.capability-modules-stay-contract-shaped
    title: Core capability modules stay contract-shaped
    severity: error
    summary: >
      Core modules should expose clear capability contracts and small primitives,
      not empty ceremony, product workflow engines, or concrete runtime hosts.
    must:
      - Organize core around capability modules such as authn, authz, tenancy, validation, persistence, files, events, queues, logging, monitoring, audit, config, security, reporting, analytics, i18n, and localization.
      - Prefer module files such as index.ts, types.ts, errors.ts, ports.ts, policy.ts, and testing.ts when those files clarify ownership.
      - Include in-memory or no-op test implementations only when they support tests, local development, harness work, or CI.
      - Keep concepts visible in types, especially tenant, principal, permission, audit event, event envelope, locale, currency, and correlation identifiers.
    must_not:
      - Do not create empty module ceremony when a module does not need every file.
      - Do not put concrete worker processes, provider SDK integrations, product-specific handlers, UI, infrastructure definitions, or deployment resources in core modules.
      - Do not confuse logs, audit, analytics, monitoring, reporting, and observability; keep each concern explicit.
    agent_guidance: >
      When adding a core module, choose the smallest contract-shaped surface
      that names the Kanbien concept clearly and leaves implementation details
      to apps, platform, or infrastructure.

  - id: core.shared-primitives-stay-strict-and-portable
    title: Shared primitives stay strict and portable
    severity: error
    summary: >
      packages/core shared primitives should carry stable provider-neutral
      meaning and reject ambiguous runtime-specific or locale-specific shapes.
    must:
      - Keep shared identifiers, result/error shapes, message descriptors, clocks, and request context values dependency-free and JSON-safe.
      - Treat ISODateTime values as explicit ISO date-time strings with timezone information.
      - Normalize valid ISODateTime input to a stable JSON-safe ISO string.
      - Keep message descriptor params primitive and translation/localization friendly.
    must_not:
      - Do not accept date-only strings, localized prose dates, or implicit local-time strings as ISODateTime values.
      - Do not pass provider objects, Date instances, money objects, or other rich runtime values as shared message params.
      - Do not put translation catalogs, locale negotiation, or region-specific formatting inside shared primitives.
    agent_guidance: >
      Shared primitives are the bottom of the contract stack. When a value can
      vary by locale, runtime, provider, or presentation boundary, convert it to
      a stable primitive fact before it enters shared core contracts.

  - id: core.logging-sensitive-fields-owned-by-logging
    title: Common sensitive log fields are maintained in core logging
    severity: error
    summary: >
      Common default sensitive-field names for operational log redaction belong
      in the provider-neutral logging contract so apps and platform adapters
      inherit consistent defensive behavior.
    must:
      - Maintain common provider-neutral sensitive field names in the packages/core logging module.
      - Redact sensitive diagnostic fields before records reach concrete runtime sinks.
      - Provide an extension point for app-specific, platform-specific, or provider-specific sensitive fields.
      - Keep redaction behavior deterministic and testable with unit and type-level evidence.
    must_not:
      - Do not bury common default sensitive-field names only in app or platform adapters.
      - Do not require concrete log sinks, observability providers, cloud SDKs, or runtime hosts to use core redaction contracts.
      - Do not rely only on free-text value scanning as the default redaction policy.
    agent_guidance: >
      When a new category of sensitive operational log field appears, decide
      whether it is common enough for the core logging defaults. If yes, add it
      to the core logging module and tests. If it is product-specific or
      provider-specific, extend the default redactor at the consuming boundary.

  - id: core.tenancy-context-provider-neutral
    title: Tenancy contracts define tenant context, not tenant discovery
    severity: error
    summary: >
      packages/core may define tenant identifiers, tenant context packets,
      resolver ports, and small pure helpers, but runtime tenant discovery
      belongs in apps or platform adapters.
    must:
      - Keep TenantId, TenantContext, TenantResolver, and tenant isolation primitives provider-neutral.
      - Use tenant context as the shared contract for authorization, audit, logging, events, and persistence scopes.
      - Keep tenant lookup inputs translated at the app or platform boundary before they enter core contracts.
      - Test tenant identity, resolver, and isolation helper behavior without runtime providers.
    must_not:
      - Do not make packages/core parse hostnames, JWTs, request headers, database rows, AWS accounts, or deployment manifests to discover tenants.
      - Do not put product-specific tenant lifecycle, billing, onboarding, or workspace behavior in packages/core.
      - Do not accept unbranded strings where a TenantId is required by a core contract.
    agent_guidance: >
      When adding tenant-aware behavior, keep the question split in two:
      core defines the tenant context shape; apps and platform decide how the
      current tenant is discovered and then pass that context into core-facing
      contracts.

  - id: core.authn-principal-is-global-actor
    title: Authentication principal is the global actor, not a tenant profile
    severity: error
    summary: >
      packages/core authn contracts should model the authenticated global
      actor identity and authenticator port without owning provider checks,
      authorization decisions, or tenant-specific profile/account workflows.
    must:
      - Keep PrincipalId, PrincipalType, Principal, AuthenticationResult, and Authenticator provider-neutral.
      - Treat Principal as the global authenticated actor identity.
      - Use current tenant context only for the active request or job when known.
      - Normalize claims into plain serializable provider-neutral values before constructing a Principal.
      - Leave tenant-specific profiles, memberships, roles, preferences, and account lifecycle to app or product modules.
      - Test principal identity, current tenant context, and authenticator helper behavior without runtime providers.
    must_not:
      - Do not make packages/core parse JWTs, verify sessions, check API keys, or call identity provider SDKs.
      - Do not put authorization decisions inside authentication contracts.
      - Do not model the Principal as a tenant-specific user profile or account.
      - Do not treat a current tenant id on a principal as the actor's exhaustive tenant membership list.
      - Do not carry raw provider objects, Date instances, sessions, credentials, access tokens, refresh tokens, or other rich runtime values as principal claims.
    agent_guidance: >
      Keep three ideas separate: authentication identifies the global actor,
      tenancy identifies the current tenant context, and app/product modules
      model tenant-specific accounts or memberships when the product needs them.

  - id: core.authz-asks-permission-questions-without-owning-policy
    title: Authorization contracts ask permission questions without owning product policy
    severity: error
    summary: >
      packages/core authz contracts should support role/permission,
      relationship/resource, and attribute-based authorization questions while
      leaving concrete product policy, relationship inheritance, and policy
      engines outside core.
    must:
      - Model authorization requests with principal, permission, tenant context where relevant, resource references, relationship facts, attributes, and plain facts.
      - Support RBAC-friendly permission strings, ReBAC-friendly resource and relation facts, and ABAC-friendly principal/tenant/resource/environment attributes.
      - Keep permission helper output to non-empty resource:action strings without whitespace or nested colon separators.
      - Return explicit allow or deny decisions; denied decisions must include translation-ready reasons.
      - Keep authorization attributes, facts, and evidence plain and serializable.
      - Keep authorization separate from authentication.
      - Test request, decision, resource, relation, and attribute helper behavior without runtime providers or product policy engines.
    must_not:
      - Do not authenticate credentials inside authz contracts.
      - Do not hardcode product-specific roles, team membership rules, deal access inheritance, or tenant-specific permission meanings in packages/core.
      - Do not implement a full ABAC/ReBAC policy language or provider adapter in packages/core.
      - Do not accept provider-specific objects or rich runtime values as default authorization attributes.
    agent_guidance: >
      Core should make the authorization question precise. Apps and product
      modules answer it with product policy, and platform may delegate the
      Authorizer port to a policy engine when needed.

  - id: core.persistence-contracts-name-storage-boundaries
    title: Persistence contracts name storage boundaries
    severity: error
    summary: >
      packages/core persistence contracts should define provider-neutral
      repository, pagination, error, concurrency, transaction, and after-commit
      shapes while leaving database implementation, topology, and product
      queries outside core.
    must:
      - Define provider-neutral page request, page, repository, save option, unit-of-work, transaction, and after-commit contracts.
      - Keep page total counts optional, but require shared non-negative integer page-total contracts when total records or total matching records are included.
      - Use stable persistence error codes for common storage outcomes such as conflict, duplicate, timeout, unavailable storage, invalid page request, not found, and transaction failure.
      - Support optimistic concurrency through an expected concurrency token when stale writes must be rejected.
      - Keep after-commit hooks for side effects that should only run after successful transaction commit.
      - Include in-memory helpers only when they preserve the same public contracts for tests, local development, harness work, or CI.
      - Test pagination, conflict, transaction, after-commit, and helper behavior without concrete runtime providers.
    must_not:
      - Do not define SQL, ORM models, database clients, database tables, indexes, shards, backups, object-storage clients, or cloud SDK behavior in packages/core.
      - Do not put product-specific repositories, product query methods, or workflow decisions in packages/core.
      - Do not require total counts for every page response or invent product-specific total-count fields outside the shared page-total contract.
      - Do not expose provider-specific lock, deadlock, network, timeout, or conditional-write error shapes directly to app code.
      - Do not publish events or run side effects before a transaction is known to have committed.
    agent_guidance: >
      Core persistence names the contract and stable failure meanings. Platform
      translates real storage behavior into that contract, infra provisions the
      storage topology and resilience resources, and apps decide product-specific
      query and workflow behavior.

  - id: core.translation-ready-meaning-not-prose
    title: Core contracts pass meaning, not final localized prose
    severity: error
    summary: >
      Core, platform, and app-facing contracts should pass stable machine meaning
      plus translation/localization hooks instead of final user-facing strings.
    must:
      - Use translation-ready descriptors for user-facing or consumer-facing explanations.
      - Prefer stable codes, optional message keys, fallback/default messages, and primitive interpolation params.
      - Keep validation, errors, policy denials, notifications, reports, and API/display responses compatible with future i18n and localization layers.
      - Treat fallback/default messages as debugging, testing, log, or untranslated-context text, not canonical localized copy.
    must_not:
      - Do not make validation, platform adapters, app services, or core errors own final localized prose.
      - Do not put message catalogs, translator implementations, locale negotiation, or regional formatting behavior into unrelated core modules.
      - Do not pass rich objects, dates, money values, or provider-specific objects as translation params; pass stable primitive facts and let localization format them.
    agent_guidance: >
      When a contract may eventually be displayed to a person, ask:
      What happened? What stable code identifies it? Which translation key can
      render it? Which primitive params does the renderer need? Keep final words
      and regional formatting in i18n/localization or the presentation boundary.

