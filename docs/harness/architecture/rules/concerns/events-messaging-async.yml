success_criteria:
  - "The file exists at docs/harness/architecture/rules/concerns/events-messaging-async.yml."
  - "It distinguishes domain events from commands."
  - "It defines ownership splits for core contracts, app business meaning, platform runtime mechanics, and infra resources."
  - "It requires event/message/job envelope metadata for tenancy, correlation, causation, versioning, attempts, idempotency, and observability where relevant."
  - "It requires outbox-shaped consistency for state changes that must publish events."
  - "It requires queues and jobs to have retry, dead-letter, idempotency, and observability handling."
  - "It keeps workers and schedulers platform-run but app-owned in business meaning."
  - "It requires async consumers to be idempotent and owned."
  - "It includes manually verified source_refs back to the core architecture guide."
