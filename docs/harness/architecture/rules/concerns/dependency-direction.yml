id: concern.dependency-direction
title: Dependency direction rules
version: 2
status: active

description: >
  Repo-wide dependency direction rules for preserving architectural boundaries
  across apps, packages, platform, harness, script command surfaces, infra, and
  design-system code.

applies_to:
  paths:
    - "apps/**"
    - "packages/**"
    - "platform/**"
    - "harness/**"
    - "scripts/**"
    - "infra/**"

rules:
  - id: dependency.core-has-no-upward-imports
    title: Core must not import apps, platform, or infra
    severity: error
    summary: >
      packages/core is a foundational shared layer. It must not depend on
      applications, runtime platform implementations, or infrastructure.
    must:
      - "Allow apps to import packages/core."
      - "Allow platform to import packages/core."
      - "Allow harness and tests to use packages/core where appropriate."
    must_not:
      - "Do not import apps/** from packages/core/**."
      - "Do not import platform/** from packages/core/**."
      - "Do not import infra/** from packages/core/**."
      - "Do not import cloud SDKs, ORMs, web servers, queue providers, or vendor runtime clients into packages/core."
    forbidden_imports:
      from:
        - "packages/core/**"
      to:
        - "apps/**"
        - "platform/**"
        - "infra/**"

  - id: dependency.apps-are-not-foundations
    title: Apps must not be imported as shared foundations
    severity: error
    summary: >
      Applications are deployable or mountable business compositions. Shared
      packages, platform modules, script capabilities, and infrastructure
      should not depend on app internals.
    must:
      - "Keep app-specific business behavior inside apps/*."
      - "Expose app integration through explicit mount files or manifests."
      - "Keep app-internal service, feature, capability, domain, use-case, route, job, health, config, and workflow structure opaque behind approved public app integration surfaces."
    must_not:
      - "Do not import apps/* internals from packages/**."
      - "Do not import apps/* internals from platform/** except approved composition-root mount files."
      - "Do not import apps/* internals from scripts/** at runtime."
      - "Do not import apps/* internals from infra/**."

  - id: dependency.package-runtime-boundaries
    title: Package runtime code must not depend on apps, infra, scripts, or harness
    severity: error
    summary: >
      Packages are reusable product, domain, core, generated, or support
      libraries. Runtime package code may depend on approved packages and
      approved platform contracts, but it must not become app, infra, scripts,
      or harness code in disguise.
    must:
      - "Give each package a clear public API and import from package entry points rather than random internal files."
      - "Allow packages to depend on other packages when domain boundaries permit it."
      - "Allow non-core packages to depend on approved platform contracts or platform adapters when the package's ownership model explicitly allows that dependency."
      - "Apply the stricter packages/core rules when the package path is packages/core/**."
    must_not:
      - "Do not import apps/** from packages/**."
      - "Do not import infra/** from runtime package code."
      - "Do not import scripts/** from runtime package code."
      - "Do not import harness/** from runtime package code outside tests."
      - "Do not hide app bootstrapping, deployment logic, entity-builder engine internals, or raw infrastructure provisioning inside ordinary packages."
    agent_guidance: >
      When a package needs app, infra, script command-surface, or harness code,
      stop and choose a better owner. If the package is packages/core, apply
      the stricter no-platform and no-vendor-client rules from the core layer.

  - id: dependency.platform-stays-runtime-and-product-neutral
    title: Platform stays runtime-owned and product-neutral
    severity: error
    summary: >
      platform/ owns runtime lifecycle and shared runtime machinery. It should
      not import product workflows, define business concepts, or provision
      infrastructure resources.
    must:
      - "Use platform for process startup, HTTP server creation, route registration, middleware, auth integration, request context, error mapping, logging, health checks, config loading, job execution, and shutdown."
      - "Let platform depend on packages/core and approved runtime/provider clients."
      - "Expose platform contracts that apps can implement or consume at approved boundaries."
      - "Keep app mounting imports in composition roots such as platform/server/mount.ts."
    must_not:
      - "Do not put CRM, billing, onboarding, invoice, lead, account, subscription, campaign, or other product-specific concepts in platform."
      - "Do not import app-specific services, repositories, routes, jobs, or business logic from platform internals."
      - "Do not make platform modules depend on app-internal service, feature, capability, domain, use-case, route, job, health, config, or workflow structure."
      - "Do not put Terraform, Pulumi, Kubernetes manifests, cloud provisioning, or IAM resource definitions in platform."
      - "Do not make normal product features require platform changes unless the runtime contract itself is changing."
    agent_guidance: >
      If platform code starts answering product questions instead of runtime
      questions, move that code into the owning app or package and keep only the
      runtime contract in platform.

  - id: dependency.platform-composition-root-exception
    title: Platform may import app mounts only at the composition root
    severity: error
    summary: >
      The platform runtime may import app mount modules only from approved
      composition-root files such as platform/server/mount.ts or platform/workers/mount.ts.
    must:
      - "Let platform composition roots mount apps through app.mount.ts files."
      - "Keep the rest of platform unaware of business app internals."
    must_not:
      - "Do not import app services, repositories, routes, or business logic directly into platform internals."
      - "Do not import app-internal service, feature, capability, domain, use-case, route, job, health, config, or workflow modules into platform internals."
      - "Do not let platform modules depend on CRM, billing, onboarding, or other product-specific concepts."
    allowed_exceptions:
      - from: "platform/server/mount.ts"
        to: "apps/**/app.mount.ts"
      - from: "platform/workers/mount.ts"
        to: "apps/**/app.mount.ts"

  - id: dependency.design-system-one-way
    title: Design-system dependencies must flow from tokens to applications
    severity: error
    summary: >
      Design-system layers must remain domain-neutral and follow one-way
      dependency direction from tokens to primitives to patterns to components
      to applications.
    must:
      - "Keep foundation tokens independent of React and application code."
      - "Let token resolvers depend on tokens, not components or applications."
      - "Let primitives depend on generated token artifacts."
      - "Let patterns depend on primitives and generated token artifacts."
      - "Let components depend on primitives and patterns."
      - "Let applications consume design-system components."
      - "Keep design-system components free of business logic, routing, permissions, and product workflows."
    must_not:
      - "Do not import apps/** into packages/design-system/**."
      - "Do not let tokens import React."
      - "Do not let primitives import higher-level components."
      - "Do not let design-system components import product domain models."

  - id: dependency.production-must-not-depend-on-harness
    title: Production code must not depend on harness
    severity: error
    summary: >
      The harness is for test, local development, governance, generation, and
      validation support. Production runtime code must not import it.
    must:
      - "Use harness for tests, fixtures, fakes, contract validation, and development orchestration."
    must_not:
      - "Do not import harness/** from production apps, packages, or platform code."
      - "Do not put production runtime validation or business logic in harness."

  - id: dependency.production-must-not-depend-on-scripts
    title: Production code must not depend on script command surfaces
    severity: error
    summary: >
      scripts/ contains numbered layer command capabilities for generators,
      migration helpers, lint rules, release helpers, and repo automation.
      Production code may use generated outputs but must not import generator
      or command runtime code.
    must:
      - "Let numbered script capabilities generate artifacts."
      - "Let production code import generated artifacts only from their intended output locations."
    must_not:
      - "Do not import scripts/** from runtime apps, packages, or platform code."
      - "Do not put deployable runtime behavior inside scripts/**."

  - id: dependency.infra-consumes-artifacts-not-runtime-internals
    title: Infra consumes deployment metadata, not runtime internals
    severity: error
    summary: >
      infra/ owns infrastructure-as-code and deployment resources. It should
      consume manifests, config, or generated deployment metadata rather than
      importing app implementation internals.
    must:
      - "Use app manifests or generated metadata to drive deployment."
      - "Keep Terraform, cloud resources, secrets, networking, and CI/CD infrastructure in infra/."
    must_not:
      - "Do not import app services, repositories, route handlers, or product business logic into infra/**."
      - "Do not put infrastructure provisioning code in platform or packages/core."

  - id: dependency.generated-code-boundary
    title: Generated code is an output, generators are not runtime dependencies
    severity: error
    summary: >
      Generated files may be used by production code when they are checked into
      the appropriate package or app output location. The generator itself should
      remain in a numbered script capability or harness code.
    must:
      - "Keep generation deterministic and idempotent."
      - "Import generated artifacts only from approved generated output paths."
    must_not:
      - "Do not import generator implementation code into production runtime code."
      - "Do not hand-edit generated files unless the generated-file policy explicitly allows it."

agent_guidance: >
  When an agent proposes a change, it must identify which layer owns the code,
  then verify that every import follows the dependency direction rules. If a
  dependency violates these rules, the agent should stop, explain the violation,
  and propose a corrected file placement.

