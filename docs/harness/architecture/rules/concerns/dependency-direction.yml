success_criteria:
  - "The file exists at docs/harness/architecture/rules/concerns/dependency-direction.yml."
  - "It defines repo-wide dependency direction rules."
  - "It covers apps, reusable packages, packages/core, platform, design-system, harness, script command surfaces, infra, and generated code."
  - "It includes the platform composition-root exception for importing app mounts."
  - "It keeps app-internal structure opaque behind approved public mount modules and manifests."
  - "It includes manually verified source_refs back to the relevant markdown guides."
  - "It does not duplicate the full contents of packages-core.yml, but it may reference overlapping core dependency principles."
  - "No unrelated files are changed."
