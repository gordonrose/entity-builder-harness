success_criteria:
  - "The file exists at docs/harness/architecture/rules/concerns/platform-adapter-consumption.yml."
  - "Feature code consumes packages/core contracts and avoids platform, adapter, and vendor SDK imports."
  - "App bootstrap is treated as the provider selection boundary."
  - "Adapter packages expose predictable factories, config types and schemas, metadata, health checks where useful, and lifecycle hooks where useful."
  - "Platform profiles compose one-package-per-adapter implementations into stable app-facing platform objects."
  - "Capability interfaces avoid vendor-specific leakage into core contracts."
  - "Backwards compatibility is managed at core contract and platform profile boundaries."
  - "platform/shared remains provider-neutral and domain-neutral."
  - "The ruleset includes manually verified source_refs back to the platform adapter consumption guide."
