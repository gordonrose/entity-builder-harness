success_criteria:
  - "The file exists at docs/harness/architecture/rules/concerns/reporting-analytics-audit.yml."
  - "It keeps reporting, analytics, business intelligence, audit, logging, monitoring, and observability distinct."
  - "It requires audit records to be durable accountability evidence with actor, tenant, resource, action, timestamp, retention, access, and integrity expectations."
  - "It gives reports lifecycle, access, export, tenant, retention, and audit handling."
  - "It keeps analytics privacy-aware, consent-aware, taxonomy-governed, and distinct from audit."
  - "It requires structured redacted logging with correlation context."
  - "It requires monitoring and observability to have health/SLO signals, ownership, and alert response paths."
  - "It defines ownership splits across core contracts, app business meaning, platform implementations, and infra resources."
  - "It includes manually verified source_refs back to the core architecture guide."
