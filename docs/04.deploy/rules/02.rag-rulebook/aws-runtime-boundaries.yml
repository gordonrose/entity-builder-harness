success_criteria:
  - "The file exists at docs/04.deploy/rules/02.rag-rulebook/aws-runtime-boundaries.yml."
  - "It blocks AWS mutation when account, region, environment, service, or owner is ambiguous."
  - "It separates network exposure, secrets, observability, health, and rollback concerns."
  - "It records ECS-style failure detection and rollback as required proof when that runtime is used."
  - "It keeps MCP public exposure and tool execution gated by explicit runtime boundaries."
