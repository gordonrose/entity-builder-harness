success_criteria:
  - "The file exists at docs/04.deploy/rules/02.rag-rulebook/deployment-readiness-checks.yml."
  - "It defines remote-main-to-GitHub-to-AWS readiness as a deploy execution gate, not a planning suggestion."
  - "It separates generic readiness from runtime-specific AWS checks."
  - "It names immutable artifacts, IaC ownership, supply-chain evidence, secrets, MCP access control, cost and capacity controls, and operational runbooks."
  - "It keeps prose-only readiness checks visible until they become executable or auditable checks."
