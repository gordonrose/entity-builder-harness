#   version: 1
#   status: active
#   layer: 06.shared
#   domain: governance
#   disciplines:
#   - agentic
#   kind: config
#   purpose: Define routing policy configuration for agent routing.
#   portability:
#     class: required
#     targets:
#     - llm-workbench
#     - entity-builder
#     - design-system-builder
#   used_by:
#   - id: repo.agents
#     path: AGENTS.md

classification_order:
  - mixed
  - chat
  - shared
  - harness
  - rag-rulebook
  - education
  - aws
  - product

mode_order:
  - implementation
  - execution
  - planning
  - discovery
  - unknown

layers:
  chat:
    use_when:
      - task changes chat startup
      - task changes chat session metadata or session logs
      - task changes chat-owned worktree creation or cleanup
      - task changes chat branch refresh from main
      - task changes chat commit or checkpoint flow
      - task changes promotion from chat branch to main
      - task changes chat closeout, chat shortcuts, or chat reporting
      - task changes chat lifecycle scripts or compatibility workflows
    workflow_index: .agentic/00.chat/workflows/README.md

  shared:
    use_when:
      - task changes git workflow
      - task changes commit process
      - task changes deployment/release process shared by all work
      - task changes context compaction or handoff process
    workflow_index: .agentic/shared/workflows/README.md

  harness:
    use_when:
      - task changes AGENTS.md or CLAUDE.md
      - task changes .agentic structure
      - task changes agents, skills, workflows, gates, routing, model registry
      - task changes harness artifacts, artefacts, standards, or guidelines
      - task changes vendor adapters for Codex, Claude, or Mistral
      - task changes governed script permissions or agent shell allowlists
      - task improves token usage or instruction loading
    workflow_index: .agentic/01.harness/workflows/README.md

  rag-rulebook:
    use_when:
      - task changes reusable RAG or rulebook machinery
      - task creates YAML rulebooks, rule packs, rulesets, chunks, indexes, graph relationships, intent models, or context packets from source material
      - task builds, plans, or changes a standalone RAG/rulebook service
      - task separates harness, product, design-system, deploy, or education corpora
      - task changes corpus ingestion, chunking, retrieval, reranking, or context augmentation rules
    workflow_index: .agentic/02.rag-rulebook/workflows/README.md

  education:
    use_when:
      - task creates educational resources from repo work
      - task mines commit logs for teaching material, blog posts, talks, or classroom assets
      - task drafts lecture material, talk scripts, teaching examples, or educational blog posts
      - task calibrates lecturer voice, humor, storytelling, tone, or structure for education outputs
      - task incorporates source-backed teaching, storytelling, humor, talk design, or writing principles
    workflow_index: .agentic/education/workflows/README.md

  aws:
    use_when:
      - task inspects AWS account, profile, region, environment, or resource state
      - task changes AWS infrastructure, runtime resources, deployment targets, or cloud configuration
      - task diagnoses ECS, ECR, RDS, ElastiCache, Route 53, load balancers, App Runner, Elastic Beanstalk, CloudWatch, or IAM for this repo
      - task plans or executes AWS operational changes
      - task documents AWS runbooks, non-secret inventory, or cloud environment decisions
    workflow_index: .agentic/aws/workflows/README.md

  product:
    use_when:
      - task changes application source code
      - task changes product discovery artefacts
      - task changes frontend design system
      - task changes business application behaviour
      - task changes platform/auth/tenancy/data model
      - task changes tests, CI, deployment for the product
    workflow_index: .agentic/product/workflows/README.md

  mixed:
    use_when:
      - task touches more than one layer
      - task changes both harness and product code
      - task changes chat or shared process plus harness or product behaviour
      - task changes AWS infrastructure plus product behavior or shared release process
    rule: split into separate phases and plan around executing one workflow at a time

modes:
  discovery:
    use_when:
      - user asks for explanation, discussion, brainstorming, or conceptual guidance
      - user asks a question without requesting edits
      - user asks to inspect files, logs, repository state, runtime state, or configuration
      - user asks what exists, where something lives, or why something is happening
    default_action: read-only response or inspection

  planning:
    use_when:
      - user asks for a proposal, architecture, implementation plan, migration plan, or ordered change list
      - user asks how to build or change something before granting write permission
    default_action: read-only planning

  execution:
    use_when:
      - user asks to use an existing capability, workflow, gate, script, tool, or documented process
      - requested action does not require creating or changing capabilities, workflows, gates, scripts, tools, documentation, or process rules
    default_action: follow selected workflow gates before running the existing capability.

  implementation:
    use_when:
      - user asks to create, edit, move, delete, format, or otherwise modify files
      - user asks to add or change capabilities, workflows, gates, scripts, tools, documentation, or process rules
    default_action: require explicit write permission for the current chat before editing

  unknown:
    use_when:
      - mode cannot be classified with enough confidence
    default_action: stop and ask one clarifying question
