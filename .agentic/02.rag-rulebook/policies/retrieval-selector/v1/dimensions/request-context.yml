schema: rag-rulebook/retrieval-policy-dimension/v1
dimension_id: request-context
version: 1
status: active
applies_to_policy_pack: retrieval-selector.v1
purpose: Build a fresh per-prompt retrieval request from explicit user intent, recognized concepts, focused paths, and safety constraints before using session metadata as fallback context.
required_inputs:
  - Raw user prompt text.
  - Prompt-dimension recognition outputs.
  - Focused paths, changed paths, and user-named paths when available.
  - Session metadata for provenance and safety comparison.
  - Side-effect classification for write, git, deploy, destructive, or read-only requests.
expected_actions:
  - Build a request context record for every retrieval attempt instead of reusing session metadata as the retrieval target.
  - Treat explicit user intent, exact corpus IDs, exact artifact IDs, exact paths, and focused paths as primary retrieval signals.
  - Use session metadata as provenance, safety context, and fallback routing when the prompt and paths do not name stronger retrieval targets.
  - Preserve execution safety by keeping side-effecting actions bound to their governed workflow even when retrieval pulls cross-layer evidence.
  - Record prompt/session disagreements as request-context gaps instead of hiding them behind a confident packet.
banned_actions:
  - Do not let a ready session layer alone prevent retrieval of explicitly requested cross-layer evidence.
  - Do not treat a cross-layer retrieval target as permission to edit, commit, deploy, delete, or mutate infrastructure.
  - Do not promote a single broad noun such as product, app, deploy, or platform into a target corpus without exact terms, paths, focused files, or supporting evidence.
  - Do not drop session metadata from provenance or execution-safety checks.
output_obligations:
  - request_context_id
  - request_form
  - explicit_target_terms
  - explicit_target_paths
  - retrieval_target_corpora
  - side_effect_class
  - session_context_role
  - request_context_confidence
gap_or_stop_conditions:
  - Add a non-blocking gap when prompt/focused-path retrieval targets differ from session metadata but the request is planning, discovery, or explanation.
  - Add a blocking stop when a side-effecting request targets a layer or workflow not governed by the current execution workflow.
  - Add a low-confidence gap when only broad terms support cross-layer retrieval.
ranking_effects:
  - Explicit request context outranks session defaults for retrieval evidence selection.
  - Exact prompt/path/corpus/artifact matches outrank broad session-layer matches.
  - Session metadata still raises provenance, required-check, and execution-safety ranking.
  - Broad prompt nouns require another supporting signal before admitting cross-corpus retrieval.
validation_examples:
  - name: planning prompt can cross session boundary
    given: Session metadata says `02.rag-rulebook`, but the user asks whether a capability belongs in platform/apps.
    expect: Retrieval may include platform/apps evidence while the packet preserves `02.rag-rulebook` session provenance.
  - name: side-effect prompt still blocks outside workflow
    given: Session metadata says `02.rag-rulebook`, but the user asks to deploy to AWS.
    expect: Retrieval may include deploy evidence, but execution authorization is blocked unless the deploy workflow is active and approved.
  - name: broad noun stays weak
    given: The prompt contains only a broad word such as product without exact corpus, artifact, path, or focused-path support.
    expect: The selector does not admit product corpora solely from that noun and reports low confidence if no stronger target exists.
can_change_by:
  - Add request-form categories.
  - Add side-effect classes.
  - Add evidence-bundle requirements by question category.
  - Add exact target-term rules.
  - Add confidence penalties for missing expected evidence.
