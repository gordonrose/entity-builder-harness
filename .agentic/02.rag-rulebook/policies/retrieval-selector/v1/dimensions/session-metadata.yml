schema: rag-rulebook/retrieval-policy-dimension/v1
dimension_id: session-metadata
version: 1
status: active
applies_to_policy_pack: retrieval-selector.v1
purpose: Use chat/session metadata as provenance, execution-safety context, and fallback routing without letting it dominate explicit request-context retrieval.
required_inputs:
  - Session ID.
  - Recorded layer, mode, and workflow.
  - Branch and worktree.
  - Session status.
  - Latest recorded commit metadata when present.
expected_actions:
  - Preserve recorded layer, mode, workflow, branch, and worktree when metadata is ready.
  - Use session layer and workflow as fallback retrieval context when the prompt, focused paths, and artifact ownership do not name stronger targets.
  - Narrow required workflow, safety, and check candidates from the session workflow.
  - Preserve session metadata in context-packet routing and provenance.
banned_actions:
  - Do not use session metadata as the primary retrieval target when explicit request context names stronger evidence.
  - Do not treat missing, unknown, or stale metadata as ready.
  - Do not silently continue when branch or worktree ownership is ambiguous.
  - Do not use prompt terms to bypass a recorded workflow for side-effecting actions.
output_obligations:
  - session_id
  - layer
  - mode
  - workflow
  - branch
  - worktree
  - session_metadata_confidence
gap_or_stop_conditions:
  - Stop when session ownership or worktree state is ambiguous.
  - Add a metadata gap when layer, mode, or workflow is missing, stale, or unknown.
ranking_effects:
  - Complete ready session metadata raises provenance and fallback routing confidence.
  - Session workflow matches raise required-check and execution-safety ranking.
  - Explicit request context outranks session defaults for read-only retrieval target selection.
  - Unknown session metadata lowers routing confidence.
validation_examples:
  - name: ready session provides fallback corpus
    given: Session metadata is ready for `02.rag-rulebook:implementation`.
    expect: Candidate corpora include `corpus.02.rag-rulebook` when no stronger request-context target is present.
  - name: request context can retrieve cross-layer evidence
    given: Session metadata is ready for `02.rag-rulebook:implementation`, but a planning prompt names platform/apps architecture evidence.
    expect: Retrieval may include platform/apps evidence while session metadata remains in provenance and execution safety.
  - name: unknown session blocks readiness
    given: Session layer is `unknown`.
    expect: The selector reports a metadata gap and does not emit ready routing.
can_change_by:
  - Add trusted session fields.
  - Add stale-session detection rules.
  - Add recorded-session continuation rules.
