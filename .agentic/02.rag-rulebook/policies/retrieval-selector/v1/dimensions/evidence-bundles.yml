schema: rag-rulebook/retrieval-policy-dimension/v1
dimension_id: evidence-bundles
version: 1
status: active
applies_to_policy_pack: retrieval-selector.v1
purpose: Ensure recognized question categories retrieve the canonical evidence families needed for an accurate answer.
required_inputs:
  - Request-context record.
  - Prompt-dimension recognition matches.
  - Question-category recognition matches.
  - Evidence-family recognition matches.
  - Generated chunks and source paths.
expected_actions:
  - Map recognized question categories to expected evidence families before final ranking.
  - Add canonical evidence source paths for matched evidence families as required source paths.
  - Add always-required canonical evidence for the question category when the bundle defines it.
  - Emit a gap when expected evidence is missing, filtered out, or trimmed away.
  - Lower retrieval confidence when an expected evidence family is missing from the selected packet.
banned_actions:
  - Do not answer architecture boundary questions from only the current session layer when layer-family evidence is named.
  - Do not treat a single chunk as enough when a question category requires multiple evidence families.
  - Do not silently drop canonical layer, concern, or workflow evidence because it scored slightly lower than nearby chunks.
  - Do not use evidence bundles to bypass corpus ownership or execution safety.
output_obligations:
  - question_category_ids
  - expected_evidence_families
  - selected_evidence_families
  - missing_evidence_families
  - evidence_bundle_gaps
  - confidence_penalties
gap_or_stop_conditions:
  - Add a missing-evidence gap when a required evidence family is not selected.
  - Add a confidence gap when a category is recognized but no evidence family can be resolved.
  - Block only when a workflow marks the missing evidence as required for side-effect safety.
ranking_effects:
  - Required evidence-family source paths survive token trimming before optional chunks.
  - Canonical layer and concern rules outrank nearby generic chunks for architecture boundary questions.
  - Missing expected evidence reduces retrieval confidence even when selected chunks are individually high scoring.
