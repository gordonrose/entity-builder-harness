schema: rag-rulebook/retrieval-policy-dimension/v1
dimension_id: retrieval-strategy
version: 1
status: active
applies_to_policy_pack: retrieval-selector.v1
purpose: Define the selector's reusable staged retrieval shape so misses can be debugged and improved without one-off prompt patches.
required_inputs:
  - Compiled policy pack.
  - Prompt recognition matches.
  - Generated chunks.
  - Rule graph metadata.
  - Evidence bundle policy.
expected_actions:
  - Run exact identifier recognition before broad concept matching.
  - Apply generated concept sources before curated broad terms.
  - Apply chunk purpose and authority rules before final ranking and token trimming.
  - Expand bounded graph evidence before final ranking.
  - Apply evidence bundles before trimming selected chunks.
  - Re-rank rule chunks inside required source paths using prompt terms, evidence-family terms, rule IDs, rule titles, rule summaries, and rule body fields.
  - Emit a selector trace that records which stages ran and which signals shaped selection.
banned_actions:
  - Do not let session metadata replace prompt-specific retrieval strategy.
  - Do not skip exact identifier matching because a broad curated term matched first.
  - Do not graph-expand without a bounded rule source or artifact-summary signal.
  - Do not hide missing evidence-family requirements inside an otherwise high-confidence packet.
  - Do not let explanation-support chunks authorize writes, commits, deploys, destructive actions, or cloud mutation.
output_obligations:
  - strategy_id
  - stage_ids
  - chunk_purpose
  - chunk_authority
  - stage_statuses
  - recognition_match_counts
  - candidate_counts
  - required_evidence_paths
  - selected_rule_ids_by_source
  - selected_chunk_ids
gap_or_stop_conditions:
  - Emit a missing-evidence gap when a strategy stage requires evidence that does not survive selection.
  - Lower confidence when question-category evidence bundles do not produce selected canonical evidence.
  - Keep side-effect execution blocked when strategy retrieval crosses layers without matching execution governance.
ranking_effects:
  - Exact identifiers outrank broad concepts.
  - Generated concept matches outrank curated broad vocabulary.
  - Explanation and tutor intents prefer source-explanation, guide, and decision-history chunks.
  - Implementation and side-effecting intents prefer rule and execution-authority chunks.
  - Evidence bundle source paths survive trimming before optional ranked chunks.
  - Within required evidence sources, rule title and summary matches outrank broad file-level matches.
  - Graph expansion is bounded and feeds required source paths before final selection.
retrieval_strategy:
  strategy_id: retrieval-selector.v1.hybrid-deterministic-first
  stages:
    - stage_id: exact-identifiers
      rank: 1
      purpose: Match exact corpus IDs, artifact IDs, file paths, rule IDs, and rule-pack IDs from prompt text.
      primary_inputs:
        - recognition.generated.artifacts
        - recognition.generated.routing
      expected_outputs:
        - exact_target_terms
        - exact_target_paths
    - stage_id: generated-concepts
      rank: 2
      purpose: Apply generated artifact, routing, workflow, schema, and corpus concepts before broad curated terms.
      primary_inputs:
        - generated recognition sources
      expected_outputs:
        - generated_match_counts
        - candidate_corpus_ids
    - stage_id: curated-concepts
      rank: 3
      purpose: Apply reviewed action, intent, risk, alias, question-category, and evidence-family vocabulary.
      primary_inputs:
        - curated recognition sources
      expected_outputs:
        - intent_id
        - question_category_ids
        - evidence_family_ids
    - stage_id: graph-expansion
      rank: 4
      purpose: Add bounded related rule source paths from selected artifact-summary signals.
      primary_inputs:
        - rule graph metadata
        - artifact-summary chunks
      expected_outputs:
        - graph_expansion_source_paths
    - stage_id: evidence-bundles
      rank: 5
      purpose: Promote canonical evidence families for recognized question categories before final trimming.
      primary_inputs:
        - evidence-bundles policy
        - question-category matches
        - evidence-family matches
      expected_outputs:
        - required_evidence_source_paths
        - missing_evidence_gaps
    - stage_id: intra-source-reranking
      rank: 6
      purpose: Re-rank chunks inside required source paths so the most specific rule section survives final selection.
      primary_inputs:
        - required source paths
        - prompt terms
        - evidence-family matches
        - rule IDs, titles, summaries, and structured rule body fields
      expected_outputs:
        - selected_rule_ids_by_required_source
        - intra_source_reranking_stage_status
    - stage_id: final-ranking
      rank: 7
      purpose: Score, filter, trim, authority-label, and validate selected chunks after required evidence has been preserved.
      primary_inputs:
        - ranked chunks
        - required chunk IDs
        - required source paths
        - chunk purpose and authority policy
      expected_outputs:
        - selected_chunk_ids
        - selected_chunk_purposes
        - selected_chunk_authorities
        - retrieval_confidence
chunk_selection:
  purpose_priority_by_intent:
    intent.no-action.explanation:
      - source-explanation
      - guide
      - adr-decision
      - rule
      - artifact-summary
    intent.explanation.tutor:
      - source-explanation
      - guide
      - adr-decision
      - rule
      - artifact-summary
    intent.discovery.explanation:
      - source-explanation
      - guide
      - adr-decision
      - rule
      - artifact-summary
    intent.planning.guidance:
      - plan-milestone
      - adr-decision
      - rule
      - source-explanation
      - artifact-summary
    intent.planning.decision-support:
      - adr-decision
      - plan-milestone
      - rule
      - source-explanation
      - artifact-summary
    intent.implementation.request:
      - rule
      - plan-milestone
      - adr-decision
      - source-explanation
      - artifact-summary
    intent.git.commit:
      - rule
      - plan-milestone
      - artifact-summary
      - source-explanation
    intent.deploy.execution:
      - rule
      - plan-milestone
      - adr-decision
      - artifact-summary
      - source-explanation
    intent.context.retrieve:
      - rule
      - source-explanation
      - guide
      - artifact-summary
  authority_rules:
    execution-authority: May govern implementation or operations when paired with applicable workflow and approval.
    explanation-support: May explain rationale, examples, and boundaries; must not authorize side effects.
    decision-history: May explain durable decisions and consequences.
    implementation-plan: May guide sequencing and acceptance criteria; does not replace workflow approval.
    orientation: May help candidate selection and source inspection.
  side_effect_restrictions:
    side_effect_classes:
      - write
      - git
      - deploy
      - destructive
    authorization_authorities:
      - execution-authority
    background_only_authorities:
      - explanation-support
      - decision-history
      - implementation-plan
      - orientation
validation_examples:
  - name: exact identifiers run before broad terms
    given: The prompt names an exact corpus and also contains broad words such as platform or app.
    expect: The selector trace lists exact-identifiers before curated-concepts and includes the exact corpus target.
  - name: architecture boundary uses evidence bundles
    given: The prompt asks whether a capability belongs in apps or platform.
    expect: The selector trace lists evidence-bundles as applied and selected chunks include apps, platform, and dependency-direction evidence.
  - name: graph expansion is bounded
    given: Artifact-summary chunks expose related rule source paths.
    expect: The selector trace lists graph-expansion and records only bounded source paths that exist in the ranked chunk set.
  - name: required sources are re-ranked by rule fields
    given: An evidence bundle selects a long source file with multiple rule chunks.
    expect: The selector trace lists intra-source-reranking and selected chunks include the best matching rule IDs from required source paths.
  - name: explanation asks prefer teaching chunks without granting authority
    given: The prompt asks to be walked through a platform boundary.
    expect: Source-explanation chunks outrank optional implementation details, while side-effect authorization remains unavailable.
can_change_by:
  - Add a new retrieval stage with an evaluation fixture.
  - Change stage order only with policy-pack version review.
  - Add stage trace outputs.
  - Add confidence penalties tied to specific strategy stages.
  - Add chunk-purpose or authority priorities with fixture proof.
