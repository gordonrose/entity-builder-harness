schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-platform-server-policy-implementation
status: active
owner_layer: 02.rag-rulebook
purpose: Prove platform server and middleware questions retrieve the exact platform server rule, not only platform.yml.
input:
  request_text: explain how it works and how it's implemented for platform server, middleware, request handling, route adaptation, and response logging
  session:
    layer: 02.rag-rulebook
    mode: discovery
    workflow: .agentic/02.rag-rulebook/workflows/default.md
  no_focused_paths: true
  max_chunks: 8
expected:
