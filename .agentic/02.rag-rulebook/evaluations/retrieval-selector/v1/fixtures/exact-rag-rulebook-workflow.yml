schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.exact-rag-rulebook-workflow
status: active
owner_layer: 02.rag-rulebook
purpose: Prove an explicit RAG/rulebook workflow request routes through governed RAG/rulebook signals.
input:
  request_text: Update the RAG rulebook workflow for context packets.
  session:
    layer: 02.rag-rulebook
    mode: implementation
    workflow: .agentic/02.rag-rulebook/workflows/default.md
  focused_paths:
    - .agentic/02.rag-rulebook/workflows/default.md
  max_chunks: 6
expected:
  routing:
    layer: 02.rag-rulebook
    mode: implementation
    workflow: .agentic/02.rag-rulebook/workflows/default.md
    status: ready
  matched_corpora:
    required:
      - corpus.02.rag-rulebook
  recognition:
    required_source_ids:
      - recognition.curated.aliases
      - recognition.generated.routing
    required_matched_inputs:
      - prompt
      - session-metadata
      - focused-paths
  gaps:
    allowed:
      - gap.selector-fixture.prototype-corpus-bridge
    no_unexpected: true
  required_checks:
    min_count: 1
  citations:
    min_count: 1
banned:
  matched_corpora:
    - corpus.04.deploy
  selected_corpora:
    - corpus.04.deploy
    - corpus.03.product.platform
source_refs:
  - .agentic/02.rag-rulebook/standards/retrieval-selector-evaluations.md
  - .agentic/02.rag-rulebook/policies/retrieval-selector/v1.yml
update_triggers:
  - RAG/rulebook workflow path changes.
  - Selector routing policy changes.
  - Prototype corpus migration creates physical corpus.02.rag-rulebook chunks.
