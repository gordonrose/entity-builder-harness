schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-platform-runtime-modules-policy-implementation
status: active
owner_layer: 02.rag-rulebook
purpose: Prove each runtime module listed in platform.yml has an evidence-family bundle path.
input:
  request_text: Explain how it works and how it's implemented for platform contracts, platform config, platform runtime, platform server, platform security, logging, platform health, platform workers, and platform testing.
  session:
    trust_routing: true
    layer: 02.rag-rulebook
    mode: discovery
    workflow: .agentic/02.rag-rulebook/workflows/default.md
  max_chunks: 8
expected:
  routing:
    layer: 02.rag-rulebook
    mode: discovery
    status: ready
  action_authorization:
    requested_action: context-retrieval
    side_effect_class: none
    execution_allowed: false
    status: not-requested
  matched_corpora:
    required:
      - corpus.02.rag-rulebook
  selected_corpora:
    required:
      - corpus.03.product.platform
  recognition:
    required_source_ids:
      - recognition.curated.intent-forms
      - recognition.curated.question-categories
    required_canonical_ids:
      - intent.explanation.tutor
      - question.policy-implementation.explain
      - evidence.platform.contracts
      - evidence.platform.config
      - evidence.platform.runtime
      - evidence.platform.server
      - evidence.platform.security
      - evidence.platform.observability
      - evidence.platform.health
      - evidence.platform.workers
      - evidence.platform.testing
  gaps:
    allowed:
      - gap.selector-fixture.prototype-corpus-bridge
    no_unexpected: true
  selected_chunks:
    required_artifact_ids:
      - artifact.layer.platform
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_stage_ids:
      - exact-identifiers
      - generated-concepts
      - curated-concepts
      - graph-expansion
      - evidence-bundles
      - final-ranking
    required_applied_stage_ids:
      - generated-concepts
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.7
banned:
  selected_corpora:
    - corpus.04.deploy
source_refs:
  - .agentic/02.rag-rulebook/policies/retrieval-selector/v1/dimensions/evidence-bundles.yml
  - .agentic/02.rag-rulebook/recognition-sources/curated/question-categories.yml
  - docs/harness/architecture/rules/layers/platform.yml
update_triggers:
