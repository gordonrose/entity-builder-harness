schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-chat-upstream-reusable-lesson
status: active
owner_layer: 02.rag-rulebook
purpose: Prove prompts about reusable lessons and upstream promotion retrieve both workflow guidance and upstream repo bootstrap scripts.
input:
  request_text: How do we promote reusable lesson upstream with the chat upstream reusable lesson workflow and upstream repo bootstrap?
  max_chunks: 8
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: promote reusable lesson upstream
        category: question-category
        canonical_id: question.chat.upstream-reusable-lesson
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: chat upstream reusable lesson
        category: evidence-family
        canonical_id: evidence.chat.upstream-reusable-lesson
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - .agentic/00.chat/workflows/chat-upstream-reusable-lesson.md
      - .agentic/shared/standards/upstream-repo-bootstrap.md
      - scripts/00.chat/upstream/ensure-llm-workbench-repo/script.sh
      - scripts/00.chat/upstream/bootstrap-llm-workbench-repo/script.sh
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    no_unexpected: true
source_refs:
  - .agentic/00.chat/workflows/chat-upstream-reusable-lesson.md
  - .agentic/shared/standards/upstream-repo-bootstrap.md
  - scripts/00.chat/upstream/ensure-llm-workbench-repo/script.sh
  - scripts/00.chat/upstream/bootstrap-llm-workbench-repo/script.sh
update_triggers:
  - Upstream reusable lesson workflow changes.
  - Upstream bootstrap standard or scripts change.
  - Reusable lesson recognition vocabulary changes.

