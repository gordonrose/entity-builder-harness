schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-product-core-module-contracts
status: active
owner_layer: 02.rag-rulebook
purpose: Prove diagnostics, events, queues, and files questions select packages/core boundaries plus platform/contracts context.
input:
  request_text: How do packages/core diagnostics, events, queues, and files relate to platform/contracts?
  max_chunks: 10
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: packages/core diagnostics
        category: question-category
        canonical_id: question.product.core-module-contracts
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: events
        category: evidence-family
        canonical_id: evidence.concern.events-messaging-async
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: contracts
        category: evidence-family
        canonical_id: evidence.platform.contracts
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - docs/harness/architecture/rules/layers/packages-core.yml
      - docs/harness/architecture/rules/concerns/events-messaging-async.yml
      - docs/harness/architecture/rules/concerns/persistence-files-storage.yml
      - packages/core/README.md
      - platform/contracts/README.md
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    no_unexpected: true
source_refs:
  - docs/harness/architecture/rules/layers/packages-core.yml
  - docs/harness/architecture/rules/concerns/events-messaging-async.yml
  - docs/harness/architecture/rules/concerns/persistence-files-storage.yml
  - packages/core/README.md
  - platform/contracts/README.md
update_triggers:
  - packages/core module contracts change.
  - platform/contracts boundary changes.
  - Core module recognition vocabulary changes.

