schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.platform-runtime-source-explanation
status: active
owner_layer: 02.rag-rulebook
purpose: Prove a human explanation request can select bounded source material chunks with explanation-support authority.
input:
  request_text: Walk me through docs/harness/architecture/source-material/platform-runtime-enterprise-obligations-v1.md and explain the platform runtime shell surfaces, especially platform/runtime, platform/server, platform/workers, apps/platform-smoke, and deployment-facing manifests.
  session:
    trust_routing: true
    layer: 03.product
    mode: discovery
    workflow: .agentic/product/workflows/default.md
  max_chunks: 10
expected:
  routing:
    layer: 03.product
    mode: discovery
    workflow: .agentic/product/workflows/default.md
    status: ready
  intent:
    id: intent.explanation.tutor
  action_authorization:
    requested_action: context-retrieval
    side_effect_class: none
    execution_allowed: false
    status: not-requested
    resolved_intent_id: intent.explanation.tutor
  matched_corpora:
    required:
      - corpus.03.product
      - corpus.03.product.platform
  selected_corpora:
    required:
      - corpus.03.product.platform
  selected_content_kinds:
    required:
      - source-explanation
      - rule
  selected_chunk_purposes:
    required:
      - source-explanation
      - rule
  selected_authorities:
    required:
      - explanation-support
      - execution-authority
  selected_chunks:
    required_artifact_ids:
      - artifact.harness.architecture.source.material.platform.runtime.enterprise.obligations.v1
      - artifact.layer.platform
    required_chunk_ids:
      - chunk.markdown.artifact.harness.architecture.source.material.platform.runtime.enterprise.obligations.v1.section.3.platform.runtime.enterprise.obligations.v1.platform.runtime.shell.surfaces
    required_rule_ids:
      - platform.runtime-shell-surfaces-are-explicit
  required_checks:
    min_count: 1
  citations:
    min_count: 1
  gaps:
    no_unexpected: true
banned:
  selected_corpora:
    - corpus.04.deploy
  blocking_gaps:
    - gap.selector-fixture.prompt-session-layer-conflict
source_refs:
  - docs/harness/architecture/source-material/platform-runtime-enterprise-obligations-v1.md
  - docs/harness/architecture/rules/layers/platform.yml
  - .agentic/02.rag-rulebook/policies/retrieval-selector/v1/dimensions/retrieval-strategy.yml
update_triggers:
  - Platform runtime source-material headings or metadata change.
  - Platform runtime shell surface rules change.
  - Selector chunk-purpose or authority policy changes.
