schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-runtime-freshness
status: active
owner_layer: 02.rag-rulebook
purpose: Prove stale-cache questions retrieve the freshness checker, rebuild command, and local query runtime notes.
input:
