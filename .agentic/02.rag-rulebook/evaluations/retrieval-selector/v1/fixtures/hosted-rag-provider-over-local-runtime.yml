schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.hosted-rag-provider-over-local-runtime
status: active
owner_layer: 02.rag-rulebook
purpose: Prove a prompt about preferring the hosted AWS RAG service over local RAG selects the RAG-owned provider contract plus remote-provider, data-boundary, context-packet, and runtime-identity evidence only.
input:
  request_text: Should our workbench call the hosted AWS RAG service instead of building local RAG context?
  session:
    trust_routing: true
    layer: 02.rag-rulebook
    mode: planning
    workflow: .agentic/02.rag-rulebook/workflows/default.md
  max_chunks: 12
expected:
  routing:
    layer: 04.deploy
    mode: planning
    workflow: .agentic/aws/workflows/plan-aws-change.md
    status: ready
  intent:
    id: intent.context.retrieve
  action_authorization:
    requested_action: context-retrieval
    side_effect_class: none
    execution_allowed: false
    status: not-requested
    resolved_intent_id: intent.context.retrieve
  matched_corpora:
    required:
      - corpus.02.rag-rulebook
      - corpus.04.deploy
  selected_corpora:
    required:
      - corpus.02.rag-rulebook
      - corpus.04.deploy
  selected_content_kinds:
    required:
      - rule
  selected_chunks:
    required_artifact_ids:
      - artifact.concern.hosted.context.provider.contract
      - artifact.concern.rag.rulebook.mcp.server.deployment
      - artifact.concern.rag.rulebook.context.provider.data.boundaries
      - artifact.concern.mcp.server.deployment.architecture
    required_rule_ids:
      - hosted-context-provider-contract.rag-rulebook-owns-provider-selection
      - hosted-context-provider-contract.hosted-auth-fails-closed
      - mcp-server-deployment.local-rag-precedes-hosted-rag
      - mcp-server-deployment.publishes-versioned-corpus-packages
      - context-provider-data-boundaries.exposes-read-only-api-or-mcp-first
      - mcp-server-deployment-architecture.uses-validated-context-packets
  recognition:
    required_source_ids:
      - recognition.generated.artifacts
      - recognition.generated.routing
    required_matches:
      - source_id: recognition.generated.routing
        term: aws
        category: layer-name
        canonical_id: 04.deploy
        matched_input: prompt
      - source_id: recognition.generated.routing
        term: 02.rag-rulebook
        category: layer-name
        canonical_id: 02.rag-rulebook
        matched_input: session-metadata
  gaps:
    allowed:
      - gap.selector-fixture.prompt-session-layer-conflict
      - gap.corpus.02.rag-rulebook.hosted-context-provider-contract
    no_unexpected: true
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_stage_ids:
      - exact-identifiers
      - generated-concepts
      - graph-expansion
      - final-ranking
    required_applied_stage_ids:
      - exact-identifiers
      - generated-concepts
      - graph-expansion
      - final-ranking
  required_checks:
    min_count: 1
  citations:
    min_count: 1
banned:
  matched_corpora:
    - corpus.03.product
    - corpus.03.product.design-system
  selected_corpora:
    - corpus.03.product
    - corpus.03.product.design-system
    - corpus.03.product.platform
  selected_rule_ids:
    - dependency.production-must-not-depend-on-scripts
  blocking_gaps:
    - gap.selector-fixture.prompt-session-layer-conflict
source_refs:
  - docs/02.rag-rulebook/source-material/hosted-context-provider-contract.md
  - docs/02.rag-rulebook/rules/concerns/hosted-context-provider-contract.yml
  - docs/04.deploy/rules/02.rag-rulebook/mcp-server-deployment.yml
  - docs/04.deploy/rules/02.rag-rulebook/context-provider-data-boundaries.yml
  - docs/04.deploy/rules/02.rag-rulebook/aws-runtime-boundaries.yml
  - docs/02.rag-rulebook/rules/concerns/mcp-server-deployment-architecture.yml
update_triggers:
  - Hosted RAG service provider behavior changes.
  - RAG rulebook hosted context provider contract changes.
  - Selector corpus filtering changes for generated layer-name recognition.
  - Remote-versus-local RAG fallback policy changes.
