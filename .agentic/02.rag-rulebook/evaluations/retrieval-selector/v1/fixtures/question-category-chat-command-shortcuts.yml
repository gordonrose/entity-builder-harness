      - scripts/00.chat/command/new/script.sh
      - scripts/00.chat/command/close/script.sh
      - scripts/00.chat/command/dispatcher/README.md
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
