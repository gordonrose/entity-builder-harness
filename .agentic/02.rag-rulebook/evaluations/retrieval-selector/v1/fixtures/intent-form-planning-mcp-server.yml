schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.intent-form-planning-mcp-server
status: active
owner_layer: 02.rag-rulebook
purpose: Prove request form recognition separates planning guidance from implementation or deploy execution.
input:
  request_text: How do I update my harness so we can deploy it behind an MCP server?
  session:
    layer: 01.harness
    mode: planning
    workflow: .agentic/01.harness/workflows/change-harness.md
  focused_paths:
    - .agentic/01.harness/workflows/change-harness.md
  max_chunks: 6
expected:
  routing:
    layer: 01.harness
    mode: planning
    workflow: .agentic/01.harness/workflows/change-harness.md
    status: ready
  matched_corpora:
    required:
      - corpus.01.harness
  selected_corpora:
    required:
      - corpus.01.harness
  selected_content_kinds:
    required:
      - artifact-summary
      - rule
  selected_chunks:
    required_artifact_ids:
      - artifact.layer.scripts.command.surface
  recognition:
    required_source_ids:
      - recognition.curated.actions
      - recognition.curated.intent-forms
      - recognition.generated.routing
    required_categories:
      - action-verb
      - intent-form
      - layer-name
    required_canonical_ids:
      - action.update
      - intent.planning.guidance
      - 01.harness
      - 04.deploy
    required_matched_inputs:
      - prompt
      - session-metadata
      - focused-paths
    required_matches:
      - source_id: recognition.curated.intent-forms
        term: How do I
        category: intent-form
        canonical_id: intent.planning.guidance
        matched_input: prompt
      - source_id: recognition.curated.actions
        term: update
        category: action-verb
        canonical_id: action.update
        matched_input: prompt
      - source_id: recognition.generated.routing
        term: Harness
        category: layer-name
        canonical_id: 01.harness
        matched_input: prompt
      - source_id: recognition.generated.routing
        term: Deploy
        category: layer-name
        canonical_id: 04.deploy
        matched_input: prompt
  gaps:
    allowed:
      - gap.selector-fixture.prompt-session-layer-conflict
    no_unexpected: true
  required_checks:
    min_count: 1
  citations:
    min_count: 1
banned:
  matched_corpora:
    - corpus.03.product.platform
  selected_corpora:
    - corpus.04.deploy
    - corpus.03.product.platform
  recognition_matches:
    - source_id: recognition.curated.intent-forms
      canonical_id: intent.implementation.request
      matched_input: prompt
    - source_id: recognition.curated.intent-forms
      canonical_id: intent.deploy.execution
      matched_input: prompt
source_refs:
  - .agentic/02.rag-rulebook/standards/retrieval-selector-evaluations.md
  - .agentic/02.rag-rulebook/recognition-sources/curated/intent-forms.yml
  - .agentic/02.rag-rulebook/recognition-sources/curated/actions.yml
  - .agentic/02.rag-rulebook/recognition-sources/generated/routing.yml
update_triggers:
  - Intent-form recognition source changes.
  - Action recognition source changes.
  - Routing recognition source changes.
  - Selector prompt/session conflict handling changes.
