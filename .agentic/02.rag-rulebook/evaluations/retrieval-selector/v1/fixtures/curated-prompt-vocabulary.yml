schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.curated-prompt-vocabulary
status: active
owner_layer: 02.rag-rulebook
purpose: Prove reviewed natural-language vocabulary is recognized without expanding into unrelated corpora.
input:
  request_text: Evaluate drift risk before updating the RAG rulebook selector.
  session:
    layer: 02.rag-rulebook
    mode: implementation
    workflow: .agentic/02.rag-rulebook/workflows/default.md
  focused_paths:
    - .agentic/02.rag-rulebook/policies/retrieval-selector/v1/dimensions/prompt.yml
  max_chunks: 6
expected:
  routing:
    layer: 02.rag-rulebook
    mode: implementation
    workflow: .agentic/02.rag-rulebook/workflows/default.md
    status: ready
  matched_corpora:
    required:
      - corpus.02.rag-rulebook
  recognition:
    required_source_ids:
      - recognition.curated.actions
      - recognition.curated.aliases
      - recognition.curated.risks
    required_matched_inputs:
      - prompt
      - session-metadata
      - focused-paths
  gaps:
    allowed:
      - gap.selector-fixture.prototype-corpus-bridge
    no_unexpected: true
  required_checks:
    min_count: 1
  citations:
    min_count: 1
banned:
  matched_corpora:
    - corpus.04.deploy
  selected_corpora:
    - corpus.04.deploy
    - corpus.03.product.platform
source_refs:
  - .agentic/02.rag-rulebook/standards/retrieval-selector-evaluations.md
  - .agentic/02.rag-rulebook/recognition-sources/curated/aliases.yml
  - .agentic/02.rag-rulebook/recognition-sources/curated/actions.yml
  - .agentic/02.rag-rulebook/recognition-sources/curated/risks.yml
update_triggers:
  - Curated alias vocabulary changes.
  - Curated action vocabulary changes.
  - Curated risk vocabulary changes.
  - Selector prompt recognition behavior changes.
