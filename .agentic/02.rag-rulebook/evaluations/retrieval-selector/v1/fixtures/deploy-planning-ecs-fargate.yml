schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.deploy-planning-ecs-fargate
status: active
owner_layer: 02.rag-rulebook
purpose: Prove a planning prompt about GitHub Actions to ECS Fargate selects the derived deploy rules without authorizing deployment execution.
input:
  request_text: Prepare an ECS Fargate deployment plan for the RAG rulebook service with supply-chain provenance and context-provider data boundaries.
  session:
    trust_routing: true
    layer: 04.deploy
    mode: planning
    workflow: .agentic/aws/workflows/plan-aws-change.md
  max_chunks: 12
expected:
  routing:
    layer: 04.deploy
    mode: planning
    workflow: .agentic/aws/workflows/plan-aws-change.md
    status: ready
  intent:
    id: intent.context.retrieve
  action_authorization:
    requested_action: context-retrieval
    side_effect_class: none
    execution_allowed: false
    status: not-requested
    resolved_intent_id: intent.context.retrieve
  matched_corpora:
    required:
      - corpus.04.deploy
  selected_corpora:
    required:
      - corpus.04.deploy
  selected_content_kinds:
    required:
      - artifact-summary
      - rule
  selected_chunks:
    required_artifact_ids:
      - artifact.concern.rag.rulebook.ecs.fargate.deployment
      - artifact.concern.rag.rulebook.supply.chain.provenance
      - artifact.concern.rag.rulebook.context.provider.data.boundaries
  recognition:
    required_source_ids:
      - recognition.curated.aliases
      - recognition.generated.artifacts
      - recognition.generated.routing
    required_categories:
      - file-path
      - layer-name
      - workflow-name
    required_canonical_ids:
      - 04.deploy
      - 02.rag-rulebook
      - aws.workflows.plan-aws-change
    required_matched_inputs:
      - prompt
      - session-metadata
    required_matches:
      - source_id: recognition.generated.routing
        term: 04.deploy
        category: layer-name
        canonical_id: 04.deploy
        matched_input: session-metadata
      - source_id: recognition.curated.aliases
        term: RAG rulebook
        category: layer-name
        canonical_id: 02.rag-rulebook
        matched_input: prompt
      - source_id: recognition.generated.artifacts
        term: .agentic/aws/workflows/plan-aws-change.md
        category: file-path
        canonical_id: aws.workflows.plan-aws-change
        matched_input: session-metadata
  gaps:
    allowed:
      - gap.selector-fixture.prompt-session-layer-conflict
      - gap.corpus.04.deploy.github-actions-to-ecs-fargate
    no_unexpected: true
  required_checks:
    min_count: 1
  citations:
    min_count: 1
banned:
  blocking_gaps:
    - gap.corpus.04.deploy.github-actions-to-ecs-fargate
    - gap.deploy.missing-aws-runtime-target
    - gap.deploy.missing-github-workflow
    - gap.deploy.missing-executable-deploy-checks
    - gap.deploy.missing-transport-auth-proof
    - gap.deploy.missing-cost-capacity-quota-boundary
  selected_corpora:
    - corpus.03.product
    - corpus.03.product.platform
source_refs:
  - docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
  - docs/04.deploy/rules/02.rag-rulebook/ecs-fargate-deployment.yml
  - docs/04.deploy/rules/02.rag-rulebook/supply-chain-provenance.yml
  - docs/04.deploy/rules/02.rag-rulebook/context-provider-data-boundaries.yml
update_triggers:
  - ECS Fargate deploy rule changes.
  - Supply-chain provenance rule changes.
  - Context-provider data-boundary rule changes.
  - Selector ranking, or deploy planning intent changes.
