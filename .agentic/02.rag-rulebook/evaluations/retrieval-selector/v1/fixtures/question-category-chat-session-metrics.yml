schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-chat-session-metrics
status: active
owner_layer: 02.rag-rulebook
purpose: Prove questions about commitLog token and cost fields retrieve the chat commit recorder and metrics scripts.
input:
  request_text: How are session tokens and estimated chat cost recorded in my commitLogs?
  max_chunks: 8
expected:
  routing:
    layer: 00.chat
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: session tokens
        category: question-category
        canonical_id: question.chat.session-metrics
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: chat cost recorded
        category: question-category
        canonical_id: question.chat.session-metrics
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: estimated chat cost
        category: evidence-family
        canonical_id: evidence.chat.estimate-chat-cost
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - scripts/00.chat/session-log/record-chat-commit/script.sh
      - scripts/00.chat/metrics/estimate-chat-cost/script.js
      - scripts/00.chat/reporting/generate-commit-log-summary/script.sh
      - .agentic/00.chat/checklists/before-commit.md
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    no_unexpected: true
source_refs:
  - scripts/00.chat/session-log/record-chat-commit/script.sh
  - scripts/00.chat/metrics/estimate-chat-cost/script.js
  - scripts/00.chat/reporting/generate-commit-log-summary/script.sh
  - .agentic/00.chat/checklists/before-commit.md
update_triggers:
  - Chat commit metric fields change.
  - Commit log summary generation changes.
  - Session metric recognition vocabulary changes.

