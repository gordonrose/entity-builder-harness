schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.deploy-execution-mcp-server-blocked
status: active
owner_layer: 02.rag-rulebook
purpose: Prove a deploy-execution prompt selects precise MCP deployment evidence but blocks execution on missing AWS, GitHub, transport/auth, executable-check, and cost/capacity proof.
