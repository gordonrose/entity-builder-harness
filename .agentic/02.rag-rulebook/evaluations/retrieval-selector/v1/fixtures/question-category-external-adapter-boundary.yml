schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-external-adapter-boundary
status: active
owner_layer: 02.rag-rulebook
purpose: Prove generic external-adapter questions select platform adapter consumption and rule-pack evidence.
input:
  request_text: How should we evaluate an external adapter without mixing product, deploy, and RAG authority?
  max_chunks: 8
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: external adapter
        category: question-category
        canonical_id: question.platform-adapter.external-boundary
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - docs/harness/architecture/rules/concerns/platform-adapter-consumption.yml
      - docs/harness/architecture/rule-packs/add-platform-adapter.yml
      - docs/harness/architecture/rules/concerns/dependency-direction.yml
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    no_unexpected: true
source_refs:
  - docs/harness/architecture/rules/concerns/platform-adapter-consumption.yml
  - docs/harness/architecture/rule-packs/add-platform-adapter.yml
  - docs/harness/architecture/rules/concerns/dependency-direction.yml
update_triggers:
  - Platform adapter consumption rules change.
  - Add-platform-adapter rule pack changes.
  - External adapter boundary vocabulary changes.
