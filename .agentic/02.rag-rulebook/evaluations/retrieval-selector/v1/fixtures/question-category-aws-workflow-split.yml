schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-aws-workflow-split
status: active
owner_layer: 02.rag-rulebook
purpose: Prove AWS workflow prompts retrieve inspect, plan, and execute workflow boundaries together.
input:
  request_text: How does the AWS inspect plan execute workflow split separate inspect AWS state, plan AWS change, execute approved AWS change, and AWS workflows?
  max_chunks: 8
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: AWS inspect plan execute
        category: question-category
        canonical_id: question.deploy.aws-workflow-split
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: AWS workflows
        category: evidence-family
        canonical_id: evidence.deploy.aws-workflows
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - .agentic/aws/README.md
      - .agentic/aws/workflows/inspect-aws-state.md
      - .agentic/aws/workflows/plan-aws-change.md
      - .agentic/aws/workflows/execute-approved-aws-change.md
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    no_unexpected: true
source_refs:
  - .agentic/aws/README.md
  - .agentic/aws/workflows/inspect-aws-state.md
  - .agentic/aws/workflows/plan-aws-change.md
  - .agentic/aws/workflows/execute-approved-aws-change.md
update_triggers:
  - AWS workflow split changes.
  - AWS layer README changes.
  - AWS operations recognition vocabulary changes.
