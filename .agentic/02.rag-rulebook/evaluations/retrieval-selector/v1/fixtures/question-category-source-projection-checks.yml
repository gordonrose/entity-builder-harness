schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-source-projection-checks
status: active
owner_layer: 02.rag-rulebook
purpose: Prove projection gap prompts include both manifest and executable checks.
input:
  request_text: Which source material projection and gap checks should run before committing a RAG rulebook change?
  max_chunks: 12
expected:
  routing:
    status: ready
  recognition:
    required_canonical_ids:
      - question.rag.source-projection-checks
  selected_chunks:
    required_source_paths:
      - .agentic/02.rag-rulebook/source-projections/v1.yml
      - scripts/02.rag-rulebook/check-source-projections/script.sh
      - scripts/02.rag-rulebook/check-source-projections/README.md
      - scripts/02.rag-rulebook/check-source-material-coverage/script.sh
      - scripts/02.rag-rulebook/generate-source-to-rule-work-order/script.sh
      - scripts/02.rag-rulebook/commit-gates/script.sh
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    no_unexpected: true
source_refs:
  - .agentic/02.rag-rulebook/source-projections/v1.yml
  - scripts/02.rag-rulebook/check-source-projections/script.sh
  - scripts/02.rag-rulebook/check-source-projections/README.md
