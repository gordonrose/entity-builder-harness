schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-rag-generated-recognition-repair
status: active
owner_layer: 02.rag-rulebook
purpose: Prove stale generated recognition-source prompts retrieve build-local-runtime, generator, and commit-gate evidence together.
input:
  request_text: What should I do when generated recognition sources are stale and the RAG commit gate fails?
  max_chunks: 8
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: generated recognition sources are stale
        category: question-category
        canonical_id: question.rag.generated-recognition-repair
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: RAG commit gate
        category: question-category
        canonical_id: question.rag-rulebook.commit-gates
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - scripts/02.rag-rulebook/build-local-runtime/script.sh
      - scripts/02.rag-rulebook/generate-recognition-sources/script.sh
      - scripts/02.rag-rulebook/commit-gates/script.sh
      - scripts/repo/commit-gates/script.sh
      - .agentic/02.rag-rulebook/README.md
      - docs/02.rag-rulebook/source-material/rag-retrieval.md
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    no_unexpected: true
source_refs:
  - scripts/02.rag-rulebook/build-local-runtime/script.sh
  - scripts/02.rag-rulebook/generate-recognition-sources/script.sh
  - scripts/02.rag-rulebook/commit-gates/script.sh
  - scripts/repo/commit-gates/script.sh
  - .agentic/02.rag-rulebook/README.md
  - docs/02.rag-rulebook/source-material/rag-retrieval.md
update_triggers:
  - Generated recognition-source repair behavior changes.
  - RAG commit gates change.
  - RAG local runtime build behavior changes.

