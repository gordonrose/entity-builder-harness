schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-domain-corpus-package
status: active
owner_layer: 02.rag-rulebook
purpose: Prove modular domain corpus questions do not fall back to generic deploy or dependency rules.
input:
  request_text: How does the domain corpus package use the domain corpus package standard, source projection manifest, and source-to-rule derivation?
  max_chunks: 10
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: domain corpus package
        category: question-category
        canonical_id: question.rag.domain-corpus-package
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: domain corpus package standard
        category: evidence-family
        canonical_id: evidence.rag.domain-corpus-package-standard
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - .agentic/02.rag-rulebook/standards/domain-corpus-package.md
      - .agentic/02.rag-rulebook/source-projections/v1.yml
      - .agentic/02.rag-rulebook/schemas/source-projection-manifest.schema.yml
      - .agentic/02.rag-rulebook/standards/source-to-rule-derivation.md
      - .agentic/02.rag-rulebook/source-projections/README.md
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    allowed:
      - gap.corpus.02.rag-rulebook.rag-retrieval-source-of-truth
    no_unexpected: true
source_refs:
  - .agentic/02.rag-rulebook/standards/domain-corpus-package.md
  - .agentic/02.rag-rulebook/source-projections/v1.yml
  - .agentic/02.rag-rulebook/schemas/source-projection-manifest.schema.yml
  - .agentic/02.rag-rulebook/standards/source-to-rule-derivation.md
  - .agentic/02.rag-rulebook/source-projections/README.md
update_triggers:
  - Domain corpus package standard changes.
  - Source projection manifest or schema changes.
  - Source-to-rule derivation policy changes.
