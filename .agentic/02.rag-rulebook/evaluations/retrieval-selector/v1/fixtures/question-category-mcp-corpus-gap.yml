schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-mcp-corpus-gap
status: active
owner_layer: 02.rag-rulebook
purpose: Prove deploy-corpus gap prompts include the explicit gap record alongside deploy rules and readiness checks.
input:
  request_text: What MCP server deployment corpus gap and deploy blockers should I know about before relying on RAG?
  max_chunks: 10
expected:
  routing:
    status: ready
  recognition:
    required_canonical_ids:
      - question.deploy.mcp-corpus-gap
  selected_chunks:
    required_source_paths:
      - .agentic/02.rag-rulebook/corpus-gaps/04.deploy/mcp-server-deployment.yml
      - docs/04.deploy/rules/02.rag-rulebook/mcp-server-deployment.yml
      - docs/04.deploy/rules/02.rag-rulebook/github-to-aws-deployment.yml
      - docs/04.deploy/rules/02.rag-rulebook/aws-runtime-boundaries.yml
      - scripts/04.deploy/verify-rag-rulebook-deploy-readiness/script.sh
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    allowed:
      - gap.corpus.04.deploy.mcp-server-deployment
    no_unexpected: true
source_refs:
  - .agentic/02.rag-rulebook/corpus-gaps/04.deploy/mcp-server-deployment.yml
  - docs/04.deploy/rules/02.rag-rulebook/mcp-server-deployment.yml
  - docs/04.deploy/rules/02.rag-rulebook/github-to-aws-deployment.yml
  - docs/04.deploy/rules/02.rag-rulebook/aws-runtime-boundaries.yml
  - scripts/04.deploy/verify-rag-rulebook-deploy-readiness/script.sh
update_triggers:
  - MCP deployment corpus gap changes.
  - Deploy readiness checks change.
  - RAG deploy rule coverage changes.
