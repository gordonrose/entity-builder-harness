schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-rulebook-coverage-tracker
status: active
owner_layer: 02.rag-rulebook
purpose: Prove rulebook coverage prompts retrieve the continue workflow, coverage/progress state, and representative rule evidence.
input:
  request_text: How does the rulebook harvest coverage tracker use rulebook coverage state, rulebook progress, and continue rulebook workflow?
  max_chunks: 8
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: rulebook harvest coverage
        category: question-category
        canonical_id: question.harness.rulebook-coverage-tracker
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: rulebook coverage state
        category: evidence-family
        canonical_id: evidence.harness.rulebook-coverage-state
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - .agentic/01.harness/workflows/continue-rulebook.workflow.md
      - .agentic/01.harness/state/rulebook-coverage.yml
      - .agentic/01.harness/state/rulebook-progress.yml
      - docs/harness/architecture/rules/concerns/generated-code.yml
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    no_unexpected: true
source_refs:
  - .agentic/01.harness/workflows/continue-rulebook.workflow.md
  - .agentic/01.harness/state/rulebook-coverage.yml
  - .agentic/01.harness/state/rulebook-progress.yml
  - docs/harness/architecture/rules/concerns/generated-code.yml
update_triggers:
  - Rulebook coverage workflow or state changes.
  - Rulebook harvest process changes.
  - Generated-code rule evidence changes.
