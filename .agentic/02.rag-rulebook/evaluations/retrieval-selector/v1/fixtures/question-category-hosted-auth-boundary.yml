schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-hosted-auth-boundary
status: active
owner_layer: 02.rag-rulebook
purpose: Prove ServiceTokenSecretArn and fallback questions select both the RAG-owned provider contract and deploy foundation evidence.
input:
  request_text: How does hosted RAG authentication use ServiceTokenSecretArn and what is the fallback boundary?
  max_chunks: 10
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: ServiceTokenSecretArn
        category: question-category
        canonical_id: question.rag.hosted-auth-boundary
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - docs/02.rag-rulebook/source-material/hosted-context-provider-contract.md
      - docs/02.rag-rulebook/rules/concerns/hosted-context-provider-contract.yml
      - docs/02.rag-rulebook/postman/README.md
      - infra/04.deploy/02.rag-rulebook/ecs-fargate/cloudformation/foundation.yml
    required_rule_ids:
      - hosted-context-provider-contract.rag-rulebook-owns-provider-selection
      - hosted-context-provider-contract.hosted-auth-fails-closed
      - hosted-context-provider-contract.local-fallback-is-governed
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
