schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.request-context-exact-corpus-cross-session
status: active
owner_layer: 02.rag-rulebook
purpose: Prove explicit request context beats session continuity for retrieval while preserving session provenance.
input:
  request_text: Explain the corpus.03.product.platform rules using the exact product platform corpus.
  session:
    layer: 02.rag-rulebook
    mode: implementation
    workflow: .agentic/02.rag-rulebook/workflows/default.md
  focused_paths:
    - docs/harness/architecture/rules/layers/platform.yml
  max_chunks: 6
expected:
  routing:
    layer: 03.product
    mode: discovery
    workflow: .agentic/product/workflows/default.md
    status: ready
  action_authorization:
    requested_action: context-retrieval
    side_effect_class: none
    execution_allowed: false
    status: not-requested
  matched_corpora:
    required:
      - corpus.03.product.platform
  selected_corpora:
    required:
      - corpus.03.product.platform
  recognition:
    required_source_ids:
      - recognition.generated.routing
      - recognition.generated.artifacts
    required_matches:
      - source_id: recognition.generated.routing
        matched_input: prompt
        category: corpus-id
        canonical_id: corpus.03.product.platform
      - source_id: recognition.generated.artifacts
        matched_input: focused-paths
        category: file-path
        canonical_id: harness.architecture.rules.layers.platform
  gaps:
    allowed:
      - gap.selector-fixture.prompt-session-layer-conflict
      - gap.selector-fixture.prototype-corpus-bridge
    no_unexpected: true
  selected_chunks:
    required_artifact_ids:
      - artifact.layer.platform
  confidence:
    min_retrieval: 0.7
source_refs:
  - .agentic/02.rag-rulebook/policies/retrieval-selector/v1.yml
  - .agentic/02.rag-rulebook/policies/retrieval-selector/v1/dimensions/request-context.yml
  - .agentic/02.rag-rulebook/standards/retrieval-selector-evaluations.md
update_triggers:
  - Request-context precedence changes.
  - Exact corpus recognition changes.
  - Platform rule artifact IDs or paths change.
