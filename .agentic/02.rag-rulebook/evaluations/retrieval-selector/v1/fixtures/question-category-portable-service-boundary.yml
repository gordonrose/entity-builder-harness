schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-portable-service-boundary
status: active
owner_layer: 02.rag-rulebook
purpose: Prove portable service prompts retrieve both contract docs and concrete HTTP service implementation.
input:
  request_text: How does the portable context provider use the RAG service server for HTTP auth and local query boundary?
  max_chunks: 10
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: portable context provider
        category: question-category
        canonical_id: question.rag.portable-service-boundary
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: RAG service server
        category: evidence-family
        canonical_id: evidence.rag.service-server
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - docs/02.rag-rulebook/source-material/hosted-context-provider-contract.md
      - docs/02.rag-rulebook/rules/concerns/hosted-context-provider-contract.yml
      - scripts/02.rag-rulebook/query-local-context/README.md
      - .agentic/02.rag-rulebook/service/README.md
      - .agentic/02.rag-rulebook/service/server.mjs
      - .agentic/02.rag-rulebook/standards/portable-service-contract.md
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    allowed:
      - gap.corpus.02.rag-rulebook.hosted-context-provider-contract
    no_unexpected: true
source_refs:
  - docs/02.rag-rulebook/source-material/hosted-context-provider-contract.md
