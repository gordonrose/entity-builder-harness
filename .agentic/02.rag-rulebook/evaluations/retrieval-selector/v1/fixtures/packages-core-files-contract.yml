schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.packages-core-files-contract
status: active
owner_layer: 02.rag-rulebook
purpose: Prove prompts about CSV uploads and stored file contracts retrieve file metadata, validation, scan, access intent, duplicate/idempotent put behavior, storage-port, app/platform/infra boundary guidance.
input:
  request_text: Explain how packages/core should model a CSV upload file contract with file id, name, content type, size, checksum, scan status, metadata, storage reference, access intent for reads/deletes, duplicate/idempotent put behavior, retention/legal-hold facts, and FileStorage without putting object storage, signed URLs, virus scanning, CSV parsing, retention jobs, or cloud resources in core.
  session:
    trust_routing: true
    layer: 03.product
    mode: discovery
    workflow: .agentic/product/workflows/default.md
  focused_paths:
    - packages/core/src/files/index.ts
    - docs/harness/architecture/rules/layers/packages-core.yml
    - docs/harness/architecture/rules/concerns/persistence-files-storage.yml
    - docs/harness/architecture/rules/concerns/platform-infra-capability-layering.yml
  max_chunks: 10
expected:
  routing:
    layer: 01.harness
    status: ready
  matched_corpora:
    required:
      - corpus.03.product.core
  selected_corpora:
    required:
      - corpus.03.product.core
  selected_content_kinds:
    required:
      - rule
  selected_chunks:
    required_rule_ids:
      - core.files-contracts-name-high-risk-file-storage
      - persistence-files-storage.files-are-high-risk-storage
  required_checks:
    min_count: 1
  citations:
    min_count: 1
  gaps:
    no_unexpected: true
banned:
  selected_corpora:
    - corpus.00.chat
source_refs:
  - docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
  - docs/harness/architecture/rules/layers/packages-core.yml
  - docs/harness/architecture/rules/concerns/persistence-files-storage.yml
  - docs/harness/architecture/rules/concerns/platform-infra-capability-layering.yml
  - .agentic/02.rag-rulebook/policies/retrieval-selector/v1.yml
update_triggers:
  - packages/core files ownership rules change.
  - Persistence/file storage or capability-layering rules change file ownership boundaries.
  - Selector policy changes corpus ownership or evidence bundle behavior.
