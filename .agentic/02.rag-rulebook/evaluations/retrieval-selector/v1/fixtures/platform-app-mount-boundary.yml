schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.platform-app-mount-boundary
status: active
owner_layer: 02.rag-rulebook
purpose: Prove prompts about app service/feature/capability structure before platform runtime retrieve the app mount boundary rules.
input:
  request_text: "Using docs/harness/architecture/adrs/0026-use-app-mount-as-platform-integration-boundary.md, docs/harness/architecture/rules/layers/platform.yml, docs/harness/architecture/rules/layers/apps.yml, and docs/harness/architecture/rules/concerns/dependency-direction.yml, explain the platform app mount boundary: apps expose app.mount.ts and platform must not depend on app internal service feature capability structure."
  session:
    trust_routing: true
    layer: 03.product
    mode: discovery
    workflow: .agentic/product/workflows/default.md
  max_chunks: 12
expected:
  routing:
    status: ready
  matched_corpora:
    required:
      - corpus.03.product.platform
      - corpus.03.product.apps
      - corpus.06.shared
  selected_corpora:
    required:
      - corpus.03.product.platform
      - corpus.03.product.apps
      - corpus.06.shared
  selected_content_kinds:
    required:
      - rule
  selected_chunks:
    required_rule_ids:
      - platform.contracts-are-the-app-boundary
      - platform.composition-root-is-the-only-app-importer
      - apps.publish-explicit-mounts-and-manifests
      - dependency.apps-are-not-foundations
  citations:
    min_count: 1
  gaps:
    no_unexpected: true
banned:
  selected_corpora:
    - corpus.00.chat
    - corpus.04.deploy
source_refs:
  - docs/harness/architecture/adrs/0026-use-app-mount-as-platform-integration-boundary.md
  - docs/harness/architecture/rules/layers/platform.yml
  - docs/harness/architecture/rules/layers/apps.yml
  - docs/harness/architecture/rules/concerns/dependency-direction.yml
  - .agentic/02.rag-rulebook/policies/retrieval-selector/v1.yml
update_triggers:
  - App mount boundary rules change.
  - Platform composition-root exception rules change.
  - Apps explicit mount and manifest rules change.
  - Selector policy changes corpus ownership or question-category evidence bundles.
