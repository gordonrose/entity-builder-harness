schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-product-contract-surface
status: active
owner_layer: 02.rag-rulebook
purpose: Prove packages/core contract questions include README and platform contract evidence, not only architecture rules.
input:
  request_text: Can you explain the packages/core contract surface and how it relates to platform/contracts?
  max_chunks: 8
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: packages/core contract surface
        category: question-category
        canonical_id: question.product.contract-surface
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: contracts
        category: evidence-family
        canonical_id: evidence.platform.contracts
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - docs/harness/architecture/rules/layers/packages-core.yml
      - packages/core/README.md
      - platform/contracts/README.md
      - docs/harness/architecture/adrs/0025-place-composed-runtime-contexts-in-platform-contracts.md
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    no_unexpected: true
source_refs:
  - docs/harness/architecture/rules/layers/packages-core.yml
  - packages/core/README.md
  - platform/contracts/README.md
  - docs/harness/architecture/adrs/0025-place-composed-runtime-contexts-in-platform-contracts.md
update_triggers:
  - Product contract surface vocabulary changes.
  - packages/core or platform/contracts orientation changes.
  - Platform contract placement ADR changes.
