schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-chat-rag-boundary
status: active
owner_layer: 02.rag-rulebook
purpose: Prove 00.chat lifecycle questions retrieve chat-start and prompt-level RAG routing policy evidence together.
input:
  request_text: How should 00.chat lifecycle relate to per-prompt RAG routing, and why should chat not classify the whole session by mode or layer?
  max_chunks: 8
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: per-prompt RAG routing
        category: question-category
        canonical_id: question.chat-rag.boundary
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: chat lifecycle
        category: evidence-family
        canonical_id: evidence.chat.lifecycle
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - .agentic/00.chat/workflows/chat-start.md
      - .agentic/02.rag-rulebook/standards/retrieval-selector-policy-system.md
      - docs/02.rag-rulebook/source-material/rag-retrieval.md
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    allowed:
      - gap.corpus.02.rag-rulebook.rag-retrieval-source-of-truth
    no_unexpected: true
source_refs:
  - .agentic/00.chat/workflows/chat-start.md
  - .agentic/02.rag-rulebook/standards/retrieval-selector-policy-system.md
  - docs/02.rag-rulebook/source-material/rag-retrieval.md
update_triggers:
  - Chat startup workflow changes.
  - Retrieval selector request-context policy changes.
  - Chat/RAG boundary vocabulary changes.
