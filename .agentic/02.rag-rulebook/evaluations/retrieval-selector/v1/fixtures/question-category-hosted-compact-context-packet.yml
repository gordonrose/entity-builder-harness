schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-hosted-compact-context-packet
status: active
owner_layer: 02.rag-rulebook
purpose: Prove hosted RAG service testing questions select source material, Postman docs, and local query docs.
input:
  request_text: How do I test the hosted RAG service and compact context packets using /context/query and Postman?
  max_chunks: 8
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: hosted RAG service
        category: question-category
        canonical_id: question.rag.hosted-context-packet
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: Postman
        category: evidence-family
        canonical_id: evidence.rag.postman-collection
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - docs/02.rag-rulebook/source-material/hosted-context-provider-contract.md
      - docs/02.rag-rulebook/postman/README.md
      - scripts/02.rag-rulebook/query-local-context/README.md
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    allowed:
      - gap.corpus.02.rag-rulebook.hosted-context-provider-contract
      - gap.corpus.02.rag-rulebook.rag-retrieval-source-of-truth
    no_unexpected: true
source_refs:
  - docs/02.rag-rulebook/source-material/hosted-context-provider-contract.md
  - docs/02.rag-rulebook/postman/README.md
  - scripts/02.rag-rulebook/query-local-context/README.md
update_triggers:
  - Hosted context provider contract changes.
  - Postman collection docs change.
  - Compact context packet query behavior changes.
