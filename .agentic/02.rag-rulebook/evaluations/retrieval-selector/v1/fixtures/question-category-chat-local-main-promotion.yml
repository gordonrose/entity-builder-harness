schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-chat-local-main-promotion
status: active
owner_layer: 02.rag-rulebook
purpose: Prove local main promotion questions select promote, refresh, verification, and closeout guidance.
input:
  request_text: When I say merge to main, should the chat branch be promoted to local main or pushed to origin/main?
  max_chunks: 8
expected:
  routing:
    layer: 00.chat
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: merge to main
        category: question-category
        canonical_id: question.chat.local-main-promotion
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - .agentic/00.chat/workflows/chat-promote-to-main.md
      - .agentic/00.chat/workflows/chat-refresh-from-main.md
      - scripts/00.chat/local-merge/verify-chat-ready-to-merge-local-main/script.sh
      - scripts/00.chat/closeout/build-closeout-prompt/script.sh
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - generated-concepts
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    no_unexpected: true
source_refs:
  - .agentic/00.chat/workflows/chat-promote-to-main.md
  - .agentic/00.chat/workflows/chat-refresh-from-main.md
