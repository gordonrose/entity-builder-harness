schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-rag-retrieval-source-of-truth
status: active
owner_layer: 02.rag-rulebook
purpose: Prove RAG source-of-truth questions select canonical retrieval source material before illustrative examples.
input:
  request_text: When a prompt includes illustrative example paths, how should RAG prefer the real source of truth over the example paths?
  max_chunks: 8
expected:
  routing:
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: illustrative example paths
        category: question-category
        canonical_id: question.rag-retrieval.source-of-truth
        matched_input: prompt-example
      - source_id: recognition.curated.question-categories
        term: illustrative example
        category: evidence-family
        canonical_id: evidence.rag-retrieval.example-deprioritization
        matched_input: prompt-example
  selected_chunks:
    required_source_paths:
      - docs/02.rag-rulebook/source-material/rag-retrieval.md
      - .agentic/02.rag-rulebook/evaluations/retrieval-selector/v1/fixtures/illustrative-example-paths-deprioritized.yml
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    allowed:
      - gap.corpus.02.rag-rulebook.rag-retrieval-source-of-truth
    no_unexpected: true
banned:
  selected_corpora:
    - corpus.03.product.apps
source_refs:
  - docs/02.rag-rulebook/source-material/rag-retrieval.md
  - .agentic/02.rag-rulebook/evaluations/retrieval-selector/v1/fixtures/illustrative-example-paths-deprioritized.yml
  - .agentic/02.rag-rulebook/recognition-sources/curated/question-categories.yml
update_triggers:
  - RAG retrieval source material changes.
  - Example-context deprioritization behavior changes.
  - Source-of-truth question-category recognition changes.
