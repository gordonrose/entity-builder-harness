schema: rag-rulebook/retrieval-selector-evaluation/v1
fixture_id: retrieval-selector.v1.question-category-chat-worktree-recovery
status: active
owner_layer: 02.rag-rulebook
purpose: Prove index.lock and dirty-worktree questions select governed recovery paths instead of generic git advice.
input:
  request_text: How do I recover when a chat worktree has an index.lock or dirty worktree problem during refresh?
  max_chunks: 8
expected:
  routing:
    layer: 00.chat
    status: ready
  recognition:
    required_matches:
      - source_id: recognition.curated.question-categories
        term: index.lock
        category: question-category
        canonical_id: question.chat.worktree-recovery
        matched_input: prompt
      - source_id: recognition.curated.question-categories
        term: dirty worktree
        category: question-category
        canonical_id: question.chat.worktree-recovery
        matched_input: prompt
  selected_chunks:
    required_source_paths:
      - .agentic/00.chat/workflows/chat-refresh-from-main.md
      - .agentic/00.chat/workflows/chat-promote-to-main.md
      - .agentic/00.chat/workflows/chat-cleanup.md
      - scripts/00.chat/worktree/dirty-worktree-check/script.sh
      - scripts/00.chat/worktree/check-write-location/script.sh
  selector_trace:
    strategy_id: retrieval-selector.v1.hybrid-deterministic-first
    required_applied_stage_ids:
      - curated-concepts
      - evidence-bundles
      - final-ranking
  confidence:
    min_retrieval: 0.9
  gaps:
    no_unexpected: true
source_refs:
  - .agentic/00.chat/workflows/chat-refresh-from-main.md
  - .agentic/00.chat/workflows/chat-promote-to-main.md
  - .agentic/00.chat/workflows/chat-cleanup.md
  - scripts/00.chat/worktree/dirty-worktree-check/script.sh
  - scripts/00.chat/worktree/check-write-location/script.sh
update_triggers:
  - Chat worktree recovery workflows change.
  - Dirty worktree checks change.
  - Worktree recovery recognition vocabulary changes.

