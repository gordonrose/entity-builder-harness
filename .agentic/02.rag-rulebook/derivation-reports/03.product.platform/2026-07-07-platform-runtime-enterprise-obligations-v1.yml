semantic_review:
  source_claims:
    - claim_id: platform.logging.normalizes-rich-runtime-values
      summary: Platform logging adapters should normalize errors, provider failures, framework objects, dates, maps, sets, buffers, streams, circular values, and oversized fields into redacted bounded plain log fields.
      evidence_path: docs/harness/architecture/source-material/platform-runtime-enterprise-obligations-v1.md
    - claim_id: platform.events.use-durable-outbox-when-publication-matters
      summary: Platform event delivery should record outbox messages in the same transaction as important state changes and publish them through a retryable observable platform relay.
      evidence_path: docs/harness/architecture/source-material/platform-runtime-enterprise-obligations-v1.md
    - claim_id: platform.audit.requires-durable-runtime-and-lifecycle
      summary: Platform audit runtime should provide durable recorders with retention, legal hold, export, SIEM integration, access controls, and explicit audit-failure behavior where required.
      evidence_path: docs/harness/architecture/source-material/platform-runtime-enterprise-obligations-v1.md
    - claim_id: platform.payload-metadata-size-budgets-required
      summary: Platform adapters should define size, depth, key-count, truncation, rejection, summary, pointer, checksum, and storage-reference policies for logs, events, audit, prompts, and diagnostics.
      evidence_path: docs/harness/architecture/source-material/platform-runtime-enterprise-obligations-v1.md
    - claim_id: infra.provisions-runtime-obligation-resources
      summary: Infra should provision log sinks, brokers, queues, DLQs, stores, encryption, backups, retention, alarms, dashboards, IAM permissions, and deployment topology that platform adapters need.
      evidence_path: docs/harness/architecture/source-material/platform-runtime-enterprise-obligations-v1.md
  conflicts:
    status: none-found
    search_scope:
