  ownership:
    status: ok
    notes:
      - Core remains contract-only and provider-neutral.
      - Platform owns runtime adapters, normalization, durable delivery, audit recorders, and enforcement.
      - Infra owns cloud resources, retention topology, alarms, permissions, and deployment resources.

