  approved_source_state: approved
  changed_paths:
    - docs/harness/architecture/adrs/0026-use-app-mount-as-platform-integration-boundary.md
  summary: >
    ADR 0026 records that apps expose one approved public app mount module as
    the platform integration boundary, while app-internal service, feature,
    capability, domain, use-case, route, job, health, config, and workflow
    structure stays app-owned and opaque to platform internals.

