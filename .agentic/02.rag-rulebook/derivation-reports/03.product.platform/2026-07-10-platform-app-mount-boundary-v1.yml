semantic_review:
  source_claims:
    - claim_id: platform.app-mount-is-integration-boundary
      summary: Apps expose platform integration through one approved public mount module, normally apps/<app>/app.mount.ts.
      evidence_path: docs/harness/architecture/adrs/0026-use-app-mount-as-platform-integration-boundary.md
    - claim_id: platform.composition-roots-import-only-mounts
      summary: Platform composition roots may import app mount modules, but other platform code must stay unaware of app internals.
      evidence_path: docs/harness/architecture/adrs/0026-use-app-mount-as-platform-integration-boundary.md
    - claim_id: apps.internal-structure-is-app-owned
      summary: App mount modules may aggregate service, feature, capability, domain, use-case, route, job, health, config, or workflow modules, but that structure is not part of the platform contract.
      evidence_path: docs/harness/architecture/adrs/0026-use-app-mount-as-platform-integration-boundary.md
    - claim_id: layers.consume-public-surfaces-not-internals
      summary: Other layers should consume approved public mounts, manifests, generated deployment metadata, or contracts rather than inspecting app internals.
      evidence_path: docs/harness/architecture/adrs/0026-use-app-mount-as-platform-integration-boundary.md
  conflicts:
    status: none-found
    search_scope:
      - docs/harness/architecture/rules/layers/platform.yml
      - docs/harness/architecture/rules/layers/apps.yml
      - docs/harness/architecture/rules/concerns/dependency-direction.yml
    items: []
  drift:
    status: none-found
    items: []
  ownership:
    status: ok
    notes:
      - Platform owns the runtime mount contract and approved composition-root imports.
      - Apps own internal decomposition behind the public mount module.
      - Dependency-direction rules own cross-layer import restrictions.

