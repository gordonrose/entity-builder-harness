  notes:
    - The structured deploy rulebook exists, generated index/chunk proof is present, and the MCP planning selector fixture now selects corpus.04.deploy chunks.
    - GitHub-to-AWS release control and AWS runtime boundary concerns now exist as separate deploy-track rulesets.
    - Remote-main-to-AWS deployment readiness checks now cover branch protection, runtime selection, IaC ownership, immutable artifacts, supply-chain evidence, secrets, MCP threat modeling, operations, and executable proof status.
    - Cost, capacity, and quota controls now exist as explicit deployment readiness coverage.
    - MCP specification references were updated to version 2025-11-25.
    - Deploy-execution selector proof now blocks the prompt "Deploy the RAG rulebook MCP server to AWS from main." on specific deploy proof gaps.
    - The curated intent-form source now recognizes "Deploy the" as deploy execution, with evaluation coverage.
    - Planning, explanation, deployment-plan, and explicit no-action deploy prompts now have negative fixtures proving they do not resolve to deploy execution.
    - Context packets now carry explicit action authorization and blocking gaps now carry selected evidence chunks and citations.
    - Context-packet schema, guide, generator, and validator updates make final resolved intent and side-effect authorization explicit instead of requiring downstream consumers to infer deploy safety from routing status alone.
    - Recognition-candidate schema and validator updates split MCP retrieval coverage from deploy execution readiness so covered retrieval does not imply executable deployment approval.
    - Retrieval selector evaluator updates allow fixtures to assert resolved intent, action authorization, required blocking evidence chunks, and blocking evidence citations.
    - AWS workflow coverage remains the next missing deploy corpus output.

