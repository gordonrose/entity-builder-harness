semantic_review:
  source_claims:
    - claim_id: local-rag-before-hosted-rag
      summary: Local RAG must work before hosted RAG or AWS deployment is treated as executable.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/mcp-server-deployment.md
    - claim_id: versioned-corpus-packages
      summary: Remote RAG should answer from published, versioned corpus packages rather than uncommitted local files.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/mcp-server-deployment.md
    - claim_id: read-only-mcp-first
      summary: MCP exposure begins with read-only resources, prompts, and context-packet tools before any mutation tools exist.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/mcp-server-deployment.md
    - claim_id: deployment-boundaries
      summary: GitHub and AWS deployment boundaries require explicit auth, audit, health checks, rollback, and stop conditions.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/mcp-server-deployment.md
    - claim_id: github-release-control
      summary: GitHub must provide protected release control, environment authorization, artifact provenance, and deployment history before AWS mutation.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/mcp-server-deployment.md
    - claim_id: aws-runtime-boundaries
      summary: AWS runtime deployment must name account or profile, region, service target, network exposure, secrets boundary, health checks, and rollback proof before mutation.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/mcp-server-deployment.md
    - claim_id: remote-main-readiness
      summary: Remote main deployment requires exact commit, protected release controls, required checks, trigger, and target environment before AWS mutation.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/mcp-server-deployment.md
    - claim_id: immutable-artifact-promotion
      summary: Deployment should promote immutable build artifacts and versioned corpus packages instead of rebuilding untraceable outputs per environment.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/mcp-server-deployment.md
    - claim_id: supply-chain-and-secret-proof
      summary: Production deployment needs artifact provenance, governed secret stores, and redaction boundaries for corpus, chunks, fixtures, logs, and MCP responses.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/mcp-server-deployment.md
    - claim_id: mcp-access-control-threat-model
      summary: Remote MCP exposure requires spec version, capability classification, access control, audit, and threat-model coverage before public use.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/mcp-server-deployment.md
    - claim_id: cost-capacity-quotas
      summary: Remote MCP and RAG endpoints need expected traffic, rate limits, concurrency, token budgets, quotas, budgets, scaling, throttling, and backpressure controls before exposure.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/mcp-server-deployment.md
