semantic_review:
  source_claims:
    - claim_id: ecs.runtime.family.explicit
      summary: ECS Fargate deployment requires runtime_family ecs-fargate before runtime-specific mutation.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: ecs.runtime.task.network.ingress
      summary: The ECS service requires explicit task, container, network, load-balancer, TLS, and ingress fields.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: image.and.corpus.immutable.pair
      summary: Deployment must pair immutable image identity with a versioned corpus package and generated artifact provenance.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: ecs.health.rollback.proof
      summary: ECS service stability, target health, application health, smoke query, and rollback evidence are required before completion.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: capacity.cost.quota.controls
      summary: Cost, capacity, quota, rate-limit, autoscaling, and disablement controls are required before public or production exposure.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: workflow.inputs.pinned
      summary: GitHub Actions deployment requires governed refs, explicit permissions, pinned actions, timeouts, deterministic dependencies, and trusted runner boundaries.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: image.provenance.scans.sbom.attestation
      summary: Service image provenance must include immutable digest, scan result, SBOM, and attestation evidence where required.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: corpus.provenance.runtime.freshness
      summary: Generated RAG corpus artifacts need source projection, derivation, index, chunk, recognition-source, policy, and runtime freshness proof.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: publish.promote.authority.separate
      summary: Build, publish, deploy, verify, and rollback authority should stay separated by job or phase.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: unverified.provenance.blocks.deploy
      summary: Missing artifact identity, corpus identity, workflow identity, or freshness proof blocks deploy execution.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: context.packet.data.classification
      summary: Context packets need explicit data classification, schema version, retrieval policy, token budgets, citations, and gaps.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: tenant.repo.corpus.authorization
      summary: Hosted context retrieval requires authorization by tenant, repo, corpus, corpus version, and capability surface.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: secrets.never.enter.retrieval
      summary: Secret values must stay out of source material, rules, chunks, packets, fixtures, logs, and API or MCP responses.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: read.only.context.provider.first
      summary: The first hosted API or MCP surface should expose read-only context retrieval rather than mutation tools.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
    - claim_id: audit.logs.redacted.minimum.fields
      summary: Audit logs must reconstruct retrieval and deployment decisions while redacting secrets, transcripts, prompts, and unrelated repo content.
      evidence_path: docs/04.deploy/source-material/02.rag-rulebook/github-actions-to-ecs-fargate.md
