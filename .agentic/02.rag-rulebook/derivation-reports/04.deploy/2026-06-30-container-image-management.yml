semantic_review:
  source_claims:
    - claim_id: container.image.boundary.infra
      summary: Deployable Dockerfiles and image definitions belong under infra/<deploy-layer>/<deploy-track>/image.
      evidence_path: docs/04.deploy/source-material/shared/container-image-management.md
    - claim_id: container.build.context.explicit
      summary: Container builds must name Dockerfile path, build context, and dockerignore coverage.
      evidence_path: docs/04.deploy/source-material/shared/container-image-management.md
    - claim_id: container.runtime.hardening.required
      summary: Runtime images require hardening, explicit ports, health checks, bounded writes, and smoke proof before remote exposure.
      evidence_path: docs/04.deploy/source-material/shared/container-image-management.md
    - claim_id: container.provenance.required
      summary: Staging and production image promotion requires immutable digest, source, scan, SBOM, and provenance evidence.
      evidence_path: docs/04.deploy/source-material/shared/container-image-management.md
    - claim_id: container.boundary.reduces.drift
      summary: A single predictable image boundary reduces token cost, stale instructions, and deployable artifact drift.
      evidence_path: docs/04.deploy/source-material/shared/container-image-management.md
  conflicts:
    status: none-found
    search_scope:
