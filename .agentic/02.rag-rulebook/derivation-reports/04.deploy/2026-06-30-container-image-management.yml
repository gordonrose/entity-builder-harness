    notes:
      - Shared container image policy is deploy-owned because it governs deployable infrastructure artifacts.
      - The canonical Dockerfile boundary lives under infra because image definitions are packaging and runtime infrastructure.
      - Service source remains outside infra; infra image directories own packaging boundaries, not business logic.

