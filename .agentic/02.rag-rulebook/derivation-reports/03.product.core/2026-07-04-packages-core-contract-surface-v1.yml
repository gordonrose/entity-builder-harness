semantic_review:
  source_claims:
    - claim_id: core.bootstrap.exception.narrow
      summary: The initial core slice may create contract modules before app and platform consumers exist, but only as a narrow bootstrap exception.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.contracts.only
      summary: Core may define stable contract shapes, ports, types, errors, policies, and pure primitives.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.contracts.compatibility.additive-first
      summary: Public core contract changes should be additive by default because apps, platform runtime, adapters, tests, and future generated code may compile against exported names and meanings.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.contracts.breaking-changes.require-migration
      summary: Renames, removals, narrowing, or meaning changes require an explicit compatibility decision, affected-consumer analysis, migration guidance, and normally a deprecation window or shim.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.contracts.durable-payloads.need-schema-version
      summary: Durable, replayed, retried, exported, or cross-deployment payloads need explicit schema/version facts before they become runtime obligations.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.contracts.old-usages.need-compatibility-fixtures
      summary: Public TypeScript contracts need compile-only compatibility fixtures that model old app and platform usages and fail when compatibility is broken unintentionally.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.provider.implementations.outside
      summary: Provider adapters, runtime hosts, infrastructure, and product workflows must remain outside packages/core.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.config.provider.neutral
      summary: The config module may define provider-neutral config sources, primitive readers, schemas, and validation errors, but must not read directly from process.env, files, AWS SSM, Secrets Manager, databases, or deployment manifests.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.config.record-source.snapshot
      summary: Record-backed config sources should snapshot their input values when created so later caller mutation does not change the source contract.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.shared.iso-date-time.strict
      summary: ISODateTime values should be explicit ISO date-time strings with timezone information, not date-only strings, localized prose dates, or implicit local-time strings.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.shared.json-values.finite-plain
      summary: Provider-neutral JSON-like contract values should reject non-finite numbers and non-plain runtime objects when copying claims, policy facts, event payloads, or audit metadata.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.shared.core-error.optional-diagnostic
      summary: CoreError may carry an optional diagnostic descriptor when a failure needs structured recovery, retryability, or user-correctability metadata, and module error helpers should preserve it when supplied.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.diagnostics.provider-neutral-boundary
      summary: The diagnostics module may define failure kinds, failure sources, severity, recovery disposition, recovery action vocabulary, retryable and user-correctable indicators, primitive diagnostic facts, and small pure helpers.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.diagnostics.self-healing-loop-vocabulary
      summary: Diagnostics should support the detect, classify, correlate, decide, act, verify, and escalate loop as shared vocabulary without implementing the workflow in core.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.diagnostics.user-vs-bug-classification
      summary: Diagnostics should help distinguish user/input errors, retryable provider outages, data-integrity conflicts, and code bugs without parsing free-text logs.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.diagnostics.no-contradictory-recovery-flags
      summary: Diagnostic descriptors should reject contradictory recovery flags such as automation_retryable recovery with retryable false or user_correctable recovery with userCorrectable false.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.diagnostics.facts.primitive-safe
      summary: Diagnostic facts must stay primitive, bounded, finite-number safe, and free of secrets, raw request bodies, provider objects, class instances, and runtime-only values.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.diagnostics.no-runtime-remediation
      summary: Core diagnostics must not implement retries, repair workflows, AI debugging, log queries, incident routing, runbook orchestration, provider actions, product policy, or infrastructure alarms.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.logging.provider.neutral
      summary: The logging module may define operational log records, logger ports, default sensitive-field vocabulary, redactors, redaction helpers, and no-op or wrapping loggers, but must not write directly to console, CloudWatch, OpenTelemetry, files, Datadog, or other runtime sinks.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.logging.sensitive-fields.maintained
      summary: Common sensitive log field names discovered later should be maintained in the packages/core logging layer, while app-specific, platform-specific, or provider-specific fields extend the default redactor at the consuming boundary.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.monitoring.provider-neutral-boundary
      summary: The monitoring module may define provider-neutral monitored components, health checks, metrics, signal categories, signal intents, ownership, safe labels, metrics ports, and small pure test helpers.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.monitoring.health-check-contracts
      summary: Monitoring contracts should support liveness, readiness, dependency, and capability probes with component, status, timestamp, optional duration, explanation, and plain metadata.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.monitoring.metric-label-safety
      summary: Metric labels should stay primitive, bounded, low-cardinality, and free of secrets, raw credentials, tokens, emails, phone numbers, raw user ids, request ids, correlation ids, trace ids, session ids, IP addresses, raw URLs, raw paths, provider objects, non-finite numbers, and runtime-only values.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.monitoring.signal-ownership-sli-intent
      summary: Monitoring signal definitions should record why a signal exists, who owns it, which component it describes, and whether it supports health detection, alerting, capacity planning, debugging, SLI use, or cost control.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.monitoring.no-provider-backends
      summary: Core monitoring must not define concrete providers, exporters, health endpoints, dashboards, alert thresholds, incident routes, production SLO targets, runtime wiring, cloud SDK clients, infrastructure alarms, or product-specific uptime commitments.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.security.provider-neutral-boundary
      summary: The security module may define provider-neutral secret string markers, hash contracts, hasher ports, data sensitivity labels, sensitive value classification, security policy ids, policy violations, policy decisions, policy evaluators, and pure helpers.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.security.policy-decisions-contract-only
      summary: Security policy contracts in core may represent allowed or denied defensive policy outcomes with stable translation-ready violation reasons, but must not implement a policy engine or decide product security settings.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.security.evidence.serializable
      summary: Security policy evidence should stay plain and serializable and must not carry secrets, raw credentials, tokens, provider objects, request objects, class instances, non-finite numeric values, or runtime-only values.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.security.no-runtime-policy-implementation
      summary: Core security must not define product password rules, tenant-specific security policies, MFA workflows, JWT/session parsing, API key checking, rate-limit algorithms, secret storage, encryption providers, IAM policies, KMS keys, middleware, or concrete hashing algorithms.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.tenancy.provider.neutral
      summary: The tenancy module may define tenant identifiers, tenant context packets, resolver ports, and pure helpers, but must not decide tenant discovery from hostnames, JWT claims, headers, database rows, AWS account mappings, product workflows, or deployment topology.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.authn.principal.global-actor
      summary: The authn module may define global principal identity, principal type, authentication result, authenticator ports, and helpers, but must not treat the principal as a tenant-specific user profile, tenant account, or exhaustive tenant membership list.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.authn.claims.serializable
      summary: Principal claims should be normalized into plain serializable provider-neutral values and must not carry raw provider objects, dates, sessions, credentials, or tokens.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.authz.policy.question-shape
      summary: The authz module may define permission, resource, relationship, ABAC attribute, authorization request, decision, authorizer, and helper contracts, but must not own credential authentication, product-specific roles, relationship inheritance rules, ABAC policy language, team membership storage, or tenant-specific permission meanings.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.authz.permission.validated
      summary: Permission helpers should create non-empty resource:action strings without whitespace or nested colon separators.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.authz.denials.reason-required
      summary: Authorization denials must carry translation-ready reasons, and authorization attributes, facts, and evidence should stay plain and serializable.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.persistence.provider-neutral-boundary
      summary: The persistence module may define provider-neutral page, optional page total, repository, save option, persistence error, unit-of-work, transaction, after-commit, concurrency-token, and in-memory test-helper contracts.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.persistence.page-totals.optional-standard
      summary: Total counts should be optional, but total records or total matching records should use shared non-negative integer page-total contracts when a product use case includes them.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.persistence.provider-errors-normalized
      summary: Platform adapters should translate provider-specific lock, deadlock, timeout, conditional-write, and network failures into stable persistence error meanings.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.persistence.concurrency-token
      summary: Repository save contracts may use an expected concurrency token to reject stale writes without requiring core to choose a locking strategy or database implementation.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.persistence.after-commit
      summary: After-commit hooks should be reserved for side effects that must only run after successful transaction commit, such as event publishing or scheduled work.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.persistence.transaction-failures-normalized
      summary: Transaction failures should surface through stable persistence vocabulary rather than leaking raw database, runtime, or test-helper error shapes.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.persistence.no-db-topology
      summary: Core persistence must not define SQL, ORM models, database clients, tables, indexes, shards, backups, object-storage clients, product-specific repositories, or product workflow decisions.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.files.provider-neutral-boundary
      summary: The files module may define provider-neutral file id, file name, content type, byte size, checksum, storage reference, scan result, access intent, duplicate/idempotent put policy, retention/legal-hold facts, metadata, file error, storage port, and in-memory helper contracts.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.files.high-risk-storage
      summary: Files are high-risk storage because they are large, user-controlled, often sensitive, and require visible content-type validation, size policy, tenant isolation, scan status, checksum, storage reference, access intent, retention/legal-hold needs, and audit/log correlation.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.files.access-intent-for-read-delete
      summary: File storage read and delete ports should receive provider-neutral access intent rather than raw file ids so tenant, correlation, operation, and access-purpose facts are present at the boundary.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.files.duplicate-put-behavior-explicit
      summary: File put contracts should define duplicate behavior, including default duplicate conflict and explicit idempotent duplicate handling for safe retry paths where attempted metadata still matches the stored file.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.files.metadata.serializable
      summary: File metadata should stay plain and serializable, map invalid metadata to stable file error vocabulary, and must not carry secrets, raw credentials, provider objects, request objects, parser instances, large file bodies, non-finite numeric values, or runtime-only values.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.files.body-generic
      summary: File body handling should stay generic in core so platform runtime owns request parsing, stream handling, content validation, scanner invocation, direct access grants, and adapter lifecycle.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.files.no-provider-storage
      summary: Core files must not define object-storage buckets, public URLs, signed URL generation, scanner integrations, image processing, CSV/spreadsheet parsing, product document workflows, retention jobs, legal-hold jobs, cloud SDK clients, provider resource names, or deployment topology.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.events.provider-neutral-boundary
      summary: The events module may define provider-neutral event id, type, version, payload, envelope, publish error, publisher or bus, handler, and in-memory/no-op helper contracts.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.events.payloads.serializable
      summary: Event payloads should stay plain and serializable so platform adapters can move them through brokers, outboxes, logs, tests, and workers without provider-specific objects.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.events.payloads.finite-plain
      summary: Event payloads should reject non-finite numeric values and non-plain runtime objects before they cross app/platform boundaries.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.events.types.not-broker-topics
      summary: Event type names are portable domain facts and should not be treated as concrete broker topics, queue names, stream names, or subscription resources.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.events.provider-errors-normalized
      summary: Publishing failures should use stable error vocabulary rather than exposing provider-specific broker errors directly to app code.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.events.post-commit-publishing
      summary: Events that depend on successful state changes should be published through a post-commit path such as persistence afterCommit or an outbox relay.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.events.helper-state-semantics
      summary: In-memory event helpers should define whether recorded events mean attempted, accepted, or successfully handled publish operations.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.events.no-broker-topology
      summary: Core events must not define product event catalogs, broker topics, subscriber deployment, retries, dead-letter queues, ordering guarantees, schema registries, cloud SDK clients, worker runtimes, or product workflow decisions.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.queues.provider-neutral-boundary
      summary: The queues module may define provider-neutral queue message id, message type, message version, payload, message envelope, send options, delivery metadata, retry/dead-letter metadata, queue error, queue port, handler, and in-memory/no-op helper contracts.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.queues.schema-version
      summary: Queue messages should carry explicit positive integer schema versions, and durable platform adapters must preserve those versions when messages are serialized, retried, replayed, or moved to dead-letter paths.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.queues.delivery-disposition-unambiguous
      summary: Queue delivery metadata should keep retry and dead-letter disposition unambiguous; one delivery may be retryable or dead-lettered, but not both.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.queues.payloads.serializable
      summary: Queue payloads should stay plain and serializable so platform adapters can move them through queues, retries, logs, tests, workers, and dead-letter paths without provider-specific objects.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.queues.payloads.finite-plain
      summary: Queue payloads should reject non-finite numeric values and non-plain runtime objects before they cross app/platform boundaries.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.queues.types.not-provider-routes
      summary: Queue message type names are portable work-kind facts and should not be treated as concrete broker queue names, SQS queue URLs, Kafka topics, routing keys, or worker deployment names.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.queues.provider-errors-normalized
      summary: Sending failures and handling failures should use stable queue error vocabulary rather than exposing provider-specific broker errors directly to app code.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.queues.retry-dlq-metadata-contract-only
      summary: Queue contracts may name retry and dead-letter metadata without forcing core to implement worker loops, provider receive/delete semantics, or broker-specific retry policies.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.queues.no-worker-or-broker-topology
      summary: Core queues must not define product job catalogs, product handlers, worker runtimes, broker queue resources, queue URLs, receipt handles, visibility timeouts, concrete retry algorithms, scheduler loops, DLQ resources, cloud SDK clients, or deployment topology.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.audit.provider-neutral-boundary
      summary: The audit module may define provider-neutral audit event id, type, version, actor, target, outcome, timestamp, tenant context, correlation id, reason, metadata, recorder, recorder error, and in-memory/no-op helper contracts.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.audit.schema-version
      summary: Audit events should carry explicit positive integer schema versions, and durable audit recorders, exporters, retention workflows, and SIEM adapters must preserve those versions across storage, export, and compliance boundaries.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.audit.accountability-record
      summary: Audit records should answer who did what, to which target, in which tenant or context, when, from which correlated request or job, and with which outcome.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.audit.actor-target-required
      summary: Audit events should carry an explicit actor and target, representing anonymous/system actors and global/system-scoped targets deliberately instead of omitting those fields.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.audit.outcomes-explicit
      summary: Audit outcomes should distinguish successful, denied, and failed actions so security review and product history do not depend on parsing operational logs.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.audit.metadata.serializable
      summary: Audit metadata should stay plain and serializable and must not carry secrets, tokens, raw credentials, rich provider objects, raw request bodies by default, or runtime-only values.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.audit.metadata.finite-plain
      summary: Audit metadata should reject non-finite numeric values and non-plain runtime objects before it crosses storage, export, or compliance boundaries.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.audit.not-logs-events-or-metrics
      summary: Audit records are not operational logs, analytics events, monitoring metrics, or event-bus messages.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.audit.no-storage-topology
      summary: Core audit must not define product audit catalogs, storage tables, buckets, retention policy, legal hold, redaction jobs, export workflows, SIEM integrations, CloudWatch sinks, cloud SDK clients, or product workflow decisions.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: rag.disposition.required
      summary: Knowledge-bearing packages/core changes require a RAG knowledge disposition at commit time.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
  conflicts:
    status: none-found
    search_scope:
      - docs/harness/architecture/rules/layers/packages-core.yml
      - docs/harness/architecture/rules/layers/platform.yml
      - docs/harness/architecture/rules/layers/apps.yml
      - docs/harness/architecture/rules/concerns/dependency-direction.yml
    items: []
  drift:
    status: none-found
    items: []
  ownership:
    status: ok
    notes:
      - packages/core contract guidance is product-core knowledge for retrieval.
      - RAG/rulebook owns the projection and commit-time knowledge-disposition gate.
      - The chat layer stays portable by calling only the neutral repository extension hook.

