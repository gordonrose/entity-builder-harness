semantic_review:
  source_claims:
    - claim_id: core.bootstrap.exception.narrow
      summary: The initial core slice may create contract modules before app and platform consumers exist, but only as a narrow bootstrap exception.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.contracts.only
      summary: Core may define stable contract shapes, ports, types, errors, policies, and pure primitives.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.provider.implementations.outside
      summary: Provider adapters, runtime hosts, infrastructure, and product workflows must remain outside packages/core.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.config.provider.neutral
      summary: The config module may define provider-neutral config sources, primitive readers, schemas, and validation errors, but must not read directly from process.env, files, AWS SSM, Secrets Manager, databases, or deployment manifests.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.logging.provider.neutral
      summary: The logging module may define operational log records, logger ports, default sensitive-field vocabulary, redactors, redaction helpers, and no-op or wrapping loggers, but must not write directly to console, CloudWatch, OpenTelemetry, files, Datadog, or other runtime sinks.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.logging.sensitive-fields.maintained
      summary: Common sensitive log field names discovered later should be maintained in the packages/core logging layer, while app-specific, platform-specific, or provider-specific fields extend the default redactor at the consuming boundary.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.tenancy.provider.neutral
      summary: The tenancy module may define tenant identifiers, tenant context packets, resolver ports, and pure helpers, but must not decide tenant discovery from hostnames, JWT claims, headers, database rows, AWS account mappings, product workflows, or deployment topology.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.authn.principal.global-actor
      summary: The authn module may define global principal identity, principal type, authentication result, authenticator ports, and helpers, but must not treat the principal as a tenant-specific user profile, tenant account, or exhaustive tenant membership list.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: core.authz.policy.question-shape
      summary: The authz module may define permission, resource, relationship, ABAC attribute, authorization request, decision, authorizer, and helper contracts, but must not own credential authentication, product-specific roles, relationship inheritance rules, ABAC policy language, team membership storage, or tenant-specific permission meanings.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
    - claim_id: rag.disposition.required
      summary: Knowledge-bearing packages/core changes require a RAG knowledge disposition at commit time.
      evidence_path: docs/harness/architecture/source-material/packages-core-contract-surface-v1.md
  conflicts:
    status: none-found
    search_scope:
