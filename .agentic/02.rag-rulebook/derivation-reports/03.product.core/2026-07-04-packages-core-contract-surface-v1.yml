    - Existing packages/core rules define the general ownership boundary.
    - >
      This update tightens event and audit contract guidance after agent review:
      explicit audit actor/target, finite/plain JSON values, in-memory event
      helper success semantics, standardized transaction failure vocabulary,
      security defensive-policy contract boundaries, monitoring operational-signal
      contract boundaries, and queue retryable-work contract boundaries.
      This update also adds additive-first public contract evolution,
      deprecation/migration, durable payload schema-version, and compatibility
      fixture requirements. Queue message and audit event contracts now include
      explicit schema-version claims before durable platform adapters exist.
      Diagnostics now provide a provider-neutral failure classification and
      self-healing vocabulary while leaving remediation workflows to
      platform/runtime, provider adapters, infra, and product policy.
      Files now provide provider-neutral high-risk storage contracts while
      leaving storage adapters, scanning, direct access, retention, legal hold,
      parsing, and resource topology outside core.
    - The selector fixtures ask for events broker-boundary guidance, audit accountability/storage-boundary guidance, security defensive-policy guidance, monitoring health/metrics/signal guidance, queue worker/provider-boundary guidance, diagnostics/self-healing boundary guidance, and files high-risk-storage guidance directly.
    - The compatibility selector fixture asks for deprecation, backwards compatibility, schema-version, and old public usage fixture guidance directly.

