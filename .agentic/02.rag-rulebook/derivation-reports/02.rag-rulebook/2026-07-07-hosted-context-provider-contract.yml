      summary: >
        The RAG rulebook layer owns hosted/local provider selection, auth, fallback,
        redaction, and packet validation; callers only request context packets.
      evidence_path: docs/02.rag-rulebook/source-material/hosted-context-provider-contract.md
    - claim_id: local-config-is-rag-owned
      summary: >
        The local hosted-provider config path is ~/.config/rag-rulebook/rag.env,
        not an llm-workbench or chat-owned path.
      evidence_path: docs/02.rag-rulebook/source-material/hosted-context-provider-contract.md
    - claim_id: hosted-auth-fails-closed
      summary: >
        Explicit hosted mode must fail closed for missing or rejected bearer auth
        instead of silently falling back to local RAG.
      evidence_path: docs/02.rag-rulebook/source-material/hosted-context-provider-contract.md
    - claim_id: local-fallback-is-governed
      summary: >
        Local fallback is allowed only when explicitly governed, and rejected hosted
        credentials remain blocking.
      evidence_path: docs/02.rag-rulebook/source-material/hosted-context-provider-contract.md
