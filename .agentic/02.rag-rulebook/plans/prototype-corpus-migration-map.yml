schema: rag-rulebook-prototype-corpus-migration-map/v1
status: active
source_root: docs/harness/architecture

policy:
  - This map is read-only planning. It does not authorize moving files.
  - Existing prototype corpus files remain under `docs/harness/architecture/` until a governed artifact path migration is approved.
  - Target paths are proposed package locations, not current repository paths.
  - Mixed concerns should be split only after the rulebook index can prove current references, related rulesets, and rule-pack dependencies.
  - Any future migration must update metadata headers, relative references, rule-pack required rulesets, README links, and generated indexes together.

target_corpora:
  - corpus_id: corpus.01.harness
    purpose: Agentic harness governance, chat/git process, command surfaces, and harness ADRs.
  - corpus_id: corpus.02.rag-rulebook
    purpose: RAG/rulebook service governance, schema, index, chunking, retrieval, and corpus packaging rules.
  - corpus_id: corpus.03.product
    purpose: Product, apps, packages, entity-builder, and product architecture source material.
  - corpus_id: corpus.03.product.apps
    purpose: App composition, entity flows, product routes, and app-owned behavior.
  - corpus_id: corpus.03.product.core
    purpose: Stable product-neutral core contracts and shared primitives.
  - corpus_id: corpus.03.product.design-system
    purpose: Design-system, token, primitive, pattern, component, and UI theming rules.
  - corpus_id: corpus.03.product.frontend-kit
    purpose: Reusable frontend-kit, form, table, and entity-page UI shell rules.
  - corpus_id: corpus.03.product.platform
    purpose: Runtime platform, app mounting, adapters, jobs, config, observability, and platform contracts.
  - corpus_id: corpus.04.deploy
    purpose: Infrastructure, release, CI/CD, runtime environment, and deployment operations rules.
  - corpus_id: corpus.06.shared
    purpose: Cross-corpus rules that deliberately govern multiple numbered corpora.

