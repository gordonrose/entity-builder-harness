reference_update_requirements:
  - Update `related_rulesets` paths in every moved ruleset.
  - Update `required_rulesets` paths in every moved rule pack.
  - Update metadata `used_by` path hints when artifacts move.
  - Preserve stable metadata IDs unless the concept splits into multiple artifacts.
  - Create new IDs for split artifacts; mark old aggregate artifacts deprecated only after replacement coverage is validated.
  - Update README, manifest, plan, and generated index references in the same migration.

validation_before_move:
  - Parse all current YAML artifacts.
  - Generate a current-state rulebook index.
  - Check duplicate metadata IDs and rulebook IDs.
  - Check that every related ruleset and required ruleset resolves before and after migration.
  - Check that every proposed corpus ID has a manifest.
  - Run artifact metadata header checks on moved files.
  - Run artifact path migration checks for source and target paths.

next_decision_points:
  - Decide whether `corpus.06.shared` should own cross-corpus architecture concerns or whether those concerns should split per corpus.
  - Decide whether product subcorpora should become physical top-level corpus packages or manifest-declared subcorpora under `corpus.03.product`.
  - Decide how ADR 0022 should be related to both `corpus.01.harness` and `corpus.02.rag-rulebook`.
  - Design the rulebook index schema so it can represent both current prototype paths and proposed corpus package paths.
