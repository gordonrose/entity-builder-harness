  originals:
    current_glob: docs/harness/architecture/guides/originals/*.pdf
    proposed_target_pattern: "<matching-corpus>/sources/originals/<current-filename>"
    migration_status: preserve-with-source-guide
    notes:
      - Preserve original PDFs as source evidence when moving generated Markdown guide derivatives.
      - Do not make PDFs primary retrieval chunks until the Markdown derivative and source reference policy are explicit.
  adrs:
    current_glob: docs/harness/architecture/adrs/*.md
    proposed_corpus_id: corpus.01.harness
    proposed_target_pattern: corpus.01.harness/sources/adrs/<current-filename>
    migration_status: target-candidate
    notes:
      - Current ADRs are harness architecture decisions even when they introduce other layers.
      - ADR 0022 should be related from `corpus.02.rag-rulebook` because it creates the RAG/Rulebook layer.

