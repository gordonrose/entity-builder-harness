schema: rag-rulebook/recognition-source/v1
source_id: recognition.curated.question-categories
version: 1
status: active
source_kinds:
  - question-category
  - domain-noun
generation_mode: curated
owner_layer: 02.rag-rulebook
purpose: Recognize reviewed question categories that require expected evidence bundles, plus low-authority evidence-family hints used only inside those bundles.
match_priority: 37
used_by_dimensions:
  - prompt
  - request-context
  - evidence-bundles
  - confidence-thresholds
terms:
  - term: where should
    category: question-category
    match_type: phrase
    canonical_id: question.architecture-boundary.capability-placement
    aliases:
      - where does
      - should live
      - belongs
      - belong
      - part of
      - one of our apps
    confidence_weight: 0.8
  - term: platform
    category: evidence-family
    match_type: exact
    canonical_id: evidence.layer.platform
    evidence_path: docs/harness/architecture/rules/layers/platform.yml
    confidence_weight: 0.65
  - term: apps
    category: evidence-family
    match_type: exact
    canonical_id: evidence.layer.apps
    evidence_path: docs/harness/architecture/rules/layers/apps.yml
    aliases:
      - app
    confidence_weight: 0.65
  - term: dependency direction
    category: evidence-family
    match_type: phrase
    canonical_id: evidence.concern.dependency-direction
    evidence_path: docs/harness/architecture/rules/concerns/dependency-direction.yml
    aliases:
      - dependency boundary
      - import direction
    confidence_weight: 0.75
validation_rules:
  - Question categories choose expected evidence families; they do not select execution workflows.
  - Evidence-family terms are lower authority than exact corpus IDs, artifact IDs, and paths.
  - Broad evidence-family terms must be used through evidence-bundles policy and must not cross corpus boundaries by themselves.
  - Every new question category requires at least one selector evaluation fixture before broad use.
refresh_policy:
  trigger: Review after A/B evaluation finds a repeated retrieval-shape miss for a class of questions.
  owner: 02.rag-rulebook
  review_required_when:
    - Adding a question category.
    - Adding a broad evidence-family term.
    - Increasing confidence weight.
    - Mapping a question category to side-effecting workflow behavior.
