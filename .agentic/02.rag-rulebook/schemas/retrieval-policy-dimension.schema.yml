schema: rag-rulebook-retrieval-policy-dimension-schema/v1
policy_dimension_schema: rag-rulebook/retrieval-policy-dimension/v1

purpose: Define the imported per-dimension policy contract used by a retrieval selector policy pack.

principles:
  - Keep each dimension small enough to read, review, and test independently.
  - Make expected behavior and banned behavior equally explicit.
  - Treat gaps and stop conditions as first-class outputs, not hidden failures.
  - Require examples that prove the dimension can be validated before selector runtime code depends on it.

required_fields:
  - schema
  - dimension_id
  - version
  - status
  - applies_to_policy_pack
  - purpose
  - required_inputs
  - expected_actions
  - banned_actions
  - output_obligations
  - gap_or_stop_conditions
  - ranking_effects
  - validation_examples
  - can_change_by

fields:
  schema:
    type: string
    allowed_values:
      - rag-rulebook/retrieval-policy-dimension/v1

  dimension_id:
    type: enum
    allowed_values:
      - prompt
      - request-context
      - evidence-bundles
      - retrieval-strategy
      - session-metadata
      - layer-mode-workflow
      - focused-paths
      - corpus-ownership
      - rule-graph
      - required-checks
      - stop-conditions
      - token-budget
      - confidence-thresholds
      - validation-handoff
      - semantic-recall

  version:
    type: integer
    minimum: 1

  status:
    type: enum
    allowed_values:
      - draft
      - active
      - superseded
      - retired

  applies_to_policy_pack:
    type: string
    format: policy-pack-id

  purpose:
    type: string

  required_inputs:
    type: array
    items:
      type: string

  expected_actions:
    type: array
    items:
      type: string

  banned_actions:
    type: array
    items:
      type: string

  output_obligations:
    type: array
    items:
      type: string

  gap_or_stop_conditions:
    type: array
    items:
      type: string

  ranking_effects:
    type: array
    items:
      type: string

  validation_examples:
    type: array
    item:
      type: object
      required_fields:
        - name
        - given
        - expect
      fields:
        name:
          type: string
        given:
          type: string
        expect:
          type: string

  can_change_by:
    type: array
    items:
      type: string

  recognition_sources:
    type: array
    note: Prompt dimension only. Lists governed lookup sources used to recognize prompt terms.
    item:
      type: object
      required_fields:
        - source_id
        - source_kinds
        - generation_mode
        - expected_origin
        - purpose
      fields:
        source_id:
          type: string
        source_kinds:
          type: array
          items:
            type: string
        generation_mode:
          type: enum
          allowed_values:
            - generated
            - curated
        expected_origin:
          type: string
        purpose:
          type: string

  extraction_rules:
    type: array
    note: Prompt dimension only. Explains how raw language becomes structured prompt signals.
    items:
      type: string

  term_categories:
    type: object
    note: Prompt dimension only. Names the prompt term families produced by recognition.

  classification_outputs:
    type: array
    note: Prompt dimension only. Lists structured outputs the prompt recognizer must emit.
    items:
      type: string

  intent_resolution:
    type: object
    note: Prompt dimension only. Defines governed default intent, intent precedence, and intent labels for compiled selector policy.

  evidence_bundles:
    type: array
    note: Evidence-bundles dimension only. Maps recognized question categories to required source paths and evidence-family source paths.
    item:
      type: object
      required_fields:
        - question_category_id
      fields:
        question_category_id:
          type: string
        always_source_paths:
          type: array
          items:
            type: string
        family_source_paths:
          type: object

  retrieval_strategy:
    type: object
    note: Retrieval-strategy dimension only. Defines ordered selector stages and the traceable outputs each stage must emit.
    required_fields:
      - strategy_id
      - stages
    fields:
      strategy_id:
        type: string
      stages:
        type: array
        item:
          type: object
          required_fields:
            - stage_id
            - rank
            - purpose
          fields:
            stage_id:
              type: string
            rank:
              type: integer
            purpose:
              type: string
            primary_inputs:
              type: array
              items:
                type: string
            expected_outputs:
              type: array
              items:
                type: string

field_guide:
  - path: dimension_id
    what_it_is: Stable ID for one retrieval selection dimension.
    what_it_does: Lets a policy pack import and validate the dimension without relying on file names alone.
    rules:
      - Must match the importing policy-pack dimension entry.
      - Must use one of the schema's allowed dimension IDs.

  - path: required_inputs
    what_it_is: The signals the selector must provide before this dimension can be applied.
    what_it_does: Prevents selector code from guessing when required context is missing.
    rules:
      - Must list concrete inputs such as prompt text, session metadata, paths, chunks, thresholds, or graph edges.

  - path: expected_actions
    what_it_is: Behaviors this dimension should perform when its inputs are available.
    what_it_does: Gives selector code a positive contract to execute.
    rules:
      - Must be concrete enough to test.
      - Should explain how the dimension changes selection or packet assembly.

  - path: banned_actions
    what_it_is: Behaviors this dimension must not perform.
    what_it_does: Prevents natural-language interpretation, semantic recall, trimming, or convenience from bypassing governance.
    rules:
      - Must be non-empty for every dimension.
      - Should name the failure mode the rule prevents.

  - path: output_obligations
    what_it_is: Data this dimension must preserve or emit into the selection report or context packet.
    what_it_does: Keeps important evidence, checks, stops, gaps, and provenance from being lost.
    rules:
      - Must include outputs that downstream packet validation can inspect.

  - path: gap_or_stop_conditions
    what_it_is: Conditions that should create a gap or block packet readiness.
    what_it_does: Makes uncertainty visible instead of letting retrieval produce overconfident context.
    rules:
      - Must name at least one gap or stop behavior.
      - Blocking conditions must not be downgraded into warnings by selector code.

  - path: ranking_effects
    what_it_is: How this dimension affects ranking, trimming, graph expansion, or selection priority.
    what_it_does: Lets the selector keep context small while preserving mandatory evidence.
    rules:
      - Must not contradict policy-pack precedence.

  - path: validation_examples
    what_it_is: Small reviewable cases that prove the dimension's behavior.
    what_it_does: Gives validators and future fixtures a source of expected behavior.
    rules:
      - Each example must include `name`, `given`, and `expect`.
      - Examples should include at least one happy path or one banned/gap behavior.

  - path: recognition_sources
    what_it_is: Prompt-dimension lookup sources used to recognize nouns, paths, schemas, actions, risks, and aliases.
    what_it_does: Grounds prompt interpretation in governed inventories instead of free-form guessing.
    rules:
      - Prompt recognition should match exact generated identifiers before curated broad terms.
      - Generated and curated sources must remain distinguishable.

  - path: extraction_rules
    what_it_is: Prompt-dimension rules for turning raw language into structured signals.
    what_it_does: Explains how terms are recognized, ordered, normalized, and kept from overriding metadata.
    rules:
      - Must prefer exact governed identifiers over broad prompt terms.
      - Must record which recognition source produced each match.

  - path: classification_outputs
    what_it_is: Structured outputs emitted by prompt recognition.
    what_it_does: Gives downstream selector logic concrete fields to rank, compare, and validate.
    rules:
      - Must include confidence and conflict outputs.
