schema: rag-rulebook-source-projection-manifest-schema/v1
manifest_schema: rag-rulebook/source-projection-manifest/v1

purpose: Define how governed source material is registered against derived structured rules, derivation reports, corpus gaps, and selector proof.

required_fields:
  - schema
  - manifest_id
  - status
  - projection_sets

fields:
  schema:
    type: string
    allowed_values:
      - rag-rulebook/source-projection-manifest/v1
    field_guide:
      what: Identifies the manifest contract.
      does: Lets validators reject unrelated YAML before interpreting projection rules.
      rules: Must equal `rag-rulebook/source-projection-manifest/v1`.

  manifest_id:
    type: string
    format: lower-dot-id
    field_guide:
      what: Stable identifier for the projection manifest.
      does: Gives reports and gates a durable reference to the active manifest.
      rules: Use a lower-dot identifier and do not repurpose it for a different manifest family.

  status:
    type: enum
    allowed_values:
      - active
      - retired
    field_guide:
      what: Lifecycle state of the manifest.
      does: Prevents retired manifests from being mistaken for active projection policy.
      rules: Commit gates should use the active manifest only.

  projection_sets:
    type: array
    items:
      type: object
      required_fields:
        - id
        - status
        - projection_mode
        - source_material
        - target
        - expected_rule_paths
        - derivation_reports
    field_guide:
      what: The registry entries mapping approved source material to derived outputs.
      does: Lets deterministic checks catch missing, stale, or orphaned source-to-rule projections.
      rules: Each active set must name source material, expected rules, and at least one derivation report.

projection_set_fields:
  id:
    type: string
    format: lower-dot-id
    field_guide:
      what: Stable projection-set identifier.
      does: Lets failures point to one source-to-output mapping.
      rules: Must be unique within the manifest.

  status:
    type: enum
    allowed_values:
      - active
      - planned
      - retired
    field_guide:
      what: Lifecycle state of the projection set.
      does: Allows future planned or retired records without pretending they are current proof.
      rules: Active sets must pass all projection checks; planned and retired sets must not hide active source files.

  projection_mode:
    type: enum
    allowed_values:
      - manual-reviewed
      - generated
      - planned
    field_guide:
      what: How the structured outputs are produced.
      does: Distinguishes current reviewed projections from future generated projections.
      rules: "`manual-reviewed` still requires source hashes and reports; `generated` must name generator proof when added."

  source_material:
    type: array
    items:
      type: object
      required_fields:
        - path
        - role
    field_guide:
      what: Canonical Markdown source files for this projection.
      does: Gives commit gates the source file set to track for drift and missing projections.
      rules: Active source paths must exist under governed source-material roots.

  target:
    type: object
    required_fields:
      - corpus_id
      - owner_layer
    field_guide:
      what: Ownership target for the projection.
      does: Keeps deploy, product, harness, and RAG/rulebook knowledge from blending into one corpus.
      rules: The corpus ID and owner layer must match the derived rule locations.

  expected_rule_paths:
    type: array
    items:
      type: string
    field_guide:
      what: Structured YAML rules expected from the source material.
      does: Lets checks prove derived YAML exists, carries source provenance, and reaches chunks.
      rules: "Active paths must exist under governed rule roots and carry current `source_derivation`."

  derivation_reports:
    type: array
    items:
      type: string
    field_guide:
      what: Review reports explaining semantic source-to-rule conversion.
      does: Keeps LLM-assisted or human interpretation auditable.
      rules: "Active sets require at least one report under `.agentic/02.rag-rulebook/derivation-reports/`."

  corpus_gap_paths:
    type: array
    items:
      type: string
    field_guide:
      what: Known corpus gaps related to the projection.
      does: Preserves incomplete implementation or corpus depth without blocking all retrieval.
      rules: Listed paths must exist when present.

  expected_selector_evaluations:
    type: array
    items:
      type: string
    field_guide:
      what: Retrieval selector fixtures expected to prove this projection is findable or safely blocked.
      does: Connects source-to-rule work to context-packet behavior.
      rules: Listed paths must exist when present.

  required_checks:
    type: array
    items:
      type: string
    field_guide:
      what: Commands that should prove the projection at commit or review time.
      does: Makes the proof set visible to humans and future sub-agents.
      rules: Use exact command strings already governed by scripts or workflows.
