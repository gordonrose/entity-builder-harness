# agentic-artifact:
#   schema: agentic-artifact/v2
#   id: rag-rulebook.schema.context-packet
#   version: 1
#   status: active
#   layer: 02.rag-rulebook
#   domain: context-packets
#   disciplines:
#     - agentic
#     - architecture
#   kind: schema
#   purpose: Define the v1 context-packet contract returned by the portable RAG/rulebook service.
#   portability:
#     class: reusable
#     targets:
#       - llm-workbench
#       - entity-builder
#       - design-system-builder
#   used_by:
#     - id: rag-rulebook.standard.portable-service-contract
#       path: .agentic/02.rag-rulebook/standards/portable-service-contract.md
#     - id: rag-rulebook.plan.repo
#       path: .agentic/02.rag-rulebook/plans/repo-plan.md
#     - id: rag-rulebook.guide.context-packet
#       path: .agentic/02.rag-rulebook/guides/context-packet.md
#     - id: rag-rulebook.script.validate-context-packet
#       path: scripts/02.rag-rulebook/validate-context-packet/script.sh
#     - id: rag-rulebook.script.generate-context-packet-fixture
#       path: scripts/02.rag-rulebook/generate-context-packet-fixture/script.sh
#     - id: rag-rulebook.script.generate-retrieval-selector-fixture
#       path: scripts/02.rag-rulebook/generate-retrieval-selector-fixture/script.sh

schema: rag-rulebook-context-packet-schema/v1
packet_schema: rag-rulebook/context-packet/v1

purpose: Define the smallest governed context packet a RAG/rulebook service can return to a consuming workbench.

principles:
  - Prefer deterministic routing, path ownership, artifact metadata, and graph expansion before semantic recall.
  - Include only context needed for the requested action and explain why each chunk was selected.
  - Preserve citations and source references for every selected chunk, check, forbidden action, and stop condition.
  - Return gaps and stop conditions instead of filling governance holes with model judgment.
  - Keep final task execution outside the packet; the consuming workflow decides what to do next.

teaching_policy:
  - Use structured `field_guide` entries instead of YAML comments for field explanations.
  - Keep `description` and `rules` concise enough to render in generated reference docs.
  - Put conceptual walkthroughs, mental models, and examples in the companion guide.

required_fields:
  - schema
  - packet_id
  - generated_at
  - request
  - intent
  - routing
  - matched_corpora
  - matched_rule_packs
  - matched_rulesets
  - selected_chunks
  - required_checks
  - forbidden_actions
  - stop_conditions
  - citations
  - confidence
  - gaps
  - budgets
  - provenance

fields:
  schema:
    type: string
    allowed_values:
      - rag-rulebook/context-packet/v1

  packet_id:
    type: string
    format: stable-run-id
    description: Unique packet identifier for one retrieval response.

  generated_at:
    type: string
    format: iso-8601-utc

  request:
    type: object
    required_fields:
      - raw_text
      - normalized_summary
    fields:
      raw_text:
        type: string
      normalized_summary:
        type: string
      focused_paths:
        type: array
        items:
          type: string
      open_artifact_ids:
        type: array
        items:
          type: string

  intent:
    type: object
    required_fields:
      - id
      - label
      - confidence
      - source
    fields:
      id:
        type: string
        format: lower-dot-id
      label:
        type: string
      mode:
        type: string
        examples:
          - discovery
          - implementation
          - review
      layer:
        type: string
        examples:
          - 02.rag-rulebook
      workflow:
        type: string
      confidence:
        type: number
        minimum: 0
        maximum: 1
      source:
        type: enum
        allowed_values:
          - deterministic
          - inferred
          - user-supplied
          - mixed
      evidence_ref_ids:
        type: array
        items:
          type: string

  routing:
    type: object
    required_fields:
      - layer
      - mode
      - workflow
      - status
    fields:
      layer:
        type: string
      mode:
        type: string
      workflow:
        type: string
      status:
        type: enum
        allowed_values:
          - ready
          - needs-clarification
          - blocked
      task_type:
        type: string
      target_paths:
        type: array
        items:
          type: string
      classification_source:
        type: string

  matched_corpora:
    type: array
    item:
      type: object
      required_fields:
        - corpus_id
        - owner_layer
        - match_reason
        - confidence
      fields:
        corpus_id:
          type: string
          format: numbered-corpus-id
          examples:
            - corpus.02.rag-rulebook
            - corpus.03.product.design-system
        owner_layer:
          type: string
        manifest_path:
          type: string
        match_reason:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1

  matched_rule_packs:
    type: array
    item:
      type: object
      required_fields:
        - id
        - corpus_id
        - selection_reason
      fields:
        id:
          type: string
        corpus_id:
          type: string
        path:
          type: string
        selection_reason:
          type: string
        citation_ids:
          type: array
          items:
            type: string

  matched_rulesets:
    type: array
    item:
      type: object
      required_fields:
        - id
        - corpus_id
        - ruleset_type
        - selection_reason
      fields:
        id:
          type: string
        corpus_id:
          type: string
        ruleset_type:
          type: enum
          allowed_values:
            - layer
            - concern
            - standard
            - workflow
        path:
          type: string
        rule_ids:
          type: array
          items:
            type: string
        selection_reason:
          type: string
        citation_ids:
          type: array
          items:
            type: string

  selected_chunks:
    type: array
    item:
      type: object
      required_fields:
        - chunk_id
        - corpus_id
        - artifact_id
        - source_path
        - content
        - rank
        - token_estimate
        - selection_reason
        - citation_ids
      fields:
        chunk_id:
          type: string
        corpus_id:
          type: string
        artifact_id:
          type: string
        source_path:
          type: string
        rule_ids:
          type: array
          items:
            type: string
        content:
          type: string
          description: Minimal text needed by the consuming model.
        rank:
          type: integer
          minimum: 1
        token_estimate:
          type: integer
          minimum: 1
        retrieval_score:
          type: number
          minimum: 0
          maximum: 1
        selection_reason:
          type: string
        citation_ids:
          type: array
          min_items: 1
          items:
            type: string

  required_checks:
    type: array
    item:
      type: object
      required_fields:
        - id
        - description
        - timing
        - citation_ids
      fields:
        id:
          type: string
        description:
          type: string
        timing:
          type: enum
          allowed_values:
            - before-edit
            - before-commit
            - before-deploy
            - after-change
        command:
          type: string
          required_when_known: false
        citation_ids:
          type: array
          min_items: 1
          items:
            type: string

  forbidden_actions:
    type: array
    item:
      type: object
      required_fields:
        - action
        - reason
        - citation_ids
      fields:
        action:
          type: string
        reason:
          type: string
        citation_ids:
          type: array
          min_items: 1
          items:
            type: string

  stop_conditions:
    type: array
    item:
      type: object
      required_fields:
        - id
        - condition
        - severity
        - citation_ids
      fields:
        id:
          type: string
        condition:
          type: string
        severity:
          type: enum
          allowed_values:
            - warning
            - blocking
        suggested_resolution:
          type: string
        citation_ids:
          type: array
          min_items: 1
          items:
            type: string

  citations:
    type: array
    item:
      type: object
      required_fields:
        - id
        - source_path
        - source_type
      fields:
        id:
          type: string
        corpus_id:
          type: string
        artifact_id:
          type: string
        source_path:
          type: string
        source_type:
          type: enum
          allowed_values:
            - source
            - rule
            - rule-pack
            - workflow
            - standard
            - schema
            - plan
        line_start:
          type: integer
          minimum: 1
        line_end:
          type: integer
          minimum: 1
        source_ref:
          type: string

  confidence:
    type: object
    required_fields:
      - overall
      - retrieval
      - routing
    fields:
      overall:
        type: number
        minimum: 0
        maximum: 1
      retrieval:
        type: number
        minimum: 0
        maximum: 1
      routing:
        type: number
        minimum: 0
        maximum: 1
      notes:
        type: array
        items:
          type: string

  gaps:
    type: array
    item:
      type: object
      required_fields:
        - id
        - type
        - description
        - blocking
      fields:
        id:
          type: string
        type:
          type: enum
          allowed_values:
            - missing-corpus
            - ambiguous-intent
            - ambiguous-ownership
            - missing-reference
            - budget-overflow
            - missing-validator
            - unsupported-action
        description:
          type: string
        blocking:
          type: boolean
        suggested_resolution:
          type: string

  budgets:
    type: object
    required_fields:
      - max_context_tokens
      - selected_context_tokens
      - trim_policy
    fields:
      max_context_tokens:
        type: integer
        minimum: 1
      selected_context_tokens:
        type: integer
        minimum: 0
      trim_policy:
        type: enum
        allowed_values:
          - deterministic-first
          - cite-required-context-only
          - fail-when-over-budget

  provenance:
    type: object
    required_fields:
      - service_version
      - corpus_index_versions
      - retrieval_order
    fields:
      service_version:
        type: string
      corpus_index_versions:
        type: array
        items:
          type: object
          required_fields:
            - corpus_id
            - index_version
          fields:
            corpus_id:
              type: string
            index_version:
              type: string
            content_hash:
              type: string
      retrieval_order:
        type: array
        items:
          type: string
      generator:
        type: string

field_guide:
  - path: schema
    what_it_is: "The literal packet schema identifier."
    what_it_does: "Lets consumers reject packets that use an unsupported contract."
    rules:
      - "Must be `rag-rulebook/context-packet/v1`."

  - path: packet_id
    what_it_is: "A unique ID for one retrieval response."
    what_it_does: "Allows logs, diagnostics, and follow-up validation to refer to the exact packet."
    rules:
      - "Must be stable for the generated packet."
      - "Must not be reused for a different retrieval response."

  - path: generated_at
    what_it_is: "The UTC timestamp when the packet was produced."
    what_it_does: "Helps consumers understand freshness and debug stale context."
    rules:
      - "Use ISO-8601 UTC format."

  - path: request
    what_it_is: "The retrieval request as understood by the service."
    what_it_does: "Preserves the original user signal and the normalized task summary."
    rules:
      - "Must include raw text and a normalized summary."
      - "Should include focused paths and open artifacts when available."

  - path: request.raw_text
    what_it_is: "The user's original request text."
    what_it_does: "Keeps the packet traceable to the natural language input."
    rules:
      - "Do not rewrite this field except for exact transport normalization."

  - path: request.normalized_summary
    what_it_is: "A short deterministic summary of the request."
    what_it_does: "Gives retrieval and routing a compact task statement."
    rules:
      - "Should preserve the user's actual intent."
      - "Should not add inferred scope that is not supported by evidence."

  - path: request.focused_paths
    what_it_is: "Paths the user or workbench is focused on."
    what_it_does: "Improves path ownership and artifact matching."
    rules:
      - "Only include paths available to the current request context."

  - path: request.open_artifact_ids
    what_it_is: "Stable artifact IDs visible in the current work context."
    what_it_does: "Lets retrieval use artifact metadata before broad search."
    rules:
      - "Use artifact IDs from metadata headers when available."

  - path: intent
    what_it_is: "The normalized interpretation of what the user is trying to do."
    what_it_does: "Turns natural language into a deterministic routing and retrieval input."
    rules:
      - "Must include confidence and source."
      - "Low-confidence intent must produce a gap or clarification path."

  - path: intent.id
    what_it_is: "The stable machine name for the intent."
    what_it_does: "Lets deterministic workflows key off a known task pattern."
    rules:
      - "Use lowercase dot-separated IDs."

  - path: intent.label
    what_it_is: "A human-readable name for the intent."
    what_it_does: "Makes diagnostics and teaching output easier to read."
    rules:
      - "Keep it short and plain."

  - path: intent.mode
    what_it_is: "The work mode implied by the request."
    what_it_does: "Distinguishes discovery, implementation, review, and similar flows."
    rules:
      - "Should align with the consuming workbench's mode vocabulary."

  - path: intent.layer
    what_it_is: "The numbered layer the intent belongs to."
    what_it_does: "Connects retrieval to the right governance boundary."
    rules:
      - "Use the numbered layer taxonomy."

  - path: intent.workflow
    what_it_is: "The workflow most likely to govern the task."
    what_it_does: "Gives the consumer a deterministic next governance anchor."
    rules:
      - "Do not invent a workflow when ownership is unclear."

  - path: intent.confidence
    what_it_is: "How confident the service is in the normalized intent."
    what_it_does: "Controls whether the consumer can proceed or should ask for clarification."
    rules:
      - "Use a value from 0 to 1."
      - "Low values should create a gap."

  - path: intent.source
    what_it_is: "How the intent was derived."
    what_it_does: "Separates deterministic evidence from inference."
    rules:
      - "Use `deterministic`, `inferred`, `user-supplied`, or `mixed`."

  - path: intent.evidence_ref_ids
    what_it_is: "References that support the intent classification."
    what_it_does: "Makes the intent auditable."
    rules:
      - "Entries should resolve to citations or other packet evidence."

  - path: routing
    what_it_is: "The proposed governance route for the consuming workflow."
    what_it_does: "Tells the consumer which layer, mode, and workflow should handle the task."
    rules:
      - "Must include layer, mode, workflow, and status."

  - path: routing.layer
    what_it_is: "The selected numbered layer."
    what_it_does: "Anchors the task to a governance owner."
    rules:
      - "Must not conflict with matched corpus ownership."

  - path: routing.mode
    what_it_is: "The selected work mode."
    what_it_does: "Helps the consumer choose implementation, review, discovery, or other behavior."
    rules:
      - "Should match the intent mode unless a workflow explicitly overrides it."

  - path: routing.workflow
    what_it_is: "The workflow path or ID selected for the task."
    what_it_does: "Gives agents a specific process to load next."
    rules:
      - "Must be backed by cited governance when available."

  - path: routing.status
    what_it_is: "Whether the route is ready, blocked, or needs clarification."
    what_it_does: "Prevents the consumer from treating weak retrieval as permission to act."
    rules:
      - "Use `ready`, `needs-clarification`, or `blocked`."

  - path: routing.task_type
    what_it_is: "A compact task category."
    what_it_does: "Helps choose validators, schemas, and expected outputs."
    rules:
      - "Prefer stable vocabulary over free-form prose."

  - path: routing.target_paths
    what_it_is: "Paths expected to be read or changed."
    what_it_does: "Improves path-scoped retrieval and validation."
    rules:
      - "Do not include speculative paths without evidence."

  - path: routing.classification_source
    what_it_is: "The source of the route classification."
    what_it_does: "Shows whether routing came from session metadata, classifier output, user input, or inference."
    rules:
      - "Prefer deterministic sources over model-only inference."

  - path: matched_corpora
    what_it_is: "The corpus packages selected for the task."
    what_it_does: "Keeps retrieval modular instead of merging every domain into one instruction set."
    rules:
      - "Each entry must name a corpus ID and match reason."

  - path: matched_corpora[].corpus_id
    what_it_is: "The numbered corpus ID."
    what_it_does: "Identifies the domain knowledge package used for retrieval."
    rules:
      - "Use the numbered corpus vocabulary or an approved subcorpus."

  - path: matched_corpora[].owner_layer
    what_it_is: "The numbered layer that owns the corpus."
    what_it_does: "Makes ownership and routing conflicts visible."
    rules:
      - "Must agree with the corpus manifest when one exists."

  - path: matched_corpora[].manifest_path
    what_it_is: "The path to the corpus manifest."
    what_it_does: "Lets consumers inspect source roots, generated roots, and retrieval policy."
    rules:
      - "Include when a manifest exists."

  - path: matched_corpora[].match_reason
    what_it_is: "Why this corpus was selected."
    what_it_does: "Makes retrieval explainable."
    rules:
      - "Use a specific reason such as path ownership, intent match, or artifact metadata."

  - path: matched_corpora[].confidence
    what_it_is: "Confidence in the corpus match."
    what_it_does: "Helps decide whether cross-corpus retrieval is safe."
    rules:
      - "Use a value from 0 to 1."

  - path: matched_rule_packs
    what_it_is: "Rule packs selected for the task."
    what_it_does: "Adds task-shaped governance beyond broad corpus matching."
    rules:
      - "Each selected rule pack should have a selection reason."

  - path: matched_rule_packs[].id
    what_it_is: "The stable rule-pack ID."
    what_it_does: "Lets consumers trace selected task guidance."
    rules:
      - "Use the ID from the rule-pack artifact when available."

  - path: matched_rule_packs[].corpus_id
    what_it_is: "The corpus that owns the rule pack."
    what_it_does: "Prevents task guidance from losing its domain boundary."
    rules:
      - "Must match one of the selected or related corpora."

  - path: matched_rule_packs[].path
    what_it_is: "The current path to the rule-pack artifact."
    what_it_does: "Supports citation and debugging."
    rules:
      - "Treat as a path hint, not the stable identity."

  - path: matched_rule_packs[].selection_reason
    what_it_is: "Why the rule pack was selected."
    what_it_does: "Shows whether selection was deterministic, graph-expanded, or recalled."
    rules:
      - "Must be specific enough for review."

  - path: matched_rule_packs[].citation_ids
    what_it_is: "Citations supporting the selected rule pack."
    what_it_does: "Connects rule-pack inclusion to source evidence."
    rules:
      - "Entries should resolve to `citations`."

  - path: matched_rulesets
    what_it_is: "Layer, concern, standard, or workflow rulesets selected for the task."
    what_it_does: "Carries reusable governance into the packet."
    rules:
      - "Rulesets should be selected by ownership, dependency, or graph relationship."

  - path: matched_rulesets[].id
    what_it_is: "The stable ruleset ID."
    what_it_does: "Lets consumers trace selected governance."
    rules:
      - "Use artifact metadata IDs when available."

  - path: matched_rulesets[].corpus_id
    what_it_is: "The corpus that owns the ruleset."
    what_it_does: "Keeps ruleset guidance tied to its corpus boundary."
    rules:
      - "Must not silently cross ownership boundaries."

  - path: matched_rulesets[].ruleset_type
    what_it_is: "The type of ruleset selected."
    what_it_does: "Helps consumers interpret whether the guidance is layer, concern, standard, or workflow level."
    rules:
      - "Use one of the allowed values."

  - path: matched_rulesets[].path
    what_it_is: "The current path to the ruleset."
    what_it_does: "Supports citation, debugging, and migration planning."
    rules:
      - "Treat as a path hint."

  - path: matched_rulesets[].rule_ids
    what_it_is: "Specific rule IDs selected inside the ruleset."
    what_it_does: "Lets retrieval narrow a long ruleset to relevant rules."
    rules:
      - "Prefer specific rule IDs over whole-file inclusion."

  - path: matched_rulesets[].selection_reason
    what_it_is: "Why the ruleset was selected."
    what_it_does: "Explains the retrieval path."
    rules:
      - "Name the deterministic match, graph edge, or recall reason."

  - path: matched_rulesets[].citation_ids
    what_it_is: "Citations supporting the selected ruleset."
    what_it_does: "Makes selected governance auditable."
    rules:
      - "Entries should resolve to `citations`."

  - path: selected_chunks
    what_it_is: "The minimal text chunks sent to the consuming model."
    what_it_does: "Provides the actual augmented context while keeping the packet small."
    rules:
      - "Every chunk must explain why it was selected."
      - "Every chunk must have at least one citation."

  - path: selected_chunks[].chunk_id
    what_it_is: "The stable chunk ID."
    what_it_does: "Allows validation, deduplication, and retrieval diagnostics."
    rules:
      - "Must identify one chunk, not a whole corpus."

  - path: selected_chunks[].corpus_id
    what_it_is: "The corpus that produced the chunk."
    what_it_does: "Keeps selected context tied to domain ownership."
    rules:
      - "Must reference a matched or explicitly related corpus."

  - path: selected_chunks[].artifact_id
    what_it_is: "The artifact that owns the chunk."
    what_it_does: "Connects chunk text back to a stable source artifact."
    rules:
      - "Use metadata IDs when available."

  - path: selected_chunks[].source_path
    what_it_is: "The current path to the source artifact."
    what_it_does: "Allows humans and tools to inspect the chunk source."
    rules:
      - "Do not use path as the stable identity."

  - path: selected_chunks[].rule_ids
    what_it_is: "Specific rules represented by the chunk."
    what_it_does: "Preserves rule-level traceability."
    rules:
      - "Use when the chunk comes from structured rules."

  - path: selected_chunks[].content
    what_it_is: "The selected text sent as model context."
    what_it_does: "Provides only the needed evidence or instruction."
    rules:
      - "Keep it minimal."
      - "Do not include uncited generated explanation as if it were source."

  - path: selected_chunks[].rank
    what_it_is: "The chunk's order in the selected context list."
    what_it_does: "Lets consumers preserve retrieval priority."
    rules:
      - "Start at 1."

  - path: selected_chunks[].token_estimate
    what_it_is: "Estimated token cost of the chunk content."
    what_it_does: "Supports context-budget trimming."
    rules:
      - "Must be positive."

  - path: selected_chunks[].retrieval_score
    what_it_is: "Optional normalized retrieval score."
    what_it_does: "Helps diagnostics compare selected chunks."
    rules:
      - "Use 0 to 1 when present."
      - "Do not let score override deterministic stop conditions."

  - path: selected_chunks[].selection_reason
    what_it_is: "Why the chunk was selected."
    what_it_does: "Makes context augmentation explainable."
    rules:
      - "Name the route, graph edge, keyword, semantic match, or rule dependency."

  - path: selected_chunks[].citation_ids
    what_it_is: "Citations backing the chunk."
    what_it_does: "Lets consumers verify the selected text."
    rules:
      - "Must contain at least one citation."

  - path: required_checks
    what_it_is: "Checks the consuming workflow should run."
    what_it_does: "Turns retrieved governance into concrete verification obligations."
    rules:
      - "Every check must have a citation."

  - path: required_checks[].id
    what_it_is: "Stable check identifier."
    what_it_does: "Lets validators and reports refer to the check."
    rules:
      - "Prefer existing script or checklist IDs."

  - path: required_checks[].description
    what_it_is: "Plain-English check description."
    what_it_does: "Explains what must be verified."
    rules:
      - "Keep it action-oriented."

  - path: required_checks[].timing
    what_it_is: "When the check should run."
    what_it_does: "Prevents checks from being run too late."
    rules:
      - "Use an allowed timing value."

  - path: required_checks[].command
    what_it_is: "Optional command for the check."
    what_it_does: "Lets consumers run deterministic validation when known."
    rules:
      - "Only include governed commands."

  - path: required_checks[].citation_ids
    what_it_is: "Citations requiring the check."
    what_it_does: "Shows why the check is mandatory."
    rules:
      - "Must contain at least one citation."

  - path: forbidden_actions
    what_it_is: "Actions the consumer must not take."
    what_it_does: "Carries negative governance into the packet."
    rules:
      - "Every forbidden action must have a reason and citation."

  - path: forbidden_actions[].action
    what_it_is: "The prohibited action."
    what_it_does: "Names exactly what must not happen."
    rules:
      - "Keep it concrete."

  - path: forbidden_actions[].reason
    what_it_is: "Why the action is prohibited."
    what_it_does: "Helps humans understand the guardrail."
    rules:
      - "Tie the reason to governance, not preference."

  - path: forbidden_actions[].citation_ids
    what_it_is: "Citations backing the prohibition."
    what_it_does: "Makes the negative constraint auditable."
    rules:
      - "Must contain at least one citation."

  - path: stop_conditions
    what_it_is: "Conditions that should pause or block action."
    what_it_does: "Prevents the model from improvising through missing governance."
    rules:
      - "Blocking stop conditions must affect routing status."

  - path: stop_conditions[].id
    what_it_is: "Stable stop-condition ID."
    what_it_does: "Lets reports and validators refer to the condition."
    rules:
