  - path: citations[].artifact_id
    what_it_is: "The stable artifact ID for the cited source."
    what_it_does: "Supports path moves and generated indexes."
    rules:
      - "Use metadata IDs when available."

  - path: citations[].source_path
    what_it_is: "The current source path."
    what_it_does: "Lets humans inspect the cited material."
    rules:
