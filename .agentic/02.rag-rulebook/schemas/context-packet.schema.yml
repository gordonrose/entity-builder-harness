  - path: citations[].line_start
    what_it_is: "The first cited line."
    what_it_does: "Makes citations precise."
    rules:
      - "Use when line positions are known."

  - path: citations[].line_end
    what_it_is: "The last cited line."
    what_it_does: "Makes citations precise."
    rules:
      - "Use when line positions are known."
      - "Must not be before `line_start`."

  - path: citations[].source_ref
    what_it_is: "Optional source-local reference label."
    what_it_does: "Names a section, rule, ADR, or source reference."
    rules:
      - "Use stable source labels when available."

  - path: confidence
    what_it_is: "Confidence scores for the packet."
    what_it_does: "Shows whether routing and retrieval are strong enough to use."
    rules:
      - "Must include overall, retrieval, and routing scores."

  - path: confidence.overall
    what_it_is: "Overall confidence in the packet."
    what_it_does: "Summarizes usability for the consumer."
    rules:
      - "Use 0 to 1."

  - path: confidence.retrieval
    what_it_is: "Confidence in selected retrieval results."
    what_it_does: "Separates evidence quality from routing quality."
    rules:
      - "Use 0 to 1."

  - path: confidence.routing
    what_it_is: "Confidence in layer, mode, and workflow routing."
    what_it_does: "Shows whether workflow selection is safe."
    rules:
      - "Use 0 to 1."

  - path: confidence.notes
    what_it_is: "Optional confidence explanation."
    what_it_does: "Captures caveats without hiding them in prose elsewhere."
