  - path: provenance.corpus_index_versions[].index_version
    what_it_is: "The version or label of the corpus index."
    what_it_does: "Lets consumers detect stale indexes."
    rules:
      - "Use a deterministic version when available."

  - path: provenance.corpus_index_versions[].content_hash
    what_it_is: "Optional hash of the index content."
    what_it_does: "Supports exact reconciliation."
    rules:
      - "Use when generated indexes exist."

  - path: provenance.retrieval_order
    what_it_is: "The ordered retrieval strategy used."
    what_it_does: "Shows whether deterministic retrieval happened before semantic recall."
    rules:
      - "Must preserve the actual retrieval order."

  - path: provenance.generator
    what_it_is: "The generator name."
    what_it_does: "Identifies the tool or process that produced the packet."
    rules:
      - "Use when known."

validation_rules:
  - "Every `selected_chunks[].citation_ids[]` entry must resolve to an entry in `citations`."
  - "Every `required_checks`, `forbidden_actions`, and `stop_conditions` entry must have at least one citation."
  - "Every `matched_corpora[].corpus_id` must use the numbered corpus vocabulary or an approved subcorpus."
  - "`budgets.selected_context_tokens` must not exceed `budgets.max_context_tokens`."
  - "If any gap has `blocking: true`, `routing.status` must be `blocked` or `needs-clarification`."
  - "If `intent.source` is `inferred` and `intent.confidence` is low, the packet must include an ambiguity gap."
  - "Semantic or vector recall may explain a selection, but it must not override deterministic ownership or stop conditions."

