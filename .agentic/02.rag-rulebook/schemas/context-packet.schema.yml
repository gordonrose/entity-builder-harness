  - path: stop_conditions[].condition
    what_it_is: "The condition that triggers the stop."
    what_it_does: "Explains what the consumer should watch for."
    rules:
      - "Make it observable."

  - path: stop_conditions[].severity
    what_it_is: "Whether the condition warns or blocks."
    what_it_does: "Controls whether the consumer can continue."
    rules:
      - "Use `warning` or `blocking`."

  - path: stop_conditions[].suggested_resolution
    what_it_is: "Recommended next step when the condition appears."
    what_it_does: "Helps humans recover without improvising."
    rules:
      - "Keep it advisory, not an ungoverned command."

  - path: stop_conditions[].citation_ids
    what_it_is: "Citations backing the stop condition."
    what_it_does: "Makes the stop auditable."
    rules:
      - "Must contain at least one citation."

  - path: citations
    what_it_is: "The source-reference table for the packet."
    what_it_does: "Lets every selected chunk, check, prohibition, and stop condition point back to source."
