  - path: gaps[].type
    what_it_is: "The category of the gap."
    what_it_does: "Helps route recovery or clarification."
    rules:
      - "Use one of the allowed values."

  - path: gaps[].description
    what_it_is: "Plain-English explanation of the gap."
    what_it_does: "Tells the human or workflow what is missing."
    rules:
      - "Name the missing evidence or ambiguity."

  - path: gaps[].blocking
    what_it_is: "Whether the gap blocks action."
    what_it_does: "Prevents unsafe continuation."
