#   schema: agentic-artifact/v2
#   id: rag-rulebook.schema.context-packet
#   version: 1
#   status: active
#   layer: 02.rag-rulebook
#   domain: context-packets
#   disciplines:
#     - agentic
#     - architecture
#   kind: schema
#   purpose: Define the v1 context-packet contract returned by the portable RAG/rulebook service.
#   portability:
#     class: reusable
#     targets:
#       - llm-workbench
#       - entity-builder
#       - design-system-builder
#   used_by:
#     - id: rag-rulebook.standard.portable-service-contract
#       path: .agentic/02.rag-rulebook/standards/portable-service-contract.md
#     - id: rag-rulebook.plan.repo
#       path: .agentic/02.rag-rulebook/plans/repo-plan.md

schema: rag-rulebook-context-packet-schema/v1
packet_schema: rag-rulebook/context-packet/v1

purpose: Define the smallest governed context packet a RAG/rulebook service can return to a consuming workbench.

principles:
  - Prefer deterministic routing, path ownership, artifact metadata, and graph expansion before semantic recall.
  - Include only context needed for the requested action and explain why each chunk was selected.
  - Preserve citations and source references for every selected chunk, check, forbidden action, and stop condition.
  - Return gaps and stop conditions instead of filling governance holes with model judgment.
  - Keep final task execution outside the packet; the consuming workflow decides what to do next.

required_fields:
  - schema
  - packet_id
  - generated_at
  - request
  - intent
  - routing
  - matched_corpora
  - matched_rule_packs
  - matched_rulesets
  - selected_chunks
  - required_checks
  - forbidden_actions
  - stop_conditions
  - citations
  - confidence
  - gaps
  - budgets
  - provenance

fields:
  schema:
    type: string
    allowed_values:
      - rag-rulebook/context-packet/v1

  packet_id:
    type: string
    format: stable-run-id
    description: Unique packet identifier for one retrieval response.

  generated_at:
    type: string
    format: iso-8601-utc

  request:
    type: object
    required_fields:
      - raw_text
      - normalized_summary
    fields:
      raw_text:
        type: string
      normalized_summary:
        type: string
      focused_paths:
        type: array
        items:
          type: string
      open_artifact_ids:
        type: array
        items:
          type: string

  intent:
    type: object
    required_fields:
      - id
      - label
      - confidence
      - source
    fields:
      id:
        type: string
        format: lower-dot-id
      label:
        type: string
      mode:
        type: string
        examples:
          - discovery
          - implementation
          - review
      layer:
        type: string
        examples:
          - 02.rag-rulebook
      workflow:
        type: string
      confidence:
        type: number
        minimum: 0
        maximum: 1
      source:
        type: enum
        allowed_values:
          - deterministic
          - inferred
          - user-supplied
          - mixed
      evidence_ref_ids:
        type: array
        items:
          type: string

  routing:
    type: object
    required_fields:
      - layer
      - mode
      - workflow
      - status
    fields:
      layer:
        type: string
      mode:
        type: string
      workflow:
        type: string
      status:
        type: enum
        allowed_values:
          - ready
          - needs-clarification
          - blocked
      task_type:
        type: string
      target_paths:
        type: array
        items:
          type: string
      classification_source:
        type: string

  matched_corpora:
    type: array
    item:
      type: object
      required_fields:
        - corpus_id
        - owner_layer
        - match_reason
        - confidence
      fields:
        corpus_id:
          type: string
          format: numbered-corpus-id
          examples:
            - corpus.02.rag-rulebook
            - corpus.03.product.design-system
        owner_layer:
          type: string
        manifest_path:
          type: string
        match_reason:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1

  matched_rule_packs:
    type: array
    item:
      type: object
      required_fields:
        - id
        - corpus_id
        - selection_reason
      fields:
        id:
          type: string
        corpus_id:
          type: string
        path:
          type: string
        selection_reason:
          type: string
        citation_ids:
          type: array
          items:
            type: string

  matched_rulesets:
    type: array
    item:
      type: object
      required_fields:
        - id
        - corpus_id
        - ruleset_type
        - selection_reason
      fields:
        id:
          type: string
        corpus_id:
          type: string
        ruleset_type:
          type: enum
          allowed_values:
            - layer
            - concern
            - standard
            - workflow
        path:
          type: string
        rule_ids:
          type: array
          items:
            type: string
        selection_reason:
          type: string
        citation_ids:
          type: array
          items:
            type: string

  selected_chunks:
    type: array
    item:
      type: object
      required_fields:
        - chunk_id
        - corpus_id
        - artifact_id
        - source_path
        - content
        - rank
        - token_estimate
        - selection_reason
        - citation_ids
      fields:
        chunk_id:
          type: string
        corpus_id:
          type: string
        artifact_id:
          type: string
        source_path:
          type: string
        rule_ids:
          type: array
          items:
            type: string
        content:
          type: string
          description: Minimal text needed by the consuming model.
        rank:
          type: integer
          minimum: 1
        token_estimate:
          type: integer
          minimum: 1
        retrieval_score:
          type: number
          minimum: 0
          maximum: 1
        selection_reason:
          type: string
        citation_ids:
          type: array
          min_items: 1
          items:
            type: string

  required_checks:
    type: array
    item:
      type: object
      required_fields:
        - id
        - description
        - timing
        - citation_ids
      fields:
        id:
          type: string
        description:
          type: string
        timing:
          type: enum
          allowed_values:
            - before-edit
            - before-commit
            - before-deploy
            - after-change
        command:
          type: string
          required_when_known: false
        citation_ids:
          type: array
          min_items: 1
          items:
            type: string

  forbidden_actions:
    type: array
    item:
      type: object
      required_fields:
        - action
        - reason
        - citation_ids
      fields:
        action:
          type: string
        reason:
          type: string
        citation_ids:
          type: array
          min_items: 1
          items:
            type: string

  stop_conditions:
    type: array
    item:
      type: object
      required_fields:
        - id
        - condition
        - severity
        - citation_ids
      fields:
        id:
          type: string
        condition:
          type: string
        severity:
          type: enum
          allowed_values:
            - warning
            - blocking
        suggested_resolution:
          type: string
        citation_ids:
          type: array
          min_items: 1
          items:
            type: string

  citations:
    type: array
    item:
      type: object
      required_fields:
        - id
        - source_path
        - source_type
      fields:
        id:
          type: string
        corpus_id:
          type: string
        artifact_id:
          type: string
        source_path:
          type: string
        source_type:
          type: enum
          allowed_values:
            - source
            - rule
            - rule-pack
            - workflow
            - standard
            - schema
            - plan
        line_start:
          type: integer
          minimum: 1
        line_end:
          type: integer
          minimum: 1
        source_ref:
          type: string

  confidence:
    type: object
    required_fields:
      - overall
      - retrieval
      - routing
    fields:
      overall:
        type: number
        minimum: 0
        maximum: 1
      retrieval:
        type: number
        minimum: 0
        maximum: 1
      routing:
        type: number
        minimum: 0
        maximum: 1
      notes:
        type: array
        items:
          type: string

  gaps:
    type: array
    item:
      type: object
      required_fields:
        - id
        - type
        - description
        - blocking
      fields:
        id:
          type: string
        type:
          type: enum
          allowed_values:
            - missing-corpus
            - ambiguous-intent
            - ambiguous-ownership
            - missing-reference
            - budget-overflow
            - missing-validator
            - unsupported-action
        description:
          type: string
        blocking:
          type: boolean
        suggested_resolution:
          type: string

  budgets:
    type: object
    required_fields:
      - max_context_tokens
      - selected_context_tokens
      - trim_policy
    fields:
      max_context_tokens:
        type: integer
        minimum: 1
      selected_context_tokens:
        type: integer
        minimum: 0
      trim_policy:
        type: enum
        allowed_values:
          - deterministic-first
          - cite-required-context-only
          - fail-when-over-budget

  provenance:
    type: object
    required_fields:
      - service_version
      - corpus_index_versions
      - retrieval_order
    fields:
      service_version:
        type: string
      corpus_index_versions:
        type: array
        items:
          type: object
          required_fields:
            - corpus_id
            - index_version
          fields:
            corpus_id:
              type: string
            index_version:
              type: string
            content_hash:
              type: string
      retrieval_order:
        type: array
        items:
          type: string
      generator:
        type: string

validation_rules:
  - "Every `selected_chunks[].citation_ids[]` entry must resolve to an entry in `citations`."
  - "Every `required_checks`, `forbidden_actions`, and `stop_conditions` entry must have at least one citation."
  - "Every `matched_corpora[].corpus_id` must use the numbered corpus vocabulary or an approved subcorpus."
  - "`budgets.selected_context_tokens` must not exceed `budgets.max_context_tokens`."
  - "If any gap has `blocking: true`, `routing.status` must be `blocked` or `needs-clarification`."
  - "If `intent.source` is `inferred` and `intent.confidence` is low, the packet must include an ambiguity gap."
  - "Semantic or vector recall may explain a selection, but it must not override deterministic ownership or stop conditions."

minimal_example:
  schema: rag-rulebook/context-packet/v1
  packet_id: packet.example.context-packet
  generated_at: "2026-06-25T00:00:00Z"
  request:
    raw_text: "Create a context-packet schema."
    normalized_summary: "Design the RAG/Rulebook context-packet contract."
    focused_paths:
      - .agentic/02.rag-rulebook/plans/repo-plan.md
    open_artifact_ids:
      - rag-rulebook.plan.repo
  intent:
    id: rag-rulebook.intent.design-context-packet-schema
    label: Design context-packet schema
    mode: implementation
    layer: 02.rag-rulebook
    workflow: .agentic/02.rag-rulebook/workflows/default.md
    confidence: 0.95
    source: deterministic
    evidence_ref_ids:
      - citation.plan.context-packet
  routing:
    layer: 02.rag-rulebook
    mode: implementation
    workflow: .agentic/02.rag-rulebook/workflows/default.md
    status: ready
    task_type: schema
    target_paths:
      - .agentic/02.rag-rulebook/schemas/context-packet.schema.yml
    classification_source: session-metadata
  matched_corpora:
    - corpus_id: corpus.02.rag-rulebook
      owner_layer: 02.rag-rulebook
      match_reason: Task changes the RAG/Rulebook service model.
      confidence: 0.95
  matched_rule_packs: []
  matched_rulesets: []
  selected_chunks:
    - chunk_id: chunk.plan.context-packet-next-slice
      corpus_id: corpus.02.rag-rulebook
      artifact_id: rag-rulebook.plan.repo
      source_path: .agentic/02.rag-rulebook/plans/repo-plan.md
      rule_ids: []
      content: "Design a context-packet schema including intent, routing metadata, matched corpora, selected chunks, required checks, stop conditions, citations, confidence, and gaps."
      rank: 1
      token_estimate: 35
      retrieval_score: 1.0
      selection_reason: The repo plan names this as the next small slice.
      citation_ids:
        - citation.plan.context-packet
  required_checks: []
  forbidden_actions: []
  stop_conditions: []
  citations:
    - id: citation.plan.context-packet
      corpus_id: corpus.02.rag-rulebook
      artifact_id: rag-rulebook.plan.repo
      source_path: .agentic/02.rag-rulebook/plans/repo-plan.md
      source_type: plan
      line_start: 58
      line_end: 61
      source_ref: "Ordered Plan step 3"
  confidence:
    overall: 0.95
    retrieval: 1.0
    routing: 0.95
    notes: []
  gaps: []
  budgets:
    max_context_tokens: 2000
    selected_context_tokens: 35
    trim_policy: deterministic-first
  provenance:
    service_version: design-only
    corpus_index_versions:
      - corpus_id: corpus.02.rag-rulebook
        index_version: prototype
    retrieval_order:
      - deterministic intent and task-type matches
      - path and artifact metadata matches
      - required ruleset expansion
    generator: manual-schema-design
