  - path: budgets.selected_context_tokens
    what_it_is: "Estimated tokens selected for context."
    what_it_does: "Shows how much of the budget is used."
    rules:
      - "Must be zero or positive."
      - "Must not exceed `max_context_tokens`."

  - path: budgets.trim_policy
    what_it_is: "The policy used when context is too large."
    what_it_does: "Makes context reduction deterministic."
    rules:
      - "Use an allowed trim policy."

  - path: provenance
    what_it_is: "How the packet was generated."
    what_it_does: "Supports reproducibility and debugging."
    rules:
      - "Must include service version, index versions, and retrieval order."

  - path: provenance.service_version
    what_it_is: "The service or design version that produced the packet."
    what_it_does: "Lets consumers correlate packets with generator behavior."
    rules:
      - "Use a real version when runtime exists."

  - path: provenance.corpus_index_versions
    what_it_is: "The corpus indexes used during retrieval."
    what_it_does: "Makes retrieval reproducible against a known index snapshot."
