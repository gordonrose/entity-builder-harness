schema: rag-rulebook-recognition-candidate-schema/v1
candidate_schema: rag-rulebook/recognition-candidate/v1

purpose: Define a durable review record for important unmatched or ambiguous prompt terms before they become curated recognition-source terms.

principles:
  - Candidate records preserve local language context so reviewers can judge meaning.
  - Candidate records do not become curated recognition terms automatically.
  - Review decisions must be explicit, reversible, and supported by evaluation fixtures when accepted.
  - Candidate records should store only the smallest useful prompt excerpt, not whole transcripts by default.
  - Candidates that name missing subject-matter knowledge should create corpus gaps instead of pretending curated vocabulary is enough.

required_fields:
  - schema
  - candidate_id
  - status
  - observed
  - suggested
  - reason
  - review

fields:
  schema:
    type: string
    allowed_values:
      - rag-rulebook/recognition-candidate/v1

  candidate_id:
    type: string
    format: lower-dot-id
    description: Stable candidate identifier, usually based on date, source kind, and normalized term.

  status:
    type: enum
    allowed_values:
      - needs-review
      - accepted
      - rejected
      - merged
      - deferred

  observed:
    type: object
    required_fields:
      - term
      - sentence
      - source
    fields:
      term:
        type: string
        description: Exact term or phrase that should be reviewed.
      sentence:
        type: string
        description: Smallest sentence or sentence-like prompt fragment that contains the term.
      prompt_excerpt:
        type: string
        description: Optional larger excerpt when the sentence alone is not enough to understand meaning.
      source:
        type: enum
        allowed_values:
          - chat-prompt
          - chat-response
          - evaluation-fixture
          - commit-log
          - human-note
          - generated-report
      layer:
        type: string
      mode:
        type: string
      workflow:
        type: string
      chat_session_id:
        type: string
      observed_at_utc:
        type: string
        format: iso-8601-utc

  suggested:
    type: object
    required_fields:
      - source_id
      - category
      - canonical_id
    fields:
      source_id:
        type: string
        examples:
          - recognition.curated.domain-nouns
          - recognition.curated.intent-forms
      category:
        type: string
        examples:
          - domain-noun
          - intent-form
          - alias
          - risk-word
      canonical_id:
        type: string
      confidence_weight:
        type: number
        minimum: 0
        maximum: 1
      target_source_path:
        type: string
      fixture_path:
        type: string

  coverage:
    type: object
    description: Optional corpus-coverage requirement for candidates whose term needs source material before safe retrieval.
    fields:
      required:
        type: boolean
      status:
        type: enum
        allowed_values:
          - missing
          - partial
          - covered
          - not-required
        description: Summary status derived from required coverage stages.
      gap_id:
        type: string
        description: Stable context-packet gap ID to emit while coverage is missing.
      needed_corpus_ids:
        type: array
        items:
          type: string
      needed_topic:
        type: string
      suggested_resolution:
        type: string
      evidence_paths:
        type: array
        items:
          type: string
        description: Optional summary evidence; stage-level evidence is preferred.
      stages:
        type: object
        description: Per-stage proof that the candidate is usable by RAG retrieval, not just mentioned in prose.
        required_fields:
          - source_material
          - structured_rulebook
          - indexed_chunks
          - selector_evaluation
        fields:
          source_material:
            type: coverage-stage
            description: Human-readable source material exists for the term.
          structured_rulebook:
            type: coverage-stage
            description: Source material has been converted into governed rulebook structure.
          indexed_chunks:
            type: coverage-stage
            description: Rulebook material has been indexed and chunked for retrieval.
          selector_evaluation:
            type: coverage-stage
            description: A selector evaluation proves the expected retrieval behavior.

  execution_readiness:
    type: object
    description: Optional side-effect readiness state for candidates that are covered for retrieval but not safe for execution.
    fields:
      status:
        type: enum
        allowed_values:
          - not-required
          - ready
          - blocked
      gap_id:
        type: string
      reason:
        type: string

  coverage-stage:
    type: object
    fields:
      status:
        type: enum
        allowed_values:
          - missing
          - present
          - not-required
      evidence_paths:
        type: array
        items:
          type: string

  reason:
    type: array
    items:
      type: string
    description: Short reasons this candidate should be reviewed.

  review:
    type: object
    required_fields:
      - required
      - decision
    fields:
      required:
        type: boolean
      decision:
        type: enum
        allowed_values:
          - pending
          - accept
          - reject
          - merge
          - defer
      reviewer:
        type: string
      reviewed_at_utc:
        type: string
        format: iso-8601-utc
      reviewer_notes:
        type: string
      merged_into_candidate_id:
        type: string
      accepted_source_path:
        type: string
      accepted_fixture_path:
        type: string

field_guide:
  - path: observed.sentence
    what_it_is: The sentence or sentence-like fragment where the term appeared.
    what_it_does: Gives reviewers enough context to decide whether the term has a stable meaning.
    rules:
      - Required for every candidate.
      - Keep it short and local to the term.
      - Do not store a full transcript unless the reviewer explicitly needs it.

  - path: suggested.canonical_id
    what_it_is: Proposed governed meaning for the term.
    what_it_does: Prevents vague words from entering curated sources without a deterministic interpretation.
    rules:
      - Must be reviewed before acceptance.
      - Must match the category and target curated source.

  - path: review.decision
    what_it_is: Human review outcome.
    what_it_does: Keeps maintenance explicit instead of letting runtime observations mutate curated sources.
    rules:
      - Accepted candidates need a curated-source update and evaluation fixture.
      - Rejected or merged candidates should keep a note so they do not recur as noise.

  - path: execution_readiness.status
    what_it_is: Whether a term is safe for side-effecting execution after retrieval coverage exists.
    what_it_does: Separates "retrieval can find the right context" from "an agent may execute the action."
    rules:
      - Use `blocked` when corpus coverage is enough for planning but deploy, git, write, or destructive execution still has open gaps.
      - Provide `gap_id` when blocked.

  - path: status
    what_it_is: The lifecycle state of the candidate record.
    what_it_does: Tells reviewers whether the term is pending, accepted, rejected, merged, or deferred.
    rules:
      - The status must agree with the lifecycle directory.
      - Runtime observations start as needs-review, not accepted.
      - Terminal statuses require reviewer identity, reviewed timestamp, and notes.

  - path: coverage
    what_it_is: Optional staged proof that corpus material exists for the term.
    what_it_does: Separates meaningful but uncovered terms from terms that are ready for retrieval.
    rules:
      - A corpus gap is not acceptance.
      - Coverage-required accepted candidates must be covered.
      - Stage evidence paths should point at source material, structured rulebook content, index or chunk proof, and selector evaluation proof.

  - path: coverage
    what_it_is: Whether the candidate has enough corpus knowledge behind it.
    what_it_does: Prevents prompt recognition from sounding authoritative when the repo has no source material for the term.
    rules:
      - Use `missing` only when no required coverage stage is present.
      - Use `partial` when some required coverage stages are present and some are still missing.
      - Use `covered` only when all required coverage stages are present.
      - Missing or partial coverage should create a visible `missing-corpus` gap in selector fixtures.
      - Accepted candidates that require coverage need full staged coverage and an evaluation fixture.

  - path: coverage.stages
    what_it_is: The proof ladder for turning a recognized term into retrievable knowledge.
    what_it_does: Separates source prose, governed rulebook structure, generated chunks, and evaluation proof.
    rules:
      - `source_material` proves human-readable source exists.
      - `structured_rulebook` proves the source has been converted into governed rulebook form.
      - `indexed_chunks` proves the governed source can be retrieved as chunks.
      - `selector_evaluation` proves selector behavior with expected and banned outcomes.
      - A `present` stage must list evidence paths.
