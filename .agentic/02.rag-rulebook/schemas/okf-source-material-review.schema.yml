schema: rag-rulebook-okf-source-material-review-schema/v1
review_schema: rag-rulebook/okf-source-material-review/v1

purpose: Define the durable review record used to prove source material has passed the multi-reviewer OKF quality gate before source-to-rule derivation.

principles:
  - Source material is canonical human-authored knowledge, not retrieval-ready coverage by itself.
  - Review records make source quality, gaps, recommendations, and acceptance decisions auditable.
  - Passing requires every required reviewer role to score above 9.5 out of 10.
  - Scores must not hide blockers, missing execution variables, or unsafe production gaps.
  - Accepted source material may proceed to source-to-rule derivation.

required_fields:
  - schema
  - review_id
  - status
  - source_material
  - threshold
  - iterations
  - final_decision

fields:
  schema:
    type: string
    allowed_values:
      - rag-rulebook/okf-source-material-review/v1
    description: Identifies the review record contract.

  review_id:
    type: string
    format: lower-dot-id
    description: Stable review identifier, usually based on date, corpus, and vertical.

  status:
    type: enum
    allowed_values:
      - needs-review
      - needs-revision
      - accepted
      - blocked
      - superseded
    description: Lifecycle state for the source-material review.

  source_material:
    type: object
    required_fields:
      - path
      - corpus_id
      - vertical
      - source_state
    fields:
      path:
        type: string
        description: Source material markdown path under the owning corpus.
      corpus_id:
        type: string
        examples:
          - corpus.02.rag-rulebook
          - corpus.04.deploy
      vertical:
        type: string
        description: The specific operational vertical being reviewed.
      source_state:
        type: enum
        allowed_values:
          - draft
          - revised
          - accepted
          - blocked
          - retired
      sha256:
        type: string
        description: Optional current source hash, generated by tooling when available.
      target_rule_paths:
        type: array
        items:
          type: string

  threshold:
    type: object
    required_fields:
      - passing_score
      - required_roles
      - pass_rule
    fields:
      passing_score:
        type: number
        required_value: 9.5
      required_roles:
        type: array
        required_values:
          - architect
          - agentic-engineer
          - secops-engineer
          - senior-sre
      pass_rule:
        type: string
        required_value: every required reviewer score must be greater than 9.5 and no blocking gaps may remain

  iterations:
    type: array
    min_items: 1
    items:
      type: object
      required_fields:
        - iteration
        - reviewer_assessments
        - cross_review_summary
        - recommendation_handling
        - rerun_required
      fields:
        iteration:
          type: integer
        source_revision_summary:
          type: string
        reviewer_assessments:
          type: array
          items:
            type: object
            required_fields:
              - role
              - overall_score
              - blocking_gaps
              - dimension_scores
              - recommendations
              - decision
            fields:
              role:
                type: enum
                allowed_values:
                  - architect
                  - agentic-engineer
                  - secops-engineer
                  - senior-sre
              overall_score:
                type: number
                min: 0
                max: 10
              decision:
                type: enum
                allowed_values:
                  - pass
                  - revise
                  - block
              blocking_gaps:
                type: array
                items:
                  type: object
                  required_fields:
                    - gap_id
                    - summary
                    - severity
                  fields:
                    gap_id:
                      type: string
                    summary:
                      type: string
                    severity:
                      type: enum
                      allowed_values:
                        - blocker
                        - major
                        - minor
              dimension_scores:
                type: object
                required_fields:
                  - coverage
                  - necessity
                  - production_grade_gaps
                  - execution_variables
                  - human_readability
                  - machine_readability
                  - cost_optimization
                  - security
                  - performance
                  - token_optimization
                values:
                  type: number
                  min: 0
                  max: 10
              recommendations:
                type: array
                items:
                  type: object
                  required_fields:
                    - recommendation_id
                    - summary
                    - priority
                  fields:
                    recommendation_id:
                      type: string
                    summary:
                      type: string
                    priority:
                      type: enum
                      allowed_values:
                        - blocker
                        - high
                        - medium
                        - low
              evidence:
                type: array
                items:
                  type: string
        cross_review_summary:
          type: object
          required_fields:
            - agreement
            - disagreement
            - unresolved_blockers
          fields:
            agreement:
              type: array
              items:
                type: string
            disagreement:
              type: array
              items:
                type: string
            unresolved_blockers:
              type: array
              items:
                type: string
        recommendation_handling:
          type: object
          required_fields:
            - applied
            - rejected
          fields:
            applied:
              type: array
              items:
                type: object
            rejected:
              type: array
              items:
                type: object
        rerun_required:
          type: boolean

  final_decision:
    type: object
    required_fields:
      - status
      - summary
      - accepted_source_sha256
      - accepted_at_utc
      - required_before_derivation
    fields:
      status:
        type: enum
        allowed_values:
          - accepted
          - needs-revision
          - blocked
          - superseded
      summary:
        type: string
      accepted_source_sha256:
        type: string
        description: Current SHA-256 hash of the accepted source material.
      accepted_at_utc:
        type: string
      required_before_derivation:
        type: array
        items:
          type: string

authoring_rules:
  - Do not mark a review accepted when any required reviewer score is 9.5 or lower.
  - Do not average reviewer scores to pass the gate.
  - Do not omit recommendations that were rejected; record the reason.
  - Do not proceed to source-to-rule derivation until final_decision.status is accepted and required_before_derivation is complete.
  - Keep reviewer role names stable so future validators can enforce the threshold.
  - Validate review records with `scripts/02.rag-rulebook/validate-okf-source-material-reviews/script.sh --current`.
