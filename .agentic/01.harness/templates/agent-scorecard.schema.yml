#       path: scripts/01.harness/agents/validate-harness-agents/script.sh
{
  "schema": "harness/agent-scorecard-schema/v1",
  "scorecard_schema": "harness/agent-scorecard/v1",
  "required_fields": {
    "agent": [
      "id",
      "name"
    ],
    "review": [
      "mode",
      "task",
      "reviewed_at_utc",
      "decision",
      "confidence",
      "critical_blocker_present",
      "overall_score"
    ],
    "evidence": [
      "sources",
      "gaps"
    ],
    "findings": [
      "critical",
      "high",
      "medium",
      "low"
    ],
    "score": [
      "dimension",
      "score",
      "evidence",
      "notes"
    ],
    "delegation_request": [
      "target_agent_id",
      "blocking_question",
      "evidence_already_reviewed",
      "needed_decision"
    ]
  },
  "quality_gate": {
    "blocks_when": [
      "critical_blocker_present is true",
      "any required score is below 3",
      "decision is delegate and delegated review is missing"
    ],
    "overall_score_rule": "weighted_average_of_selected_agent_rubric_dimensions"
  }
}
