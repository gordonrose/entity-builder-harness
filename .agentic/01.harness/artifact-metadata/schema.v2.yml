# agentic-artifact:
#   schema: agentic-artifact/v2
#   id: harness.schema.artifact-metadata-v2
#   version: 1
#   status: active
#   layer: 01.harness
#   domain: metadata
#   disciplines:
#     - agentic
#   kind: config
#   purpose: Define the machine-readable field contract for agentic-artifact/v2 metadata.
#   portability:
#     class: required
#     targets:
#       - llm-workbench
#       - entity-builder
#       - design-system-builder
#   used_by:
#     - id: harness.standard.artifact-metadata
#       path: .agentic/01.harness/artifact-metadata/standard.md
#     - id: harness.script.artifact-metadata.check-headers
#       path: scripts/01.harness/artifact-metadata/check-headers/script.sh

schema: agentic-artifact-schema/v1
artifact_schema: agentic-artifact/v2

required_fields:
  - schema
  - id
  - version
  - status
  - layer
  - domain
  - disciplines
  - kind
  - purpose
  - portability
  - used_by

fields:
  schema:
    type: string
    allowed_values:
      - agentic-artifact/v2
  id:
    type: string
    format: lower-dot-id
    stable_across_path_moves: true
  version:
    type: integer
    minimum: 1
  status:
    type: enum
    values_from: taxonomy.statuses
  layer:
    type: enum
    values_from: taxonomy.layers[].id
  domain:
    type: string
    format: lower-dot-domain
    extensible: true
  disciplines:
    type: array
    items_from: taxonomy.disciplines
    min_items: 1
  kind:
    type: string
    extensible: true
  purpose:
    type: string
    max_sentences: 1
  portability:
    type: object
    required_fields:
      - class
      - targets
    fields:
      class:
        type: enum
        values_from: taxonomy.portability_classes
      targets:
        type: array
        items_from: taxonomy.seed_targets
        extensible: true
  effects:
    type: array
    items_from: taxonomy.script_effects
    required_when:
      kind: script
  used_by:
    type: array
    min_items: 1
    item:
      type: object
      required_fields:
        - id
      fields:
        id:
          type: string
          format: lower-dot-id
        path:
          type: string
          required_during_migration: false

fixtures:
  markdown: .agentic/01.harness/artifact-metadata/examples/markdown.v2.md
  yaml: .agentic/01.harness/artifact-metadata/examples/yaml.v2.yml
  script: scripts/01.harness/artifact-metadata/check-headers/script.sh
  script_smoke_test: scripts/01.harness/artifact-metadata/check-headers/smoke-test.sh
  index_generator: scripts/01.harness/artifact-metadata/generate-index/script.sh
  index_generator_smoke_test: scripts/01.harness/artifact-metadata/generate-index/smoke-test.sh
