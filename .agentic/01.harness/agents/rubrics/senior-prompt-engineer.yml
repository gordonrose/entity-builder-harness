#   - agentic
#   kind: rubric
#   purpose: Define professional scoring rules for Senior Prompt Engineer review.
#   portability:
#     class: required
#     targets:
#     - llm-workbench
#     - entity-builder
#     - design-system-builder
#   used_by:
