deferred_human_decisions:
  - id: harness-layer-ownership
    title: Decide whether harness is test/development support, entity-builder governance/generation, or split into separate layers.
    status: open
    affected_candidate: docs/harness/architecture/rules/layers/harness.yml
    source_refs:
      - doc: "kanbien-typescript-architecture-guide.md"
        sections:
          - "harness/"
      - doc: "kanbien-modular-monorepo-entity-builder.md"
        sections:
          - "7. harness/"
      - doc: "kanbien-architecture-full-discussion.md"
        sections:
          - "7. Harness"
    summary: >
      The TypeScript guide describes harness/ as testing and development
      support and says entity definitions should not live there. The modular
      monorepo and full discussion guides describe harness as the entity-builder
      brain or governance/generation layer. Do not create harness.yml until this
      ownership model is decided.
  - id: platform-entity-codegen-ownership
    title: Decide whether entity-core, entity-runtime, and entity-codegen are platform primitives, tools-owned generators, or split across both.
    status: open
    affected_candidate: docs/harness/architecture/rules/layers/platform.yml
    source_refs:
      - doc: "kanbien-typescript-architecture-guide.md"
        sections:
          - "platform/"
          - "tools/"
      - doc: "kanbien-platform-layer-architecture.md"
        sections:
          - "The clean mental model"
          - "What belongs in /platform"
      - doc: "kanbien-modular-monorepo-entity-builder.md"
        sections:
          - "8. tools/build"
      - doc: "kanbien-architecture-full-discussion.md"
        sections:
          - "8. Build and Code Generation"
    summary: >
      The TypeScript guide describes platform/ as reusable platform primitives
      and engines, including entity-core, entity-runtime, and entity-codegen,
      and says tools may depend on platform/entity-codegen. The dedicated
      platform-layer guide treats platform/ as runtime composition. Existing
      generated-code and tools artifacts place generator implementation under
      tools. Do not broaden platform.yml to own entity/codegen engines until
      this ownership model is decided.
  - id: entity-definition-source-of-truth-location
    title: Decide where canonical entity definitions live before tightening app, harness, platform, or create-entity rules.
    status: open
    affected_candidate: docs/harness/architecture/rule-packs/create-entity.yml
    source_refs:
      - doc: "kanbien-modular-monorepo-entity-builder.md"
        sections:
          - "6. apps/"
          - "7. harness/"
          - "11. The core entity flow"
      - doc: "kanbien-architecture-full-discussion.md"
        sections:
          - "7. Harness"
          - "11. Entity Builder Flow"
      - doc: "kanbien-typescript-architecture-guide.md"
        sections:
          - "apps/"
          - "harness/"
          - "How TypeScript should support the entity-builder idea"
          - "1. Entity definition"
    summary: >
      The modular monorepo guide shows entity.schema.ts under apps/crm/entities,
      while the TypeScript guide says entity definitions should not live in
      apps/ or harness/ and frames the entity-builder as a platform primitive.
      The full discussion says the harness captures entity definitions. Keep
      app rules focused on composition, mounting, manifests, migrations, and
      product behavior until the canonical entity-definition location is
      decided.

