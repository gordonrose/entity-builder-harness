version: 1
status: active

purpose: >
  Track coverage of canonical architecture guide content as Codex creates
  layer rulesets, concern rulesets, and task rule packs one artifact at a time.

completion_criteria:
  - Every material source-guide section is marked covered, duplicate-of, background-only, out-of-scope, or deferred-human-decision.
  - Every covered section points to at least one architecture rule, concern rule, rule pack, checklist, or reference artifact.
  - Every source reference in generated artifacts has been manually checked against the named source document and section.
  - Duplication, contradiction, weak source support, or architectural uncertainty is recorded as deferred-human-decision instead of being resolved by guesswork.
  - YAML validation has passed for every created or updated YAML artifact.

coverage_statuses:
  unreviewed: "Source content has not been reviewed for rulebook coverage yet."
  in_progress: "Source content is being reviewed or partially mapped."
  covered: "Source content is represented by committed rulebook artifacts."
  duplicate-of: "Source content repeats another tracked section or artifact."
  background-only: "Source content explains context but does not need a rulebook artifact."
  out-of-scope: "Source content is outside the architecture rulebook scope."
  deferred-human-decision: "Source content needs human judgment before encoding."

