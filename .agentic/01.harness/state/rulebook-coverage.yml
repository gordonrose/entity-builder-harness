deferred_human_decisions:
  - id: harness-layer-ownership
    title: Decide whether harness is test/development support, entity-builder governance/generation, or split into separate layers.
    status: open
    affected_candidate: docs/harness/architecture/rules/layers/harness.yml
    source_refs:
      - doc: "kanbien-typescript-architecture-guide.md"
        sections:
          - "harness/"
      - doc: "kanbien-modular-monorepo-entity-builder.md"
        sections:
          - "7. harness/"
      - doc: "kanbien-architecture-full-discussion.md"
        sections:
          - "7. Harness"
    summary: >
      The TypeScript guide describes harness/ as testing and development
      support and says entity definitions should not live there. The modular
      monorepo and full discussion guides describe harness as the entity-builder
      brain or governance/generation layer. Do not create harness.yml until this
      ownership model is decided.

notes:
  - "Do not mark existing artifacts as covered until their source_refs have been manually checked against the named source sections."
  - "Prefer concern rules before task packs when multiple future packs need the same rule."
  - "Record duplication or contradiction here instead of resolving by inference."
