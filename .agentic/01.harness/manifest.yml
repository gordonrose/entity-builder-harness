id: agentic.01.harness
title: Harness governance operating pack
status: active
purpose: >
  Govern changes to harness workflows, standards, review agents, validators,
  templates, evaluation fixtures, architecture rule artifacts, and
  deterministic checks while preserving source-of-truth boundaries.

read_order:
  - .agentic/01.harness/manifest.yml
  - .agentic/01.harness/operator-guide.md
  - .agentic/01.harness/state/rulebook-coverage.yml
  - .agentic/01.harness/state/rulebook-progress.yml
  - relevant workflow under .agentic/01.harness/workflows
  - relevant template under .agentic/01.harness/templates
  - relevant checklist under .agentic/01.harness/checklists

canonical_paths:
  review_agents: .agentic/01.harness/agents
  review_agent_rubrics: .agentic/01.harness/agents/rubrics
  review_agent_fixtures: scripts/01.harness/agents/validate-harness-agents/fixtures
  harness_standards: .agentic/01.harness/standards
  harness_workflows: .agentic/01.harness/workflows
  harness_templates: .agentic/01.harness/templates
  harness_validators: scripts/01.harness
  source_guides: docs/harness/architecture/guides/markdown
  layer_rules: docs/harness/architecture/rules/layers
  concern_rules: docs/harness/architecture/rules/concerns
  rule_packs: docs/harness/architecture/rule-packs

generated_by_human_or_codex: codex

guardrails:
  - Do not build the MCP server unless a future workflow explicitly governs that scope.
  - Do not build product runtime services from this layer.
  - Create executable harness validators, gates, metrics, or eval runners only when a workflow or standard identifies deterministic behavior they own.
  - Do not modify production repo code.
  - Do not edit the source markdown guides.
  - Do not create architecture rules or rule packs unless that artifact is the requested task and the architecture workflow applies.
  - Review agents may not edit files during review mode.
  - Implementation-agent mode requires an explicit workflow, bounded artifact scope, and normal chat lifecycle write permission.
  - Work one artifact at a time.
  - Validate YAML after editing YAML files.
  - Summarize assumptions before stopping.

current_known_artifacts:
  review_agent_capabilities:
    - .agentic/01.harness/agents/README.md
    - .agentic/01.harness/agents/rubrics/README.md
    - .agentic/01.harness/templates/agent-review-report.md
    - .agentic/01.harness/templates/agent-scorecard.yml
    - scripts/01.harness/agents/validate-harness-agents/script.sh
