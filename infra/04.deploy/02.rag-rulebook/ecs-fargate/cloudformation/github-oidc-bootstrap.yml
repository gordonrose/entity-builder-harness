AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap GitHub Actions OIDC deployment role for the RAG rulebook staging service.

Parameters:
  GitHubRepository:
    Type: String
    Default: gordonrose/entity-builder-harness
    AllowedPattern: "^[^/ ]+/[^/ ]+$"
  GitHubEnvironment:
    Type: String
    Default: staging
  DeployRoleName:
    Type: String
    Default: github-rag-rulebook-staging-deploy
  ExistingOidcProviderArn:
    Type: String
    Default: ""
    Description: Optional existing token.actions.githubusercontent.com OIDC provider ARN.

Conditions:
  CreateOidcProvider: !Equals [!Ref ExistingOidcProviderArn, ""]

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref DeployRoleName
      Description: GitHub Actions deployment role for the RAG rulebook staging ECS service.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref ExistingOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubRepository}:environment:${GitHubEnvironment}
      Policies:
        - PolicyName: rag-rulebook-staging-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationDeploy
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:UpdateStack
                  - cloudformation:ValidateTemplate
                Resource:
                  - !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/rag-rulebook-staging-*/*
              - Sid: EcrRepositoryAndImageAccess
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:CompleteLayerUpload
                  - ecr:CreateRepository
                  - ecr:DeleteRepository
                  - ecr:DescribeImages
                  - ecr:DescribeRepositories
                  - ecr:GetAuthorizationToken
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:PutImageScanningConfiguration
                  - ecr:PutImageTagMutability
                  - ecr:PutLifecyclePolicy
                  - ecr:UploadLayerPart
                Resource: "*"
              - Sid: EcsDeploy
                Effect: Allow
                Action:
                  - ecs:CreateService
                  - ecs:DeleteService
                  - ecs:DescribeClusters
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:DeregisterTaskDefinition
                  - ecs:RegisterTaskDefinition
                  - ecs:UpdateService
                Resource: "*"
              - Sid: LoadBalancerDnsLogsAndSecrets
                Effect: Allow
                Action:
                  - elasticloadbalancing:CreateListenerRule
                  - elasticloadbalancing:CreateTargetGroup
                  - elasticloadbalancing:DeleteListenerRule
                  - elasticloadbalancing:DeleteTargetGroup
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeRules
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:ModifyRule
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:PutResourcePolicy
                  - secretsmanager:TagResource
                  - secretsmanager:UpdateSecret
                Resource: "*"
              - Sid: IamForEcsTaskRoles
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:UpdateAssumeRolePolicy
                Resource:
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/rag-rulebook-staging-*
              - Sid: Ec2DescribeForDeploy
                Effect: Allow
                Action:
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                Resource: "*"
              - Sid: SecurityGroupForService
                Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:CreateSecurityGroup
                  - ec2:CreateTags
                  - ec2:DeleteSecurityGroup
                  - ec2:DescribeSecurityGroups
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                Resource: "*"

Outputs:
  DeployRoleArn:
    Description: GitHub Actions OIDC role ARN for staging deploys.
    Value: !GetAtt DeployRole.Arn
  OidcProviderArn:
    Description: OIDC provider ARN used by the deployment role.
    Value: !If
      - CreateOidcProvider
      - !Ref GitHubOidcProvider
      - !Ref ExistingOidcProviderArn
