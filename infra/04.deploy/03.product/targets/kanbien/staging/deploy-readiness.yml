blockers:
  - id: platform-shell-readiness.github-source
    severity: blocking
    path: source
    reason: The production-bound source commit and workflow run identity are not selected for this Kanbien staging proof.
    resolution: After this workflow is merged to main and run, record the remote-main commit SHA, workflow run id, and environment protection proof before ECS deployment execution.
  - id: platform-shell-readiness.github-detail
    severity: blocking
    path: github
    reason: GitHub workflow, source policy, OIDC permission, and environment protection settings are selected, but no workflow run id or deploy execution proof exists yet.
    resolution: Run the selected manual GitHub workflow after ECS target planning, then record the workflow run id and proof.
  - id: platform-shell-readiness.image-provenance
    severity: blocking
    path: artifacts
    reason: The platform shell image has only been proven locally; the target ECR repository exists with immutable tags and scan-on-push, but no immutable deploy image digest, base digest, scan result, SBOM, or attestation is recorded.
    resolution: Build from pushed origin/main through the repeatable GitHub/OIDC path, record the immutable image digest, base digest, and scan result, then deploy ECS by digest after runtime targets are selected; keep SBOM plus attestation as blockers before public exposure.
  - id: platform-shell-readiness.runtime-target
    severity: blocking
    path: runtime
    reason: The existing service-platform ECS service was inspected but is not selected as the product platform shell target; the target profile now records a server-first worker-capable project shape, but concrete ECS Fargate task definitions, services, CPU/memory, target group, and host rule remain unselected.
    resolution: Record the product platform shell server task/service target for first exposure, keep the reserved worker service slot deferred until an app-declared background workload exists, and select concrete ECS task families before deployment execution.
  - id: platform-shell-readiness.aws-detail
    severity: blocking
    path: aws
    reason: Existing staging cluster, VPC, subnets, ALB, security group, certificate, hostname, secret store, log group, and alarm names are selected, but the product platform shell target group and creation proof remain pending.
    resolution: Record the product platform shell ECS target group and creation/inspection proof after target planning.
  - id: platform-shell-readiness.smoke-proof
    severity: blocking
    path: proof
    reason: Partial AWS read-only boundary inspection exists, but deployment smoke, logs/metrics proof, DNS/routing proof, dummy route proof, and rollback proof require a selected platform shell AWS target.
    resolution: Complete target inspection, deploy through the governed workflow, verify health and dummy app behavior, and record rollback proof.
  - id: platform-shell-readiness.protected-dummy-route-deployment-smoke
    severity: blocking
    path: auth.route_exposure.protected_dummy_route.deployment_smoke
    reason: Local server tests prove 401, 403, and success paths, but deployed protected dummy-route smoke proof does not exist yet.
    resolution: After the smoke app and staging target are deployed, record deployment smoke proof for unauthenticated, forbidden, and authorized requests.
