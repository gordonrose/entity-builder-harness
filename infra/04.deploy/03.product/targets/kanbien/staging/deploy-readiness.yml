blockers:
  - id: platform-shell-readiness.github-source
    severity: blocking
    path: source
    reason: The production-bound source commit and workflow run identity are not selected for this Kanbien staging proof.
    resolution: Record the target repository, remote-main commit SHA, workflow path, run id, and GitHub environment protections before deployment execution.
  - id: platform-shell-readiness.github-oidc
    severity: blocking
    path: github.oidc
    reason: GitHub-to-AWS OIDC trust for the product platform shell has not been inspected or recorded.
    resolution: Select the AWS role and record repository, ref, environment, and workflow permission conditions.
  - id: platform-shell-readiness.github-detail
    severity: blocking
    path: github
    reason: GitHub workflow and environment protection details remain pending until the Kanbien staging source target is selected.
    resolution: Record the workflow path, run id, source policy, and environment protection values after target planning.
  - id: platform-shell-readiness.image-provenance
    severity: blocking
    path: artifacts
    reason: The platform shell image has only been proven locally; no immutable deploy image digest, base digest, SBOM, scan, or attestation is recorded.
    resolution: Build the deploy image in the governed workflow and record immutable image and provenance evidence.
  - id: platform-shell-readiness.runtime-target
    severity: blocking
    path: runtime
    reason: ECS Fargate task definitions, services, CPU/memory, and server/worker topology are not selected.
    resolution: Record server and worker task/service targets or an explicit worker deferral accepted by the platform runtime plan.
  - id: platform-shell-readiness.aws-target
    severity: blocking
    path: cloud
    reason: AWS account, role/profile, region, cluster, network, ingress, TLS, DNS, secrets, logs, and alarms are not selected for the Kanbien staging product shell target.
    resolution: Run the governed AWS planning/inspection workflow and copy the selected target identity into this manifest.
  - id: platform-shell-readiness.aws-detail
    severity: blocking
    path: aws
    reason: AWS implementation details remain pending until the Kanbien staging cloud target is selected.
    resolution: Record concrete ECS, network, ingress, secrets, logs, and alarm values after target inspection.
  - id: platform-shell-readiness.operations
    severity: blocking
    path: operations
    reason: Owner, escalation path, budget/cost guard, rollback target, rollback authority, and rollback runbook are not recorded.
    resolution: Record production operations ownership and rollback evidence before deployment exposure.
  - id: platform-shell-readiness.smoke-proof
    severity: blocking
    path: proof
    reason: Deployment smoke, AWS read-only inspection, logs/metrics proof, DNS/routing proof, dummy route proof, and rollback proof require a selected AWS target.
    resolution: Complete target inspection, deploy through the governed workflow, verify health and dummy app behavior, and record rollback proof.
