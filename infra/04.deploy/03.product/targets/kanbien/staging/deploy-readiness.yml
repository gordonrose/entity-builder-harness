blockers:
  - id: platform-shell-readiness.github-source
    severity: blocking
    path: source
    reason: The production-bound source commit and workflow run identity are not selected for this Kanbien staging proof.
    resolution: Record the target repository, remote-main commit SHA, workflow path, run id, and GitHub environment protections before deployment execution.
  - id: platform-shell-readiness.github-oidc
    severity: blocking
    path: github.oidc
    reason: GitHub-to-AWS OIDC trust for the product platform shell has not been inspected or recorded.
    resolution: Select the AWS role and record repository, ref, environment, and workflow permission conditions.
  - id: platform-shell-readiness.github-detail
    severity: blocking
    path: github
    reason: GitHub workflow and environment protection details remain pending until the Kanbien staging source target is selected.
    resolution: Record the workflow path, run id, source policy, and environment protection values after target planning.
  - id: platform-shell-readiness.image-provenance
    severity: blocking
    path: artifacts
    reason: The platform shell image has only been proven locally; the target ECR repository name and tag/provenance policy are selected, but the repository is not created and no immutable deploy image digest, base digest, scan, SBOM, or attestation is recorded.
    resolution: Create the selected product platform shell ECR repository through the governed AWS workflow, build from pushed origin/main, deploy by digest, record minimum staging provenance evidence, and keep SBOM plus attestation as blockers before public exposure.
  - id: platform-shell-readiness.runtime-target
    severity: blocking
    path: runtime
    reason: The existing service-platform ECS service was inspected but is not selected as the product platform shell target; the target profile now records a server-first worker-capable project shape, but concrete ECS Fargate task definitions, services, CPU/memory, target group, and host rule remain unselected.
    resolution: Record the product platform shell server task/service target for first exposure, keep the reserved worker service slot deferred until an app-declared background workload exists, and select concrete ECS task families before deployment execution.
  - id: platform-shell-readiness.aws-target
    severity: blocking
    path: cloud
    reason: AWS account and region were inspected, but the deployment role/profile remains unselected for the Kanbien staging product shell target.
    resolution: Select the deployment access identity through the governed AWS planning workflow and record it before deployment execution.
  - id: platform-shell-readiness.aws-detail
    severity: blocking
    path: aws
    reason: Existing staging cluster, VPC, subnets, ALB, security group, and certificate were inspected, but the product platform shell target group, DNS hostname, secret store, log group, and alarms remain pending.
    resolution: Record the product platform shell ECS target group, hostname or explicit DNS deferral, secret/config source, log group, and alarms after target planning.
  - id: platform-shell-readiness.operations
    severity: blocking
    path: operations
    reason: Owner, escalation path, budget/cost guard, rollback target, rollback authority, and rollback runbook are not recorded.
    resolution: Record production operations ownership and rollback evidence before deployment exposure.
  - id: platform-shell-readiness.smoke-proof
    severity: blocking
    path: proof
    reason: Partial AWS read-only boundary inspection exists, but deployment smoke, logs/metrics proof, DNS/routing proof, dummy route proof, and rollback proof require a selected platform shell AWS target.
    resolution: Complete target inspection, deploy through the governed workflow, verify health and dummy app behavior, and record rollback proof.
  - id: platform-shell-readiness.auth-provider-target
    severity: blocking
    path: auth.token_validation
    reason: Cognito is selected as the first auth provider path, but read-only inspection found no Cognito user pools in kanbien-dev eu-west-1; the Kanbien staging user pool issuer, JWKS URI, and app client id are not selected.
    resolution: Create or select the Kanbien staging Cognito user pool and app client through the governed AWS workflow, then record issuer, JWKS URI, and app client id.
  - id: platform-shell-readiness.protected-dummy-route-deployment-smoke
    severity: blocking
    path: auth.route_exposure.protected_dummy_route.deployment_smoke
    reason: Local server tests prove 401, 403, and success paths, but deployed protected dummy-route smoke proof does not exist yet.
    resolution: After the smoke app and staging target are deployed, record deployment smoke proof for unauthenticated, forbidden, and authorized requests.
  - id: platform-shell-readiness.cors-allowlist
    severity: blocking
    path: auth.cors.allowed_origins
    reason: Existing Route 53 aliases were inspected, but the product platform shell hostname and public browser origins are not selected.
    resolution: Record the staging UI/API origins that may call the platform shell before public exposure.
  - id: platform-shell-readiness.auth-secret-source
    severity: blocking
    path: auth.secrets.source
    reason: Cognito/provider config and any future confidential client material need a target secret/config source before public deployment.
    resolution: Record the AWS secret/config source and keep secret values out of source, logs, fixtures, docs, and generated packets.
